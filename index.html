function Stock() {
  const { products, setProducts, sales, history, addToast, addMovement, currentUser, lojas, tamanhos, setTamanhos } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [search, setSearch] = useState('');
  const [filterStore, setFilterStore] = useState('Todos');
  const [modal, setModal] = useState(null);
  const [editProduct, setEditProduct] = useState(null);
  const [form, setForm] = useState({code:'',description:'',store:'Cosmos',qty:0,costPrice:0,salePrice:0,photo:null,temVariacao:false,tamanho:'',modoMultiplo:false,variacoes:[]});
  const [novoTamanhoInline, setNovoTamanhoInline] = useState('');
  const [novoTamanhoObs, setNovoTamanhoObs] = useState('');
  const [showNovoTamanho, setShowNovoTamanho] = useState(false);

  const gerarCodigo = () => {
    const prefix = 'PIT';
    const num = String(products.length + 1 + Math.floor(Math.random()*9)).padStart(4,'0');
    const rand = Math.random().toString(36).substring(2,5).toUpperCase();
    return prefix+num+rand;
  };
  const [transfer, setTransfer] = useState({productId:'',qty:1});
  const [adjust, setAdjust] = useState({productId:'',type:'entrada',qty:0,note:'',lojaDestino:''});
  const [stockTab, setStockTab] = useState('todos');
  const [adjustSearch, setAdjustSearch] = useState('');
  const [showAdjustScanner, setShowAdjustScanner] = useState(false);
  const [confirm, setConfirm] = useState(null);

  // Agrupa produtos pelo código quando filtro=Todos, mostra por loja quando filtrado
  const buildConsolidated = () => {
    const base = products.filter(p=>(!search||(p.code.toLowerCase().includes(search.toLowerCase())||p.description.toLowerCase().includes(search.toLowerCase()))));
    if(filterStore!=='Todos') return base.filter(p=>p.store===filterStore);
    // consolidar por código
    const map = {};
    base.forEach(p=>{
      if(!map[p.code]) map[p.code]={...p,qty:0,lojas:[]};
      map[p.code].qty += p.qty;
      map[p.code].lojas.push({store:p.store,qty:p.qty,id:p.id});
    });
    return Object.values(map);
  };
  const filtered = buildConsolidated();
  const openEdit = (p) => {
    // se consolidado (tem lojas), abre a primeira instância real
    const real = products.find(x=>x.id===p.id) || products.find(x=>x.code===p.code);
    if(!real) return;
    setEditProduct(real); setForm({...real}); setModal('edit');
  };

  const saveProduct = () => {
    if(!form.description) return addToast('Preencha a descrição','error');
    const base=(form.code||'').trim()||gerarCodigo();
    if(modal==='add'){
      if(form.modoMultiplo&&form.variacoes&&form.variacoes.some(v=>Number(v.qty)>0)){
        const novos=form.variacoes.filter(v=>Number(v.qty)>0).map((v,i)=>({...form,id:'p'+Date.now()+i,code:base+'-'+v.tamanho.replace(/\s+/g,''),tamanho:v.tamanho,qty:Number(v.qty),costPrice:Number(form.costPrice),salePrice:Number(form.salePrice),modoMultiplo:undefined,variacoes:undefined}));
        setProducts(ps=>[...ps,...novos]);
        addToast(novos.length+' tamanhos cadastrados!','success');
      } else {
        if(products.find(p=>p.code===base&&p.store===form.store)) return addToast('Código já existe nesta loja','error');
        setProducts(ps=>[...ps,{...form,code:base,id:'p'+Date.now(),qty:Number(form.qty),costPrice:Number(form.costPrice),salePrice:Number(form.salePrice),modoMultiplo:undefined,variacoes:undefined}]);
        addToast('Produto cadastrado!','success');
      }
    } else {
      setProducts(ps=>ps.map(p=>p.id===editProduct.id?{...form,code:base,id:p.id,qty:Number(form.qty),costPrice:Number(form.costPrice),salePrice:Number(form.salePrice),modoMultiplo:undefined,variacoes:undefined}:p));
      addToast('Produto atualizado!','success');
    }
    setModal(null);
  };

  const adicionarTamanhoInline = () => {
    const n = novoTamanhoInline.trim().toUpperCase();
    if(!n) return addToast('Informe o nome do tamanho','error');
    if(tamanhos.find(t=>t.nome===n)) { setForm(f=>({...f,tamanho:n})); setShowNovoTamanho(false); return; }
    setTamanhos(ts=>[...ts,{id:'tam'+Date.now(),nome:n,obs:novoTamanhoObs.trim()}]);
    setForm(f=>({...f,tamanho:n}));
    setNovoTamanhoInline(''); setNovoTamanhoObs(''); setShowNovoTamanho(false);
    addToast('Tamanho "'+n+'" criado e selecionado!','success');
  };

  const doTransfer = () => {
    const prod=products.find(p=>p.id===transfer.productId);
    if(!prod) return addToast('Selecione um produto','error');
    if(prod.qty<transfer.qty) return addToast('Estoque insuficiente','error');
    const to=prod.store==='Cosmos'?'Nova Cidade':'Cosmos';
    setProducts(ps=>ps.map(p=>{
      if(p.id===prod.id) return {...p,qty:p.qty-transfer.qty};
      if(p.code===prod.code&&p.store===to) return {...p,qty:p.qty+transfer.qty};
      return p;
    }));
    addMovement(prod.id,'transferência',transfer.qty,'Transferido para '+to);
    addToast('Transferido para '+to,'success'); setModal(null);
  };

  const doAdjust = () => {
    if(!adjust.productId) return addToast('Selecione um produto','error');
    // Se especificou loja diferente, achar o produto naquela loja
    const prodBase = products.find(p=>p.id===adjust.productId);
    if(!prodBase) return addToast('Produto não encontrado','error');
    const lojaAlvo = adjust.lojaDestino || prodBase.store;
    // Tentar achar produto na loja destino (mesmo código)
    const prodNaLoja = products.find(p=>p.code===prodBase.code&&p.store===lojaAlvo) || prodBase;
    setProducts(ps=>ps.map(p=>p.id===prodNaLoja.id?{...p,qty:adjust.type==='entrada'?p.qty+Number(adjust.qty):Math.max(0,p.qty-Number(adjust.qty))}:p));
    addMovement(prodNaLoja.id,adjust.type,Number(adjust.qty),(adjust.note||'Ajuste manual')+' ['+lojaAlvo+']');
    addToast('Estoque ajustado em '+lojaAlvo+'!','success'); setModal(null); setAdjustSearch('');
  };

  const handleDeleteProduct = (p) => {
    if (!isAdmin) return;
    setConfirm({
      icon:'🗑️', titulo:'Excluir Produto', msg:`Excluir "${p.description}"? O histórico de vendas será mantido.`,
      btnLabel:'Excluir', btnClass:'btn-danger',
      onConfirm: () => { setProducts(ps=>ps.filter(p2=>p2.id!==p.id)); addToast('Produto excluído','info'); setConfirm(null); }
    });
  };

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="tabs" style={{marginBottom:16}}>
        <div className={`tab ${stockTab==='todos'?'active':''}`} onClick={()=>setStockTab('todos')}>Todos os Produtos</div>
        <div className={`tab ${stockTab==='reposicao'?'active':''}`} onClick={()=>setStockTab('reposicao')}>Reposição Urgente</div>
      </div>

      {stockTab==='todos' && <>
        <div className="flex items-center gap-12 mb-16" style={{flexWrap:'wrap'}}>
          <div className="search-bar" style={{flex:1,minWidth:160}}><span className="search-icon">⌕</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produto..."/></div>
          <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}><option>Todos</option>{(lojas||['Cosmos','Nova Cidade']).map(l=><option key={l}>{l}</option>)}</select>
          {isAdmin && <>
            <button className="btn btn-sm btn-outline" onClick={()=>setModal('adjust')}>± Ajustar</button>
            <button className="btn btn-sm btn-outline" onClick={()=>setModal('transfer')}>⇄ Transferir</button>
          </>}
          <button className="btn btn-sm btn-outline" onClick={()=>setModal('history')}>≡ Histórico</button>
          {isAdmin && <>
            <button className="btn btn-sm btn-success" onClick={()=>{setAdjust({productId:'',type:'entrada',qty:0,note:''});setModal('adjust');}}>↑ Dar Entrada</button>
            <button className="btn btn-sm btn-white" onClick={()=>{setForm({code:'',description:'',store:'Cosmos',qty:0,costPrice:0,salePrice:0,photo:null});setModal('add')}}>+ Novo</button>
          </>}
        </div>
        <div className="card"><div className="table-wrap"><table>
          <thead><tr><th></th><th>Código</th><th>Produto</th><th>Tam.</th><th>Loja / Distribuição</th><th>Total</th><th>Compra</th><th>Venda</th><th>Margem</th>{isAdmin&&<th></th>}</tr></thead>
          <tbody>{filtered.map(p=>{
            const margin=p.salePrice>0?((p.salePrice-p.costPrice)/p.salePrice*100):0;
            const isConsolidated = filterStore==='Todos' && p.lojas && p.lojas.length>1;
            return (
              <tr key={p.id}>
                <td>{p.photo?<img src={p.photo} style={{width:36,height:36,borderRadius:6,objectFit:'cover',border:'1px solid var(--bg5)'}} alt=""/>:<div style={{width:36,height:36,borderRadius:6,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,opacity:.4}}>▦</div>}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--g3)'}}>{p.code}</td>
                <td style={{fontWeight:500,color:'var(--text)'}}>{p.description}</td>
                <td>{p.tamanho?<span className="badge badge-gray">{p.tamanho}</span>:<span style={{color:'var(--g2)',fontSize:11}}>—</span>}</td>
                <td>
                  {isConsolidated
                    ? <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {p.lojas.map(l=><span key={l.id} style={{fontSize:10,background:'var(--bg4)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'2px 6px',color:'var(--g4)'}}>{l.store}: {l.qty}</span>)}
                      </div>
                    : <span className="badge badge-gray">{p.store}</span>
                  }
                </td>
                <td><span className={`badge ${p.qty<=5?'badge-red':p.qty<=15?'badge-yellow':'badge-green'}`}>{p.qty}</span></td>
                <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--g3)'}}>{fmtMoney(p.costPrice)}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:'var(--text)'}}>{fmtMoney(p.salePrice)}</td>
                <td><span className={`badge ${margin>=40?'badge-green':margin>=20?'badge-yellow':'badge-red'}`}>{margin.toFixed(0)}%</span></td>
                {isAdmin&&<td><div className="flex gap-8">
                  <button className="btn-icon" onClick={()=>openEdit(p)} title="Editar">✎</button>
                  <button className="btn-icon" onClick={()=>handleDeleteProduct(p)} style={{color:'var(--danger)'}} title="Excluir">🗑</button>
                </div></td>}
              </tr>
            );
          })}</tbody>
        </table></div></div>
      </>}

      {stockTab==='reposicao' && <ReposicaoUrgente products={products} sales={sales} onEdit={isAdmin?openEdit:null}
        onDarEntrada={isAdmin?(p)=>{setAdjust({productId:p.lojas?.[0]?.id||p.id,type:'entrada',qty:0,note:''});setAdjustSearch(p.description);setModal('adjust');}:null}
      />}

      {(modal==='add'||modal==='edit')&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header"><h3>{modal==='add'?'NOVO PRODUTO':'EDITAR PRODUTO'}</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--g3)',marginBottom:6}}>Foto do Produto (opcional)</div>
              <ImgDropzone value={form.photo} onChange={v=>setForm(f=>({...f,photo:v}))}/>
            </div>
            <div className="form-row cols-2">
              <div className="form-field">
                <label>Código <span style={{fontSize:9,color:'var(--g3)'}}>(deixe vazio para gerar automático)</span></label>
                <div style={{display:'flex',gap:6}}>
                  <input value={form.code} onChange={e=>setForm(f=>({...f,code:e.target.value}))} placeholder="Automático"/>
                  <button type="button" className="btn btn-sm btn-outline" onClick={()=>setForm(f=>({...f,code:gerarCodigo()}))} style={{whiteSpace:'nowrap',flexShrink:0}}>🎲 Gerar</button>
                </div>
              </div>
              <div className="form-field"><label>Loja</label><select value={form.store} onChange={e=>setForm(f=>({...f,store:e.target.value}))}>{lojas.map(l=><option key={l}>{l}</option>)}</select></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Descrição *</label><input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Nome do produto"/></div></div>

            {/* VARIAÇÃO */}
            <div className="form-row"><div className="form-field">
              <label>Tamanhos</label>
              <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <button type="button" className={"btn btn-sm "+(!form.temVariacao&&!form.modoMultiplo?"btn-white":"btn-outline")} onClick={()=>setForm(f=>({...f,temVariacao:false,tamanho:"",modoMultiplo:false,variacoes:[]}))}>Sem tamanho</button>
                <button type="button" className={"btn btn-sm "+(form.temVariacao&&!form.modoMultiplo?"btn-white":"btn-outline")} onClick={()=>setForm(f=>({...f,temVariacao:true,modoMultiplo:false}))}>Um tamanho</button>
                <button type="button" className={"btn btn-sm "+(form.modoMultiplo?"btn-white":"btn-outline")} onClick={()=>setForm(f=>({...f,temVariacao:false,modoMultiplo:true,variacoes:tamanhos.length?tamanhos.map(t=>({tamanho:t.nome,qty:0})):[{tamanho:"P",qty:0},{tamanho:"M",qty:0},{tamanho:"G",qty:0}]}))}>Vários tamanhos</button>
              </div>
              {form.temVariacao&&!form.modoMultiplo&&(<div>
                <select value={form.tamanho} onChange={e=>e.target.value==="__novo__"?setShowNovoTamanho(true):setForm(f=>({...f,tamanho:e.target.value}))} style={{background:"var(--bg3)",border:"1px solid var(--bg5)",borderRadius:"var(--r)",padding:"8px 10px",color:"var(--text)",fontSize:13,width:"100%"}}>
                  <option value="">Selecionar tamanho...</option>
                  {tamanhos.map(t=><option key={t.id} value={t.nome}>{t.nome}{t.obs?" ("+t.obs+")":""}</option>)}
                  <option value="__novo__">+ Novo tamanho</option>
                </select>
                {showNovoTamanho&&(<div style={{marginTop:8,padding:10,background:"var(--bg3)",border:"1px solid var(--bg5)",borderRadius:"var(--r)"}}>
                  <div style={{display:"flex",gap:6,marginBottom:6}}>
                    <input value={novoTamanhoInline} onChange={e=>setNovoTamanhoInline(e.target.value.toUpperCase())} placeholder="Ex: 2XG" style={{flex:1,background:"var(--bg4)",border:"1px solid var(--bg5)",borderRadius:"var(--r)",padding:"6px 8px",color:"var(--text)",fontSize:13}}/>
                    <input value={novoTamanhoObs} onChange={e=>setNovoTamanhoObs(e.target.value)} placeholder="Obs" style={{flex:1,background:"var(--bg4)",border:"1px solid var(--bg5)",borderRadius:"var(--r)",padding:"6px 8px",color:"var(--text)",fontSize:13}}/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button type="button" className="btn btn-sm btn-white" onClick={adicionarTamanhoInline}>Salvar</button>
                    <button type="button" className="btn btn-sm btn-outline" onClick={()=>setShowNovoTamanho(false)}>Cancelar</button>
                  </div>
                </div>)}
              </div>)}
              {form.modoMultiplo&&(<div>
                <div style={{fontSize:11,color:"var(--subtext)",marginBottom:8}}>Quantidade por tamanho (0 = não cadastrar):</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {(form.variacoes||[]).map((v,i)=>(
                    <div key={i} style={{background:"var(--bg3)",border:"1px solid var(--bg5)",borderRadius:"var(--r)",padding:"8px",textAlign:"center"}}>
                      <div style={{fontWeight:700,fontSize:12,color:"var(--text)",marginBottom:4}}>{v.tamanho}</div>
                      <input type="number" min="0" value={v.qty} onChange={e=>{const nv=(form.variacoes||[]).map((x,j)=>j===i?{...x,qty:e.target.value}:x);setForm(f=>({...f,variacoes:nv}));}} style={{width:"100%",background:"var(--bg4)",border:"1px solid var(--bg5)",borderRadius:"var(--r)",padding:"5px 2px",color:"var(--text)",fontSize:14,fontWeight:700,textAlign:"center",boxSizing:"border-box"}}/>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:6,fontSize:11,color:"var(--success)"}}>Total: {(form.variacoes||[]).reduce((a,v)=>a+(Number(v.qty)||0),0)} un em {(form.variacoes||[]).filter(v=>Number(v.qty)>0).length} tamanho(s)</div>
              </div>)}
            </div></div>
            {!form.modoMultiplo&&<div className="form-row cols-3">
              <div className="form-field"><label>Quantidade</label><input type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
              <div className="form-field"><label>Compra (R$)</label><input type="number" step="0.01" value={form.costPrice} onChange={e=>setForm(f=>({...f,costPrice:e.target.value}))}/></div>
              <div className="form-field"><label>Venda (R$)</label><input type="number" step="0.01" value={form.salePrice} onChange={e=>setForm(f=>({...f,salePrice:e.target.value}))}/></div>
            </div>}
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-white" onClick={saveProduct}>Salvar</button></div>
        </div></div>
      )}

      {modal==='transfer'&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>TRANSFERIR ESTOQUE</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row"><div className="form-field"><label>Produto</label>
              <select value={transfer.productId} onChange={e=>setTransfer(t=>({...t,productId:e.target.value}))}>
                <option value="">Selecionar...</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.description} ({p.store} · {p.qty})</option>)}
              </select>
            </div></div>
            <div className="form-row"><div className="form-field"><label>Quantidade</label><input type="number" min="1" value={transfer.qty} onChange={e=>setTransfer(t=>({...t,qty:parseInt(e.target.value)||1}))}/></div></div>
            {transfer.productId&&<div style={{padding:10,background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12,color:'var(--g3)'}}>
              Destino: <strong style={{color:'var(--text)'}}>{products.find(p=>p.id===transfer.productId)?.store==='Cosmos'?'Nova Cidade':'Cosmos'}</strong>
            </div>}
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-white" onClick={doTransfer}>Transferir</button></div>
        </div></div>
      )}

      {modal==='adjust'&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>AJUSTE DE ESTOQUE</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row"><div className="form-field">
              <label>Buscar produto</label>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                <div className="search-bar" style={{flex:1}}><span className="search-icon">⌕</span><input value={adjustSearch} onChange={e=>setAdjustSearch(e.target.value)} placeholder="Código ou nome..."/></div>
                <button className={`barcode-btn ${showAdjustScanner?'active':''}`} onClick={()=>setShowAdjustScanner(s=>!s)} type="button">📷</button>
              </div>
              {showAdjustScanner && <BarcodeScanner onDetect={code=>{setAdjustSearch(code);setShowAdjustScanner(false);const p=products.find(x=>x.code===code);if(p)setAdjust(a=>({...a,productId:p.id}));}} onClose={()=>setShowAdjustScanner(false)}/>}
              {adjustSearch && (
                <div style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',maxHeight:160,overflowY:'auto',marginBottom:8}}>
                  {products.filter(p=>p.code.toLowerCase().includes(adjustSearch.toLowerCase())||p.description.toLowerCase().includes(adjustSearch.toLowerCase())).map(p=>(
                    <div key={p.id} style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--bg4)',fontSize:13,color:'var(--text)',display:'flex',alignItems:'center',gap:8}} onClick={()=>{setAdjust(a=>({...a,productId:p.id}));setAdjustSearch('');}}>
                      {p.photo&&<img src={p.photo} style={{width:28,height:28,borderRadius:4,objectFit:'cover'}} alt=""/>}
                      <div><strong>{p.description}</strong><small style={{color:'var(--g3)',marginLeft:8}}>{p.code} · {p.store} · {p.qty} un.</small></div>
                    </div>
                  ))}
                </div>
              )}
              {adjust.productId && <div style={{padding:'8px 12px',background:'rgba(68,255,136,.06)',border:'1px solid rgba(68,255,136,.2)',borderRadius:'var(--r)',fontSize:12,color:'var(--success)'}}>
                ✓ {products.find(p=>p.id===adjust.productId)?.description} — {products.find(p=>p.id===adjust.productId)?.qty} em estoque
              </div>}
            </div></div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Tipo</label>
                <select value={adjust.type} onChange={e=>setAdjust(a=>({...a,type:e.target.value}))}><option value="entrada">Entrada</option><option value="saída">Saída</option></select>
              </div>
              <div className="form-field"><label>Quantidade</label><input type="number" min="1" value={adjust.qty} onChange={e=>setAdjust(a=>({...a,qty:e.target.value}))}/></div>
            </div>
            <div className="form-row">
              <div className="form-field"><label>Loja (onde entra o produto)</label>
                <select value={adjust.lojaDestino} onChange={e=>setAdjust(a=>({...a,lojaDestino:e.target.value}))} style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 10px',color:'var(--text)',fontSize:13,width:'100%'}}>
                  <option value="">Mesma loja do produto</option>
                  {lojas.map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row"><div className="form-field"><label>Observação</label><input value={adjust.note} onChange={e=>setAdjust(a=>({...a,note:e.target.value}))} placeholder="Motivo, fornecedor, NF..."/></div></div>
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-white" onClick={doAdjust}>Confirmar</button></div>
        </div></div>
      )}

      {modal==='history'&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header"><h3>HISTÓRICO DE MOVIMENTAÇÕES</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            {history.length===0?<div className="empty-state"><div className="icon">≡</div><p>Sem movimentações</p></div>:
            <div className="table-wrap"><table>
              <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Obs.</th></tr></thead>
              <tbody>{[...history].reverse().map(h=>{
                const prod=products.find(p=>p.id===h.productId);
                return (<tr key={h.id}><td style={{fontSize:11}}>{fmtDate(h.date)}</td><td style={{color:'var(--text)',fontSize:12}}>{prod?.description||'—'}</td><td><span className={`badge ${h.type==='entrada'?'badge-green':h.type==='saída'?'badge-red':'badge-blue'}`}>{h.type}</span></td><td style={{color:'var(--text)'}}>{h.qty}</td><td style={{color:'var(--g3)',fontSize:11}}>{h.note}</td></tr>);
              })}</tbody>
            </table></div>}
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(null)}>Fechar</button></div>
        </div></div>
      )}
    </div>
  );
}

function ReposicaoUrgente({ products, sales, onEdit, onDarEntrada }) {
  const agora = Date.now();
  const trinta = 30*24*60*60*1000;
  const vendasRecentes = (sales||[]).filter(s=>agora-new Date(s.date).getTime()<trinta);
  // consolidar vendas por código de produto
  const vendasPorCodigo = {};
  vendasRecentes.forEach(s=>(s.items||[]).forEach(item=>{
    const prod = products.find(p=>p.id===item.productId);
    const key = prod?.code||item.productId;
    vendasPorCodigo[key]=(vendasPorCodigo[key]||0)+item.qty;
  }));
  // consolidar estoque por código
  const estoqueMap = {};
  products.forEach(p=>{
    if(!estoqueMap[p.code]) estoqueMap[p.code]={...p,qty:0,lojas:[]};
    estoqueMap[p.code].qty += p.qty;
    estoqueMap[p.code].lojas.push({store:p.store,qty:p.qty,id:p.id});
  });
  const lista = Object.values(estoqueMap).filter(p=>p.qty<=10).map(p=>{
    const vendas30=vendasPorCodigo[p.code]||0;
    let urgencia,cor,label,bgColor;
    if(p.qty===0&&vendas30>=5){urgencia=1;cor='var(--danger)';label='CRÍTICO';bgColor='rgba(255,68,68,.06)';}
    else if(p.qty===0&&vendas30>0){urgencia=2;cor='var(--danger)';label='ZERADO';bgColor='rgba(255,68,68,.05)';}
    else if(p.qty===0){urgencia=3;cor='var(--warning)';label='ZERADO';bgColor='rgba(255,204,0,.04)';}
    else if(p.qty<=3&&vendas30>=5){urgencia=4;cor='var(--danger)';label='URGENTE';bgColor='rgba(255,68,68,.04)';}
    else if(p.qty<=5&&vendas30>=3){urgencia=5;cor='var(--warning)';label='ALTO';bgColor='rgba(255,204,0,.03)';}
    else if(p.qty<=10&&vendas30>=2){urgencia=6;cor='var(--info)';label='MÉDIO';bgColor='rgba(68,170,255,.03)';}
    else{urgencia=7;cor='var(--g3)';label='BAIXO';bgColor='transparent';}
    return {...p,vendas30,urgencia,cor,label,bgColor};
  }).sort((a,b)=>a.urgencia-b.urgencia);

  if(lista.length===0) return (
    <div className="card" style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:48,marginBottom:12}}>✅</div>
      <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:2,color:'var(--success)'}}>ESTOQUE OK</div>
      <div style={{fontSize:12,color:'var(--g3)',marginTop:4}}>Nenhum produto precisa de reposição no momento</div>
    </div>
  );

  const grupos = [
    {label:'🔴 Crítico / Zerado',items:lista.filter(p=>p.urgencia<=3),border:'rgba(255,68,68,.3)'},
    {label:'🟠 Urgente',items:lista.filter(p=>p.urgencia===4),border:'rgba(255,68,68,.2)'},
    {label:'🟡 Atenção',items:lista.filter(p=>p.urgencia===5||p.urgencia===6),border:'rgba(255,204,0,.2)'},
    {label:'⚪ Baixo movimento',items:lista.filter(p=>p.urgencia===7),border:'rgba(128,128,128,.15)'},
  ].filter(g=>g.items.length>0);

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="grid-4">
        {[
          {l:'Crítico/Zerado',v:lista.filter(p=>p.urgencia<=3).length,c:'red'},
          {l:'Urgente',v:lista.filter(p=>p.urgencia===4).length,c:'red'},
          {l:'Atenção',v:lista.filter(p=>p.urgencia===5||p.urgencia===6).length,c:'yellow'},
          {l:'Total p/ Repor',v:lista.length,c:'white'},
        ].map(({l,v,c})=>(
          <div key={l} className={`stat-card ${c}`}><div className="stat-label">{l}</div><div className="stat-value">{v}</div></div>
        ))}
      </div>

      {grupos.map(grupo=>(
        <div key={grupo.label}>
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:14,letterSpacing:2,color:'var(--g3)',marginBottom:8,paddingLeft:4}}>{grupo.label}</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {grupo.items.map(p=>(
              <div key={p.code} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--card-bg)',border:`1px solid ${grupo.border}`,borderRadius:'var(--rl)',borderLeft:`4px solid ${p.cor}`}}>
                {p.photo
                  ? <img src={p.photo} style={{width:40,height:40,borderRadius:6,objectFit:'cover',flexShrink:0}} alt=""/>
                  : <div style={{width:40,height:40,borderRadius:6,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:.3,flexShrink:0,fontSize:16}}>▦</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.description}</div>
                  <div style={{fontSize:10,color:'var(--g3)',marginTop:2}}>{p.code}
                    {p.lojas?.length>1 && p.lojas.map(l=>(
                      <span key={l.id} style={{marginLeft:8,background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:3,padding:'1px 5px'}}>{l.store}: {l.qty}</span>
                    ))}
                  </div>
                </div>
                <div style={{textAlign:'center',minWidth:60}}>
                  <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:22,color:p.cor,lineHeight:1}}>{p.qty}</div>
                  <div style={{fontSize:9,color:'var(--g3)'}}>em estoque</div>
                </div>
                <div style={{textAlign:'center',minWidth:50}}>
                  <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:700,color:'var(--text)'}}>{p.vendas30}</div>
                  <div style={{fontSize:9,color:'var(--g3)'}}>vendas/30d</div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  {onDarEntrada&&<button className="btn btn-sm btn-success" onClick={()=>onDarEntrada(p)} title="Dar entrada">↑ Entrada</button>}
                  {onEdit&&<button className="btn btn-sm btn-outline" onClick={()=>onEdit(p)}>✎</button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ===== ITEM 3: CLIENTES =====
function Clients() {
  const { clients, setClients, deleteClient, sales, addToast, currentUser } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({name:'',phone:'',email:'',cpf:'',rua:'',numero:'',bairro:'',note:''});
  const [editId, setEditId] = useState(null);
  const [search, setSearch] = useState('');
  const [confirm, setConfirm] = useState(null);

  const filtered = clients.filter(c=>!search||(c.name.toLowerCase().includes(search.toLowerCase())||(c.phone||'').includes(search)||(c.cpf||'').includes(search)));

  const openAdd = () => { setForm({name:'',phone:'',email:'',cpf:'',rua:'',numero:'',bairro:'',note:''}); setEditId(null); setModal('form'); };
  const openEdit = (c) => { setForm({...c}); setEditId(c.id); setModal('form'); };

  const save = () => {
    if(!form.name) return addToast('Informe o nome','error');
    if(editId) setClients(cs=>cs.map(c=>c.id===editId?{...c,...form}:c));
    else setClients(cs=>[...cs,{...form,id:'cli'+Date.now(),createdAt:new Date().toISOString()}]);
    addToast('Cliente salvo!','success'); setModal(null);
  };

  const handleDelete = (c) => {
    setConfirm({
      icon:'🗑️', titulo:'Excluir Cliente', msg:`Excluir "${c.name}"? Histórico de vendas é mantido.`,
      btnLabel:'Excluir', btnClass:'btn-danger',
      onConfirm: () => { deleteClient(c.id); addToast('Cliente removido','info'); setConfirm(null); }
    });
  };

  const getClientStats = (id) => {
    const cs = sales.filter(s=>s.clientId===id);
    return { count: cs.length, total: cs.reduce((a,s)=>a+s.total,0) };
  };

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="flex items-center justify-between mb-16" style={{flexWrap:'wrap',gap:10}}>
        <div className="search-bar" style={{flex:1,minWidth:160,maxWidth:320}}><span className="search-icon">⌕</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome, telefone..."/></div>
        <button className="btn btn-white" onClick={openAdd}>+ Novo Cliente</button>
      </div>
      <div className="card">
        <div className="table-wrap"><table>
          <thead><tr><th>Nome</th><th>Telefone</th><th>Endereço</th><th>CPF</th><th>Compras</th><th>Total Gasto</th><th>Desde</th>{isAdmin&&<th></th>}</tr></thead>
          <tbody>{filtered.map(c=>{
            const stats = getClientStats(c.id);
            const endereco = [c.rua, c.numero, c.bairro].filter(Boolean).join(', ');
            return (
              <tr key={c.id}>
                <td style={{fontWeight:600,color:'var(--text)'}}>{c.name}</td>
                <td style={{fontSize:12,color:'var(--g3)'}}>{c.phone||'—'}</td>
                <td style={{fontSize:11,color:'var(--g3)'}}>{endereco||'—'}</td>
                <td style={{fontSize:11,color:'var(--g3)',fontFamily:'DM Mono,monospace'}}>{c.cpf||'—'}</td>
                <td style={{color:'var(--text)'}}>{stats.count}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--success)'}}>{fmtMoney(stats.total)}</td>
                <td style={{fontSize:11,color:'var(--g3)'}}>{fmtDate(c.createdAt)}</td>
                {isAdmin&&<td><div className="flex gap-8">
                  <button className="btn-icon" onClick={()=>openEdit(c)}>✎</button>
                  <button className="btn-icon" onClick={()=>handleDelete(c)} style={{color:'var(--danger)'}}>🗑</button>
                </div></td>}
              </tr>
            );
          })}
          {filtered.length===0&&<tr><td colSpan="8"><div className="empty-state"><div className="icon">◑</div><p>Nenhum cliente cadastrado</p></div></td></tr>}
          </tbody>
        </table></div>
      </div>

      {modal==='form'&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>{editId?'EDITAR CLIENTE':'NOVO CLIENTE'}</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row cols-2">
              <div className="form-field"><label>Nome *</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="form-field"><label>Telefone</label><input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="(00) 00000-0000"/></div>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>CPF</label><input value={form.cpf} onChange={e=>setForm(f=>({...f,cpf:e.target.value}))} placeholder="000.000.000-00"/></div>
              <div className="form-field"><label>E-mail</label><input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="email@exemplo.com"/></div>
            </div>
            <div className="form-row cols-3">
              <div className="form-field" style={{gridColumn:'span 2'}}><label>Rua</label><input value={form.rua} onChange={e=>setForm(f=>({...f,rua:e.target.value}))} placeholder="Nome da rua"/></div>
              <div className="form-field"><label>Número</label><input value={form.numero} onChange={e=>setForm(f=>({...f,numero:e.target.value}))} placeholder="Nº"/></div>
            </div>
            <div className="form-row">
              <div className="form-field"><label>Bairro</label><input value={form.bairro} onChange={e=>setForm(f=>({...f,bairro:e.target.value}))} placeholder="Nome do bairro"/></div>
            </div>
            <div className="form-row">
              <div className="form-field"><label>Observação</label><textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Preferências, observações..."/></div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-white" onClick={save}>Salvar</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ===== ITEM 2 + 4: Rankings com edição de meta inline + ranking clientes =====
function Rankings() {
  const { sales, products, sellers, goals, setGoals, clients, lojas, addToast, currentUser } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [tab, setTab] = useState('sellers');
  const {m,y} = thisMonth();
  // ITEM 2: modal de meta inline
  const [editGoal, setEditGoal] = useState(null);
  const [goalVal, setGoalVal] = useState('');

  const saveGoal = () => {
    if(!goalVal) return;
    setGoals(gs=>{
      const ex=gs.findIndex(g=>g.sellerId===editGoal.sellerId&&g.month===m&&g.year===y);
      if(ex>=0) return gs.map((g,i)=>i===ex?{...g,goal:Number(goalVal),sellerId:editGoal.sellerId,month:m,year:y}:g);
      return [...gs,{id:'goal_'+editGoal.sellerId+'_'+m+'_'+y,sellerId:editGoal.sellerId,month:m,year:y,goal:Number(goalVal)}];
    });
    addToast('Meta atualizada!','success'); setEditGoal(null);
  };

  const sellerRank = sellers.filter(s=>s.role==='seller').map(s=>{
    const total=sales.filter(x=>x.sellerId===s.id).reduce((a,x)=>a+x.total,0);
    const monthTotal=sales.filter(x=>x.sellerId===s.id&&isSameMonth(x.date,m,y)).reduce((a,x)=>a+x.total,0);
    const goal=goals.find(g=>g.sellerId===s.id&&g.month===m&&g.year===y);
    const pct=goal?Math.min((monthTotal/goal.goal)*100,100):0;
    return {...s,total,count:sales.filter(x=>x.sellerId===s.id).length,monthTotal,goal:goal?.goal||0,pct};
  }).sort((a,b)=>b.total-a.total);

  // ITEM 4: ranking clientes
  const clientRank = clients.map(c=>{
    const cs=sales.filter(s=>s.clientId===c.id);
    const monthCs=cs.filter(s=>isSameMonth(s.date,m,y));
    return {...c,totalGasto:cs.reduce((a,s)=>a+s.total,0),totalCompras:cs.length,mesGasto:monthCs.reduce((a,s)=>a+s.total,0)};
  }).sort((a,b)=>b.totalGasto-a.totalGasto);

  const [filterRankStore, setFilterRankStore] = useState('Todos');

  // Consolida produtos por código para ranking
  const prodRank = (() => {
    const allItems = sales
      .filter(s=>filterRankStore==='Todos'||s.store===filterRankStore)
      .flatMap(s=>s.items||[]);
    const map = {};
    allItems.forEach(item=>{
      const prod = products.find(p=>p.id===item.productId);
      if(!prod) return;
      const key = prod.code;
      if(!map[key]) map[key]={...prod,soldQty:0,soldTotal:0,estoqueTotal:0};
      map[key].soldQty += item.qty;
      map[key].soldTotal += item.total;
    });
    // somar estoque total de todas as lojas
    products.forEach(p=>{
      if(map[p.code]) map[p.code].estoqueTotal += p.qty;
      else map[p.code] = {...p,soldQty:0,soldTotal:0,estoqueTotal:p.qty};
    });
    return Object.values(map).filter(p=>p.soldQty>0||true).sort((a,b)=>b.soldQty-a.soldQty);
  })();

  return (
    <div>
      {editGoal && (
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>EDITAR META — {editGoal.name}</h3><div className="close-btn" onClick={()=>setEditGoal(null)}>✕</div></div>
          <div className="modal-body">
            <div className="form-field">
              <label>Meta do mês (R$)</label>
              <input type="number" step="100" value={goalVal} onChange={e=>setGoalVal(e.target.value)} placeholder="Ex: 5000" autoFocus onKeyDown={e=>e.key==='Enter'&&saveGoal()}/>
            </div>
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setEditGoal(null)}>Cancelar</button><button className="btn btn-white" onClick={saveGoal}>Salvar</button></div>
        </div></div>
      )}
      <div className="tabs">
        <div className={`tab ${tab==='sellers'?'active':''}`} onClick={()=>setTab('sellers')}>Vendedores</div>
        <div className={`tab ${tab==='products'?'active':''}`} onClick={()=>setTab('products')}>Produtos</div>
        <div className={`tab ${tab==='stores'?'active':''}`} onClick={()=>setTab('stores')}>Lojas</div>
        <div className={`tab ${tab==='clients'?'active':''}`} onClick={()=>setTab('clients')}>Melhores Clientes</div>
      </div>

      {tab==='sellers'&&(
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>RANKING DE VENDEDORES</div>
          {sellerRank.map((s,i)=>(
            <div key={s.id} className="rank-item">
              <div className={`rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}`}>{i+1}</div>
              <div className="rank-avatar">{s.photo?<img src={s.photo} alt=""/>:initials(s.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{s.name}</div>
                <div style={{fontSize:10,color:'var(--g3)'}}>{s.store} · {s.count} vendas · Mês: {fmtMoney(s.monthTotal)}</div>
                {s.goal>0&&<div style={{marginTop:4}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:9,color:'var(--g3)'}}>Meta: {fmtMoney(s.goal)}</span>
                    <span style={{fontSize:9,color:s.pct>=100?'var(--success)':s.pct>=70?'var(--warning)':'var(--danger)'}}>{s.pct.toFixed(0)}%</span>
                  </div>
                  <div className="progress-bar" style={{height:3}}><div className={`progress-fill ${s.pct>=100?'green':s.pct>=70?'yellow':'red'}`} style={{width:`${s.pct}%`}}/></div>
                </div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:700,color:'var(--text)'}}>{fmtMoney(s.total)}</div>
                {isAdmin&&<button className="btn btn-sm btn-outline" onClick={()=>{setEditGoal(s);setGoalVal(s.goal||'');}}>🎯 Meta</button>}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='products'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,color:'var(--text)'}}>TOP PRODUTOS</div>
            <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'6px 10px',color:'var(--text)',fontSize:12}} value={filterRankStore} onChange={e=>setFilterRankStore(e.target.value)}>
              <option value="Todos">Todas as Lojas</option>{(lojas||['Cosmos','Nova Cidade']).map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div className="table-wrap"><table>
            <thead><tr><th>#</th><th></th><th>Produto</th><th>Un. Vendidas</th><th>Faturamento</th><th>Estoque Total</th></tr></thead>
            <tbody>{prodRank.slice(0,20).map((p,i)=>(
              <tr key={p.code}>
                <td style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,color:i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--g3)'}}>{i+1}</td>
                <td>{p.photo?<img src={p.photo} style={{width:32,height:32,borderRadius:4,objectFit:'cover'}} alt=""/>:<div style={{width:32,height:32,borderRadius:4,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:.3}}>▦</div>}</td>
                <td style={{fontWeight:500,color:'var(--text)',fontSize:12}}>{p.description}<div style={{fontSize:10,color:'var(--g3)'}}>{p.code}</div></td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{p.soldQty}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text)'}}>{fmtMoney(p.soldTotal)}</td>
                <td><span className={`badge ${p.estoqueTotal<=5?'badge-red':p.estoqueTotal<=15?'badge-yellow':'badge-green'}`}>{p.estoqueTotal}</span></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}

      {tab==='stores'&&(
        <div className="grid-2">
          {(lojas||['Cosmos','Nova Cidade']).map(store=>{
            const t=sales.filter(s=>s.store===store).reduce((a,s)=>a+s.total,0);
            const total=sales.reduce((a,s)=>a+s.total,0);
            const pct=(t/(total||1))*100;
            return (
              <div key={store} className="card">
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:22,letterSpacing:2,marginBottom:4,color:'var(--text)'}}>{store}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:28,color:'var(--text)',marginBottom:4}}>{fmtMoney(t)}</div>
                <div style={{fontSize:11,color:'var(--g3)',marginBottom:14}}>{sales.filter(s=>s.store===store).length} vendas · {pct.toFixed(1)}% do total</div>
                <div className="progress-bar" style={{marginBottom:16}}><div className="progress-fill white" style={{width:`${pct}%`}}/></div>
                {['Dinheiro','Pix','Cartão','A prazo'].map(method=>{
                  const mt=sales.filter(s=>s.store===store).reduce((a,s)=>a+getValorMetodo(s,method),0);
                  const mpct=(mt/(t||1))*100;
                  return (
                    <div key={method} style={{marginBottom:8}}>
                      <div className="flex items-center justify-between" style={{marginBottom:3}}><span style={{fontSize:12,color:'var(--text)'}}>{method}</span><span style={{fontSize:11,color:'var(--g3)'}}>{fmtMoney(mt)} · {mpct.toFixed(0)}%</span></div>
                      <div className="progress-bar"><div className="progress-fill white" style={{width:`${mpct}%`}}/></div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {tab==='clients'&&(
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>MELHORES CLIENTES</div>
          {clientRank.length===0 ? (
            <div className="empty-state"><div className="icon">◑</div><p>Nenhum cliente cadastrado ainda. Adicione clientes em Clientes.</p></div>
          ) : (
            clientRank.map((c,i)=>(
              <div key={c.id} className="rank-item">
                <div className={`rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}`}>{i+1}</div>
                <div className="rank-avatar" style={{fontSize:13,fontWeight:700}}>{initials(c.name)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{c.name}</div>
                  <div style={{fontSize:10,color:'var(--g3)'}}>{c.totalCompras} compras · Este mês: {fmtMoney(c.mesGasto)}</div>
                </div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:700,color:'var(--success)'}}>{fmtMoney(c.totalGasto)}</div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function Returns() {
  const { sales, products, setProducts, returns, setReturns, addToast, addMovement, currentUser } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [modal, setModal] = useState(null);
  const [step, setStep] = useState(1);
  const [selSaleId, setSelSaleId] = useState('');
  const [selItems, setSelItems] = useState([]);
  const [motivo, setMotivo] = useState('');
  const [estornar, setEstornar] = useState(true);
  const [trocaDev, setTrocaDev] = useState([]);
  const [trocaNova, setTrocaNova] = useState([]);
  const [searchTroca, setSearchTroca] = useState('');
  const [showAutoTroca, setShowAutoTroca] = useState(false);
  const [confirm, setConfirm] = useState(null);

  const saleItems = selSaleId ? (sales.find(s=>s.id===selSaleId)?.items||[]) : [];
  const totalDev = trocaDev.reduce((a,i)=>a+i.unitPrice*i.qty,0);
  const totalNova = trocaNova.reduce((a,i)=>a+i.unitPrice*i.qty,0);
  const diff = totalNova - totalDev;

  const toggleSelItem = (item) => setSelItems(prev=>prev.find(i=>i.productId===item.productId)?prev.filter(i=>i.productId!==item.productId):[...prev,{...item}]);
  const addTrocaNova = (p) => { setTrocaNova(prev=>{const ex=prev.find(i=>i.productId===p.id);if(ex)return prev.map(i=>i.productId===p.id?{...i,qty:i.qty+1}:i);return [...prev,{productId:p.id,code:p.code,description:p.description,photo:p.photo||null,qty:1,unitPrice:p.salePrice,store:p.store}];}); setSearchTroca(''); setShowAutoTroca(false); };
  const filtTroca = products.filter(p=>p.qty>0&&(p.code.toLowerCase().includes(searchTroca.toLowerCase())||p.description.toLowerCase().includes(searchTroca.toLowerCase())));

  const confirmarDevolucao = () => {
    if(!selSaleId||selItems.length===0) return addToast('Selecione itens','error');
    if(!motivo) return addToast('Informe o motivo','error');
    setConfirm({
      icon:'↩', titulo:'Confirmar Devolução', msg:`Confirmar devolução de ${selItems.length} item(s)? ${estornar ? 'O valor será estornado.' : 'Sem estorno.'}`,
      btnLabel:'Confirmar', btnClass:'btn-white',
      onConfirm: () => {
        const totalEstorno=selItems.reduce((a,it)=>a+it.unitPrice*it.qty,0);
        const sale=sales.find(s=>s.id===selSaleId);
        const reg={id:'ret'+Date.now(),type:'devolucao',date:new Date().toISOString(),saleId:selSaleId,sellerName:sale?.sellerName||'',store:sale?.store||'',items:selItems,motivo,estornar,totalEstorno:estornar?totalEstorno:0};
        setReturns(r=>[...r,reg]);
        setProducts(ps=>ps.map(p=>{const it=selItems.find(i=>i.productId===p.id);return it?{...p,qty:p.qty+it.qty}:p;}));
        selItems.forEach(it=>addMovement(it.productId,'devolução',it.qty,'Devolução: '+motivo));
        addToast('Devolução registrada!','success');
        setModal(null); setStep(1); setSelSaleId(''); setSelItems([]); setMotivo(''); setEstornar(true); setConfirm(null);
      }
    });
  };

  const confirmarTroca = () => {
    if(trocaDev.length===0||trocaNova.length===0) return addToast('Adicione itens nos dois lados','error');
    setConfirm({
      icon:'⇄', titulo:'Confirmar Troca', msg:`Confirmar troca? ${diff===0?'Valores iguais.':diff>0?`Cliente paga +${fmtMoney(diff)}.`:`Devolver ${fmtMoney(Math.abs(diff))} ao cliente.`}`,
      btnLabel:'Confirmar', btnClass:'btn-white',
      onConfirm: () => {
        const reg={id:'exc'+Date.now(),type:'troca',date:new Date().toISOString(),store:trocaDev[0]?.store||'',itemsDevolvidos:trocaDev,itemsNovos:trocaNova,totalDevolvido:totalDev,totalNovo:totalNova,diferenca:diff};
        setReturns(r=>[...r,reg]);
        setProducts(ps=>ps.map(p=>{const dev=trocaDev.find(i=>i.productId===p.id);const novo=trocaNova.find(i=>i.productId===p.id);let qty=p.qty;if(dev)qty+=dev.qty;if(novo)qty=Math.max(0,qty-novo.qty);return {...p,qty};}));
        trocaDev.forEach(it=>addMovement(it.productId,'devolução troca',it.qty,'Troca'));
        trocaNova.forEach(it=>addMovement(it.productId,'saída troca',it.qty,'Troca'));
        addToast('Troca registrada!','success');
        setModal(null); setTrocaDev([]); setTrocaNova([]); setSearchTroca(''); setConfirm(null);
      }
    });
  };

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="flex items-center justify-between mb-16">
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)'}}>DEVOLUÇÕES & TROCAS</span>
        {isAdmin && <div className="flex gap-8">
          <button className="btn btn-outline" onClick={()=>{setModal('devolucao');setStep(1);}}>↩ Nova Devolução</button>
          <button className="btn btn-white" onClick={()=>{setModal('troca');setTrocaDev([]);setTrocaNova([]);}}>⇄ Nova Troca</button>
        </div>}
      </div>
      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>HISTÓRICO</div>
        {returns.length===0?<div className="empty-state"><div className="icon">↩</div><p>Nenhuma devolução ou troca registrada</p></div>:
        <div className="table-wrap"><table>
          <thead><tr><th>Data</th><th>Tipo</th><th>Loja</th><th>Estorno/Diff</th><th>Motivo</th></tr></thead>
          <tbody>{[...returns].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
            <tr key={r.id}>
              <td style={{fontSize:11}}>{fmtDate(r.date)}</td>
              <td><span className={`badge ${r.type==='troca'?'badge-blue':'badge-yellow'}`}>{r.type==='troca'?'Troca':'Devolução'}</span></td>
              <td><span className="badge badge-gray">{r.store}</span></td>
              <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:r.type==='troca'?(r.diferenca>0?'var(--success)':r.diferenca<0?'var(--danger)':'var(--g3)'):'var(--danger)',fontSize:12}}>
                {r.type==='troca'?(r.diferenca===0?'Igual':r.diferenca>0?'+'+fmtMoney(r.diferenca):'-'+fmtMoney(Math.abs(r.diferenca))):(r.estornar?'-'+fmtMoney(r.totalEstorno):'Sem estorno')}
              </td>
              <td style={{fontSize:11,color:'var(--g3)'}}>{r.motivo||'—'}</td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>
      {modal==='devolucao'&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header"><h3>NOVA DEVOLUÇÃO</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            {step===1&&<>
              <div className="form-field" style={{marginBottom:14}}><label>Selecionar Venda Original</label>
                <select value={selSaleId} onChange={e=>{setSelSaleId(e.target.value);setSelItems([]);}}>
                  <option value="">— Selecione uma venda —</option>
                  {[...sales].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,50).map(s=>(
                    <option key={s.id} value={s.id}>{fmtDate(s.date)} · {s.sellerName} · {fmtMoney(s.total)}</option>
                  ))}
                </select>
              </div>
              {selSaleId&&<>
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:2,marginBottom:8,color:'var(--g3)'}}>SELECIONE OS ITENS A DEVOLVER</div>
                {saleItems.map(item=>(
                  <div key={item.productId} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:6,border:`1px solid ${selItems.find(i=>i.productId===item.productId)?'var(--warning)':'var(--bg5)'}`}}>
                    {item.photo&&<img src={item.photo} style={{width:32,height:32,borderRadius:4,objectFit:'cover'}} alt=""/>}
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{item.description}</div><div style={{fontSize:11,color:'var(--g3)'}}>{item.code} · {fmtMoney(item.unitPrice)} × {item.qty}</div></div>
                    <button className={`btn btn-sm ${selItems.find(i=>i.productId===item.productId)?'btn-white':'btn-outline'}`} onClick={()=>toggleSelItem(item)}>{selItems.find(i=>i.productId===item.productId)?'✓ Selecionado':'Selecionar'}</button>
                  </div>
                ))}
                {selItems.length>0&&<button className="btn btn-white" style={{marginTop:8,width:'100%'}} onClick={()=>setStep(2)}>Próximo →</button>}
              </>}
            </>}
            {step===2&&<>
              <div style={{padding:'12px 16px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:14}}>
                {selItems.map(it=><div key={it.productId} style={{fontSize:13,color:'var(--text)'}}>{it.description} × {it.qty} — {fmtMoney(it.unitPrice*it.qty)}</div>)}
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:18,color:'var(--warning)',marginTop:8}}>Total: {fmtMoney(selItems.reduce((a,i)=>a+i.unitPrice*i.qty,0))}</div>
              </div>
              <div className="form-field" style={{marginBottom:12}}><label>Motivo</label>
                <select value={motivo} onChange={e=>setMotivo(e.target.value)}><option value="">— Selecione —</option><option>Defeito / produto danificado</option><option>Tamanho errado</option><option>Produto diferente do solicitado</option><option>Desistência do cliente</option><option>Outro</option></select>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:14}}>
                <input type="checkbox" id="chk-estorno" checked={estornar} onChange={e=>setEstornar(e.target.checked)} style={{width:16,height:16,accentColor:'var(--warning)'}}/>
                <label htmlFor="chk-estorno" style={{fontSize:13,color:'var(--text)',cursor:'pointer'}}>Estornar valor — <strong style={{color:'var(--danger)'}}>{fmtMoney(selItems.reduce((a,i)=>a+i.unitPrice*i.qty,0))}</strong></label>
              </div>
              <div className="flex gap-8"><button className="btn btn-outline" onClick={()=>setStep(1)}>← Voltar</button><button className="btn btn-white" style={{flex:1}} onClick={confirmarDevolucao}>Confirmar Devolução</button></div>
            </>}
          </div>
        </div></div>
      )}
      {modal==='troca'&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header"><h3>NOVA TROCA</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:16}}>
              <div>
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:2,marginBottom:8,color:'var(--warning)'}}>CLIENTE DEVOLVE</div>
                <div className="form-field" style={{marginBottom:8}}>
                  <select onChange={e=>{const sale=sales.find(s=>s.id===e.target.value);if(sale)setTrocaDev(sale.items.map(i=>({...i,store:sale.store})));e.target.value='';}}><option value="">← Importar de uma venda</option>{[...sales].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,30).map(s=>(<option key={s.id} value={s.id}>{fmtDate(s.date)} · {fmtMoney(s.total)}</option>))}</select>
                </div>
                {trocaDev.map(it=>(<div key={it.productId} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:4}}>{it.photo&&<img src={it.photo} style={{width:28,height:28,borderRadius:4,objectFit:'cover'}} alt=""/>}<div style={{flex:1,fontSize:12,color:'var(--text)'}}>{it.description}<br/><span style={{color:'var(--g3)',fontSize:10}}>{fmtMoney(it.unitPrice)}</span></div><button className="btn-icon" style={{color:'var(--danger)'}} onClick={()=>setTrocaDev(d=>d.filter(i=>i.productId!==it.productId))}>✕</button></div>))}
                {trocaDev.length>0&&<div style={{padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)',fontFamily:'Bebas Neue,sans-serif',color:'var(--warning)'}}>Total devolvido: {fmtMoney(totalDev)}</div>}
              </div>
              <div>
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:2,marginBottom:8,color:'var(--success)'}}>CLIENTE LEVA</div>
                <div className="autocomplete-wrap" style={{marginBottom:8}}>
                  <div className="search-bar"><span className="search-icon">⌕</span><input value={searchTroca} onChange={e=>{setSearchTroca(e.target.value);setShowAutoTroca(true)}} onBlur={()=>setTimeout(()=>setShowAutoTroca(false),200)} placeholder="Buscar produto..."/></div>
                  {showAutoTroca&&searchTroca&&filtTroca.length>0&&(<div className="autocomplete-list">{filtTroca.slice(0,8).map(p=>(<div key={p.id} className="autocomplete-item" style={{display:'flex',alignItems:'center',gap:8}} onMouseDown={()=>addTrocaNova(p)}>{p.photo&&<img src={p.photo} style={{width:28,height:28,borderRadius:4,objectFit:'cover'}} alt=""/>}<div><div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{p.description}</div><small>{p.code} · {fmtMoney(p.salePrice)}</small></div></div>))}</div>)}
                </div>
                {trocaNova.map(it=>(<div key={it.productId} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:4}}><div style={{flex:1,fontSize:12,color:'var(--text)'}}>{it.description}</div><input type="number" min="1" value={it.qty} onChange={e=>setTrocaNova(n=>n.map(i=>i.productId===it.productId?{...i,qty:parseInt(e.target.value)||1}:i))} style={{width:44,background:'var(--bg4)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'3px 5px',color:'var(--text)',fontSize:12}}/><button className="btn-icon" style={{color:'var(--danger)'}} onClick={()=>setTrocaNova(n=>n.filter(i=>i.productId!==it.productId))}>✕</button></div>))}
                {trocaNova.length>0&&<div style={{padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)',fontFamily:'Bebas Neue,sans-serif',color:'var(--success)'}}>Total novo: {fmtMoney(totalNova)}</div>}
              </div>
            </div>
            {trocaDev.length>0&&trocaNova.length>0&&(<div style={{padding:'14px 16px',borderRadius:'var(--r)',marginBottom:14,background:diff===0?'var(--bg3)':diff>0?'rgba(68,255,136,.08)':'rgba(255,68,68,.08)',border:`1px solid ${diff===0?'var(--bg5)':diff>0?'rgba(68,255,136,.3)':'rgba(255,68,68,.3)'}`}}><div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:24,color:diff===0?'var(--g3)':diff>0?'var(--success)':'var(--danger)'}}>{diff===0?'VALORES IGUAIS':diff>0?'CLIENTE PAGA +'+fmtMoney(diff):'DEVOLVER AO CLIENTE '+fmtMoney(Math.abs(diff))}</div></div>)}
            <button className="btn btn-white" style={{width:'100%'}} onClick={confirmarTroca}>Confirmar Troca</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

function Cashflow() {
  const { sales, expenses, setExpenses, returns, addToast, currentUser, lojas } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [filterStore, setFilterStore] = useState('Todos');
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({description:'',amount:0,store:'Cosmos',category:'Aluguel',date:new Date().toISOString().slice(0,10)});
  const [confirm, setConfirm] = useState(null);
  const {m,y} = thisMonth();
  const filtSales=sales.filter(s=>(filterStore==='Todos'||s.store===filterStore)&&isSameMonth(s.date,m,y));
  const filtExp=expenses.filter(e=>(filterStore==='Todos'||e.store===filterStore)&&isSameMonth(e.date,m,y));
  const filtRet=(returns||[]).filter(r=>r.type==='devolucao'&&r.estornar&&(filterStore==='Todos'||r.store===filterStore)&&isSameMonth(r.date,m,y));
  const totalIn=filtSales.reduce((a,s)=>a+s.total,0);
  const totalEstornos=filtRet.reduce((a,r)=>a+r.totalEstorno,0);
  const totalOut=filtExp.reduce((a,e)=>a+e.amount,0);

  const saveExpense = () => {
    if(!form.description||!form.amount) return addToast('Preencha todos os campos','error');
    const amt=Number(String(form.amount).replace(',','.'));
    if(!amt||amt<=0) return addToast('Valor inválido','error');
    setExpenses(ex=>[...ex,{...form,id:'e'+Date.now(),amount:amt,date:form.date?new Date(form.date+'T12:00:00').toISOString():new Date().toISOString()}]);
    addToast('Despesa cadastrada!','success'); setModal(false);
  };

  const handleDeleteExpense = (e) => {
    setConfirm({
      icon:'🗑️', titulo:'Excluir Despesa', msg:`Excluir despesa "${e.description}" de ${fmtMoney(e.amount)}?`,
      btnLabel:'Excluir', btnClass:'btn-danger',
      onConfirm: () => { setExpenses(ex=>ex.filter(x=>x.id!==e.id)); addToast('Despesa removida','info'); setConfirm(null); }
    });
  };

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="flex items-center gap-12 mb-24" style={{flexWrap:'wrap'}}>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}><option>Todos</option>{(lojas||['Cosmos','Nova Cidade']).map(l=><option key={l}>{l}</option>)}</select>
        {isAdmin&&<button className="btn btn-white" onClick={()=>setModal(true)}>+ Nova Despesa</button>}
      </div>
      <div className="grid-4 mb-24">
        <div className="stat-card green"><div className="stat-label">Entradas</div><div className="stat-value">{fmtMoney(totalIn)}</div><div className="stat-icon">↑</div></div>
        <div className="stat-card yellow"><div className="stat-label">Estornos Dev.</div><div className="stat-value">{fmtMoney(totalEstornos)}</div><div className="stat-icon">↩</div></div>
        <div className="stat-card red"><div className="stat-label">Despesas</div><div className="stat-value">{fmtMoney(totalOut)}</div><div className="stat-icon">↓</div></div>
        <div className={`stat-card ${totalIn-totalEstornos-totalOut>=0?'white':'red'}`}><div className="stat-label">Lucro Líquido</div><div className="stat-value">{fmtMoney(totalIn-totalEstornos-totalOut)}</div></div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>ENTRADAS</div>
          <div className="table-wrap table-scroll"><table><thead><tr><th>Data</th><th>Loja</th><th>Vendedor</th><th>Valor</th></tr></thead>
            <tbody>{filtSales.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>(<tr key={s.id}><td style={{fontSize:11}}>{fmtDate(s.date)}</td><td><span className="badge badge-gray">{s.store}</span></td><td style={{fontSize:12,color:'var(--text)'}}>{s.sellerName}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--success)',fontSize:12}}>{fmtMoney(s.total)}</td></tr>))}</tbody>
          </table></div>
        </div>
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>DESPESAS</div>
          <div className="table-wrap table-scroll"><table><thead><tr><th>Descrição</th><th>Cat.</th><th>Loja</th><th>Valor</th>{isAdmin&&<th></th>}</tr></thead>
            <tbody>{filtExp.map(e=>(<tr key={e.id}><td style={{color:'var(--text)',fontSize:12}}>{e.description}</td><td><span className="badge badge-gray">{e.category}</span></td><td><span className="badge badge-gray">{e.store}</span></td><td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--danger)',fontSize:12}}>{fmtMoney(e.amount)}</td>{isAdmin&&<td><button className="btn-icon" onClick={()=>handleDeleteExpense(e)} style={{color:'var(--danger)'}}>🗑</button></td>}</tr>))}</tbody>
          </table></div>
        </div>
      </div>
      {modal&&isAdmin&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>NOVA DESPESA</h3><div className="close-btn" onClick={()=>setModal(false)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row cols-2">
              <div className="form-field"><label>Categoria</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}><option>Aluguel</option><option>Internet</option><option>Água</option><option>Luz</option><option>Outros</option></select></div>
              <div className="form-field"><label>Loja</label><select value={form.store} onChange={e=>setForm(f=>({...f,store:e.target.value}))}>{lojas.map(l=><option key={l}>{l}</option>)}</select></div>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Descrição</label><input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
              <div className="form-field"><label>Valor (R$)</label><input type="number" step="0.01" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Data</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div></div>
          </div>
          <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-white" onClick={saveExpense}>Salvar</button></div>
        </div></div>
      )}
    </div>
  );
}

function CashflowGeral() {
  const { sales, expenses, returns, lojas } = useContext(AppContext);
  const [filterStore, setFilterStore] = useState('Todos');
  const [selYear, setSelYear] = useState(new Date().getFullYear());
  const anos = [...new Set([selYear,...sales.map(s=>new Date(s.date).getFullYear())])].sort((a,b)=>b-a);
  const meses = Array.from({length:12},(_,i)=>i);
  const nomeMes = m => new Date(2000,m,1).toLocaleDateString('pt-BR',{month:'long'});
  const totalEstornos = (m,y) => (returns||[]).filter(r=>r.type==='devolucao'&&r.estornar&&isSameMonth(r.date,m,y)&&(filterStore==='Todos'||r.store===filterStore)).reduce((a,r)=>a+r.totalEstorno,0);
  const rows = meses.map(m=>{
    const vendasM=sales.filter(s=>isSameMonth(s.date,m,selYear)&&(filterStore==='Todos'||s.store===filterStore));
    const despM=expenses.filter(e=>isSameMonth(e.date,m,selYear)&&(filterStore==='Todos'||e.store===filterStore));
    const entradas=vendasM.reduce((a,s)=>a+s.total,0); // total já é subtotal - desconto
    const estornos=totalEstornos(m,selYear);
    const saidas=despM.reduce((a,e)=>a+e.amount,0);
    return {m,entradas,estornos,saidas,lucro:entradas-estornos-saidas,vendas:vendasM.length};
  });
  const totais=rows.reduce((a,r)=>({entradas:a.entradas+r.entradas,estornos:a.estornos+r.estornos,saidas:a.saidas+r.saidas,lucro:a.lucro+r.lucro,vendas:a.vendas+r.vendas}),{entradas:0,estornos:0,saidas:0,lucro:0,vendas:0});
  const exportarCSV = () => {
    const sep='\n',header='Mes;Vendas;Entradas;Estornos;Saidas;Lucro'+sep;
    const body=rows.map(r=>`${nomeMes(r.m)} ${selYear};${r.vendas};${r.entradas.toFixed(2)};${r.estornos.toFixed(2)};${r.saidas.toFixed(2)};${r.lucro.toFixed(2)}`).join(sep);
    const footer=sep+'TOTAL;'+totais.vendas+';'+totais.entradas.toFixed(2)+';'+totais.estornos.toFixed(2)+';'+totais.saidas.toFixed(2)+';'+totais.lucro.toFixed(2);
    const blob=new Blob([header+body+footer],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='balanco_geral_'+selYear+'.csv';a.click();URL.revokeObjectURL(url);
  };
  return (
    <div style={{WebkitOverflowScrolling:'touch',overflowY:'auto',overflowX:'hidden'}}>
      <div className="flex items-center gap-12 mb-16" style={{flexWrap:'wrap'}}>
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)',flex:1}}>BALANÇO GERAL</span>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}><option>Todos</option>{(lojas||['Cosmos','Nova Cidade']).map(l=><option key={l}>{l}</option>)}</select>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={selYear} onChange={e=>setSelYear(+e.target.value)}>{anos.map(y=><option key={y} value={y}>{y}</option>)}</select>
        <button className="btn btn-white" onClick={exportarCSV}>⬇ Exportar CSV</button>
      </div>
      <div className="grid-4 mb-24">
        <div className="stat-card green"><div className="stat-label">Entradas Totais</div><div className="stat-value">{fmtMoney(totais.entradas)}</div></div>
        <div className="stat-card red"><div className="stat-label">Estornos</div><div className="stat-value">{fmtMoney(totais.estornos)}</div></div>
        <div className="stat-card red"><div className="stat-label">Despesas</div><div className="stat-value">{fmtMoney(totais.saidas)}</div></div>
        <div className={`stat-card ${totais.lucro>=0?'white':'red'}`}><div className="stat-label">Lucro Líquido</div><div className="stat-value">{fmtMoney(totais.lucro)}</div></div>
      </div>
      <div className="card"><div className="table-wrap"><table>
        <thead><tr><th>Mês</th><th>Vendas</th><th>Entradas</th><th>Estornos</th><th>Despesas</th><th>Lucro</th></tr></thead>
        <tbody>
          {rows.map(r=>(<tr key={r.m} style={{opacity:r.vendas===0&&r.saidas===0?.4:1}}><td style={{fontWeight:600,color:'var(--text)',textTransform:'capitalize'}}>{nomeMes(r.m)}</td><td style={{color:'var(--g3)',fontSize:12}}>{r.vendas}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--success)',fontSize:12}}>{fmtMoney(r.entradas)}</td><td style={{fontFamily:'DM Mono,monospace',color:'var(--warning)',fontSize:12}}>{r.estornos>0?'-'+fmtMoney(r.estornos):'—'}</td><td style={{fontFamily:'DM Mono,monospace',color:'var(--danger)',fontSize:12}}>{r.saidas>0?fmtMoney(r.saidas):'—'}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:r.lucro>=0?'var(--text)':'var(--danger)',fontSize:13}}>{fmtMoney(r.lucro)}</td></tr>))}
          <tr style={{borderTop:'2px solid var(--bg5)'}}><td style={{fontFamily:'Bebas Neue,sans-serif',letterSpacing:2,color:'var(--text)'}}>TOTAL</td><td style={{fontWeight:700,color:'var(--text)'}}>{totais.vendas}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--success)'}}>{fmtMoney(totais.entradas)}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--warning)'}}>{totais.estornos>0?'-'+fmtMoney(totais.estornos):'—'}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--danger)'}}>{fmtMoney(totais.saidas)}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:totais.lucro>=0?'var(--text)':'var(--danger)',fontSize:15}}>{fmtMoney(totais.lucro)}</td></tr>
        </tbody>
      </table></div></div>
    </div>
  );
}

        if(window.db && window.FIREBASE_CONFIGURED) {
          try { db.collection('sellers').doc(s.id).delete(); } catch(e) {}

            <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg4)',border:'2px solid var(--bg5)',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'var(--text)'}}>
              {s.photo?<img src={s.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(s.name)}
