<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>PIT IMPORT – Sistema de Gestão</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-top:env(safe-area-inset-top,0px)}
#root{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none;transition:all .18s ease}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none;border:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--g1);border-radius:2px}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2d2d2d;
  --g1:#3a3a3a;--g2:#555;--g3:#888;--g4:#aaa;--g5:#ccc;
  --white:#fff;--w2:#f5f5f5;
  --danger:#ff4444;--success:#44ff88;--warning:#ffcc00;--info:#44aaff;
  --text:#fff;--subtext:#888;--border:#222;--card-bg:#111;
  --r:4px;--rl:8px;--shadow:0 2px 12px rgba(0,0,0,.5);--t:.18s ease;
}
.light{
  --bg:#f0f0f0;--bg2:#fff;--bg3:#f5f5f5;--bg4:#e8e8e8;--bg5:#d8d8d8;
  --g1:#c0c0c0;--g2:#999;--g3:#666;--g4:#444;--g5:#222;
  --white:#111;--w2:#222;
  --danger:#cc2222;--success:#22aa55;--warning:#bb9900;--info:#2266cc;
  --text:#111;--subtext:#666;--border:#e0e0e0;--card-bg:#fff;
}
.device-selector{position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:40px}
.device-selector h1{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:8px;color:#fff;text-align:center}
.device-selector p{color:#555;font-size:14px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.device-btns{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.device-btn{padding:32px 48px;border:1px solid #2a2a2a;border-radius:8px;background:#111;color:#fff;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:200px;transition:all .2s ease;cursor:pointer}
.device-btn:hover{border-color:#555;background:#1a1a1a}
.device-btn .icon{font-size:48px}
.device-btn .lbl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px}
.device-btn .sub{font-size:11px;color:#555}
.firebase-banner{background:#1a0a00;border:1px solid #ff6600;border-radius:var(--r);padding:12px 16px;font-size:12px;color:#ff9933;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.firebase-banner code{background:#2a1500;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px}
.app-layout{display:flex;flex:1}
.sidebar{width:220px;min-width:220px;background:#0d0d0d;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden;transition:width .2s ease;flex-shrink:0}
.light .sidebar{background:#1a1a1a;border-right-color:#2a2a2a}
.sidebar.collapsed{width:60px;min-width:60px}
.sidebar-header{padding:16px 14px;border-bottom:1px solid #1a1a1a;display:flex;flex-direction:column;align-items:center;gap:8px}
.sidebar-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;white-space:nowrap;overflow:hidden;text-align:center}
.sidebar-logo-sub{font-size:9px;letter-spacing:4px;color:#444;text-transform:uppercase;text-align:center}
.sidebar-toggle{background:none;color:#444;font-size:12px;padding:4px;border-radius:var(--r);align-self:flex-end;margin-top:-4px}
.sidebar-toggle:hover{color:#fff}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#333;padding:12px 14px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;color:#555;cursor:pointer;transition:var(--t);border-left:2px solid transparent;white-space:nowrap;overflow:hidden}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#fff}
.nav-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.nav-label{font-size:13px;font-weight:500}
.sidebar-footer{padding:14px;border-top:1px solid #1a1a1a}
.user-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0}
.user-avatar{width:52px;height:52px;border-radius:50%;background:#1a1a1a;border:2px solid #2a2a2a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;cursor:pointer;transition:var(--t);position:relative}
.user-avatar:hover{border-color:#555}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--t);border-radius:50%}
.user-avatar:hover .user-avatar-overlay{opacity:1}
.user-name{font-size:12px;font-weight:700;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.user-role-lbl{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase}
.footer-btns{display:flex;gap:6px;width:100%;margin-top:6px}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#0d0d0d;border-top:1px solid #1a1a1a;align-items:center;justify-content:space-around;z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0px)}
.light .bottom-nav{background:#1a1a1a;border-top-color:#2a2a2a}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:var(--r);cursor:pointer;flex:1;max-width:80px;transition:var(--t)}
.bnav-item.active{background:rgba(255,255,255,.08)}
.bnav-item.active .bnav-icon,.bnav-item.active .bnav-label{color:#fff}
.bnav-icon{font-size:18px;color:#444}
.bnav-label{font-size:9px;color:#444;letter-spacing:.5px;text-transform:uppercase}
.bnav-more-menu{position:fixed;bottom:60px;left:0;right:0;background:#1a1a1a;border-top:1px solid #2a2a2a;border-radius:var(--rl) var(--rl) 0 0;padding:0;z-index:200;max-height:70vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.6)}
.bnav-more-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;color:#888;font-size:13px;transition:var(--t)}
.bnav-more-item:hover,.bnav-more-item.active{color:#fff;background:rgba(255,255,255,.05)}
.top-bar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--card-bg);flex-shrink:0}
.top-bar h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text)}
.top-bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.store-badge{background:var(--bg4);padding:4px 10px;border-radius:20px;font-size:11px;letter-spacing:1px;color:var(--g3)}
.main-content{flex:1;display:flex;flex-direction:column;min-width:0}
.page-area{padding:20px;padding-bottom:40px}


.mobile-header{display:none;position:fixed;top:0;left:0;right:0;z-index:90;background:var(--card-bg);border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:12px;min-height:52px;padding-top:env(safe-area-inset-top,0px)}
.mobile-header h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.green::before{background:var(--success)}
.stat-card.yellow::before{background:var(--warning)}
.stat-card.blue::before{background:var(--info)}
.stat-card.red::before{background:var(--danger)}
.stat-card.white::before{background:var(--white)}
.stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--subtext)}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--subtext)}
.stat-icon{position:absolute;right:14px;top:14px;font-size:24px;opacity:.12}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
table{width:100%;border-collapse:collapse;min-width:400px}
th{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g3);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge-green{background:rgba(68,255,136,.1);color:var(--success)}
.badge-red{background:rgba(255,68,68,.1);color:var(--danger)}
.badge-yellow{background:rgba(255,204,0,.1);color:var(--warning)}
.badge-blue{background:rgba(68,170,255,.1);color:var(--info)}
.badge-gray{background:rgba(128,128,128,.1);color:var(--g3)}
.badge-white{background:rgba(128,128,128,.08);color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:var(--t);cursor:pointer;border:none}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-white{background:var(--white);color:var(--bg)}
.btn-white:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--bg5)}
.btn-outline:hover{border-color:var(--g3);background:var(--bg3)}
.btn-danger{background:rgba(255,68,68,.1);color:var(--danger);border:1px solid rgba(255,68,68,.2)}
.btn-danger:hover{background:rgba(255,68,68,.2)}
.btn-success{background:rgba(68,255,136,.1);color:var(--success);border:1px solid rgba(68,255,136,.15)}
.btn-success:hover{background:rgba(68,255,136,.18)}
.btn-icon{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg3);color:var(--g3);border:1px solid var(--bg5);border-radius:var(--r)}
.btn-icon:hover{color:var(--text);border-color:var(--g3)}
.form-row{display:grid;gap:10px;margin-bottom:10px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g3)}
.form-field input,.form-field select,.form-field textarea{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:9px 11px;color:var(--text);font-size:13px;width:100%;transition:var(--t)}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--g2)}
.form-field select option{background:var(--bg3)}
.form-field textarea{resize:vertical;min-height:70px}







.close-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--bg4);border-radius:var(--r);color:var(--g3);font-size:14px;cursor:pointer;transition:var(--t)}
.close-btn:hover{color:var(--text)}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);z-index:100;max-height:200px;overflow-y:auto;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.autocomplete-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg4);transition:var(--t)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.active{background:var(--bg4)}
.autocomplete-item small{color:var(--g3);font-size:11px}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.progress-fill.green{background:var(--success)}
.progress-fill.yellow{background:var(--warning)}
.progress-fill.red{background:var(--danger)}
.progress-fill.white{background:var(--white)}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--g2);width:26px;text-align:center;flex-shrink:0}
.rank-num.gold{color:#ffd700}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}
.rank-avatar{width:34px;height:34px;border-radius:50%;background:var(--bg4);border:1px solid var(--bg5);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;overflow:hidden}
.rank-avatar img{width:100%;height:100%;object-fit:cover}
.chart-wrap{position:relative;height:200px}
.chart-wrap canvas{max-height:200px}
.empty-state{text-align:center;padding:48px 20px;color:var(--g3)}
.empty-state .icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}
.tabs{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:var(--r);margin-bottom:16px;width:fit-content;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--g3);cursor:pointer;transition:var(--t);white-space:nowrap}
.tab.active{background:var(--white);color:var(--bg)}
.tab:hover:not(.active){color:var(--text)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:0 12px;transition:var(--t)}
.search-bar:focus-within{border-color:var(--g2)}
.search-bar input{background:none;border:none;color:var(--text);font-size:13px;padding:8px 0;flex:1;min-width:0}
.search-icon{color:var(--g3);font-size:13px}
.toast-wrap{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;max-width:300px}
.toast{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px;animation:toastIn .2s ease;box-shadow:var(--shadow)}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--info)}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.theme-toggle{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border-radius:var(--r);font-size:13px;cursor:pointer;border:none;color:#fff;transition:var(--t)}
.theme-toggle:hover{background:rgba(255,255,255,.13)}
.divider{height:1px;background:var(--border);margin:14px 0}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.seller-hero{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border:1px solid #222;border-radius:var(--rl);padding:24px;position:relative;overflow:hidden}
.light .seller-hero{background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%)}
.sale-item-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px}
.photo-upload{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px dashed var(--bg5);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:var(--t)}

.photo-upload:hover{border-color:var(--g3)}
.photo-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-upload-ov{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--t)}
.photo-upload:hover .photo-upload-ov{opacity:1}
.table-scroll{overflow-y:auto}
.firebase-status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px}
.firebase-dot{width:6px;height:6px;border-radius:50%;background:var(--danger);animation:pulse 2s infinite}
.firebase-dot.connected{background:var(--success);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.login-page{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px)}
.login-card{position:relative;z-index:1;width:100%;max-width:400px;padding:40px 36px;background:var(--bg2);border:1px solid var(--bg5);border-radius:var(--rl);box-shadow:0 20px 60px rgba(0,0,0,.5);margin:20px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;color:var(--text);line-height:1}
.login-logo p{font-size:9px;letter-spacing:6px;text-transform:uppercase;color:var(--g3);margin-top:3px}
.login-form{display:flex;flex-direction:column;gap:14px}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g3)}
.field-input{background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:11px 13px;color:var(--text);font-size:14px;width:100%;transition:var(--t)}
.field-input:focus{border-color:var(--g2)}
.btn-primary{background:var(--white);color:var(--bg);padding:12px;border-radius:var(--r);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;width:100%;margin-top:6px}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.login-error{color:var(--danger);font-size:11px;text-align:center;margin-top:-6px}
.barcode-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg4);border:1px solid var(--bg5);border-radius:var(--r);color:var(--g4);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .18s ease;white-space:nowrap}
.barcode-btn:hover{border-color:var(--g3);color:var(--text)}
.barcode-btn.active{background:rgba(68,255,136,.08);border-color:var(--success);color:var(--success)}
.scanner-wrap{position:relative;width:100%;border-radius:var(--r);overflow:hidden;background:#000;aspect-ratio:4/3;max-height:260px}
.scanner-video{width:100%;height:100%;object-fit:cover;display:block}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}

function ImgDropzone({ value, onChange }) {
  const [drag, setDrag] = useState(false);
  const ref = useRef();
  const process = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => onChange(ev.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div
      className={`img-dropzone ${drag ? 'drag-over' : ''}`}
      onClick={() => ref.current?.click()}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={e => { e.preventDefault(); setDrag(false); process(e.dataTransfer.files[0]); }}
    >
      {value && <img src={value} alt="produto" />}
      <span className="img-dropzone-icon">🖼️</span>
      <span className="img-dropzone-label">{value ? 'Arraste ou clique para trocar' : 'Arraste ou clique para adicionar foto'}</span>
      {value && (
        <div className="img-dropzone-overlay">
          <span style={{fontSize:22}}>📷</span>
          <span style={{fontSize:11,color:'#fff',letterSpacing:1}}>TROCAR FOTO</span>

            onClick={e=>{e.stopPropagation();onChange(null);}}>✕ REMOVER</button>
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e => process(e.target.files[0])} />
    </div>
  );
}

function useFirestore(collection, setData) {
  const [connected, setConnected] = useState(false);
  useEffect(() => {
    if (!db || !FIREBASE_CONFIGURED) return;
    const unsub = db.collection(collection).onSnapshot(snap => {
      if (!snap.empty) setData(snap.docs.map(d => ({ ...d.data(), id: d.id })));
      setConnected(true);
    }, err => console.warn(collection, err));
    return () => unsub();
  }, [collection]);
  const saveDoc = useCallback(async (id, data) => {
    if (!db || !FIREBASE_CONFIGURED) return;
    try { await db.collection(collection).doc(id).set(data, { merge: true }); } catch(e) { console.warn(e); }
  }, [collection]);
  const deleteDoc = useCallback(async (id) => {
    if (!db || !FIREBASE_CONFIGURED) return;
    try { await db.collection(collection).doc(id).delete(); } catch(e) { console.warn(e); }
  }, [collection]);
  return { connected, saveDoc, deleteDoc };
}

function bipScanner() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o1=ctx.createOscillator(), g1=ctx.createGain();
    o1.type='sine'; o1.frequency.value=1800;
    g1.gain.setValueAtTime(0,ctx.currentTime); g1.gain.linearRampToValueAtTime(0.6,ctx.currentTime+0.01); g1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    o1.connect(g1); g1.connect(ctx.destination); o1.start(ctx.currentTime); o1.stop(ctx.currentTime+0.12);
  } catch(e) {}
}

function somVenda() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    // clique metálico inicial
    const buf = ctx.createBuffer(1, ctx.sampleRate*0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const gN=ctx.createGain(); gN.gain.setValueAtTime(0.4,now);
    src.connect(gN); gN.connect(ctx.destination); src.start(now);
    // nota grave de caixa registradora
    const osc2=ctx.createOscillator(); osc2.type='sine';
    osc2.frequency.setValueAtTime(320,now); osc2.frequency.exponentialRampToValueAtTime(180,now+0.12);
    const gO2=ctx.createGain(); gO2.gain.setValueAtTime(0.6,now); gO2.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    osc2.connect(gO2); gO2.connect(ctx.destination); osc2.start(now); osc2.stop(now+0.15);
    // ching agudo prolongado
    const osc=ctx.createOscillator(); osc.type='triangle';
    osc.frequency.setValueAtTime(1400,now+0.04); osc.frequency.exponentialRampToValueAtTime(900,now+0.6);
    const gO=ctx.createGain(); gO.gain.setValueAtTime(0,now+0.04); gO.gain.linearRampToValueAtTime(0.5,now+0.08); gO.gain.exponentialRampToValueAtTime(0.001,now+0.7);
    osc.connect(gO); gO.connect(ctx.destination); osc.start(now+0.04); osc.stop(now+0.7);
  } catch(e) {}
}

function BarcodeScanner({ onDetect, onClose }) {
  const videoRef = useRef(null), streamRef = useRef(null);

    let intervalId;
    const startCamera = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
        if ('BarcodeDetector' in window) {
          const detector = new BarcodeDetector({ formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e'] });
          intervalId = setInterval(async () => {
            if (!videoRef.current) return;
            try {
              const barcodes = await detector.detect(videoRef.current);
              if (barcodes.length > 0) { clearInterval(intervalId); stopCamera(); bipScanner(); onDetect(barcodes[0].rawValue); }
            } catch(e) {}
          }, 300);
        } else { setError('Câmera ativa. Digite o código manualmente abaixo ou use Chrome para detecção automática.'); setManualMode(true); }
      } catch(e) { setError('Câmera não disponível. Verifique as permissões.'); }
    };
    const stopCamera = () => {
      if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    };
    startCamera();
    return () => { clearInterval(intervalId); if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());} };
  }, []);
  return (
    <div className="scanner-section">
      {error ? (
        <div style={{padding:12,background:'rgba(255,68,68,.08)',border:'1px solid rgba(255,68,68,.2)',borderRadius:'var(--r)',color:'var(--danger)',fontSize:12}}>
          ⚠ {error} <button style={{marginLeft:8,background:'none',border:'none',color:'var(--danger)',cursor:'pointer',fontSize:12,textDecoration:'underline'}} onClick={onClose}>Fechar</button>
        </div>
      ) : (
        <>
          <div className="scanner-wrap"><video ref={videoRef} className="scanner-video" muted playsInline autoPlay/>
            <div className="scanner-overlay"><div className="scanner-frame"><div className="scanner-line"/></div></div>
          </div>
          <div className="scanner-label">Aponte a câmera para o código de barras</div>
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <input value={manualCode} onChange={e=>setManualCode(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&manualCode.trim()){onDetect(manualCode.trim());setManualCode('');}}}
              placeholder="Ou digite o código aqui..."
              style={{flex:1,background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
            <button className="btn btn-sm btn-white" onClick={()=>{if(manualCode.trim()){onDetect(manualCode.trim());setManualCode('');}}} style={{whiteSpace:'nowrap'}}>OK</button>
            <button className="btn btn-sm btn-outline" onClick={onClose}>✕</button>
          </div>
        </>
      )}
    </div>
  );
}

function Login() {
  const { sellers, setCurrentUser, addToast, setDevice, lojas } = useContext(AppContext);
  const [user, setUser] = useState(''), [pass, setPass] = useState(''), [err, setErr] = useState(''), [loading, setLoading] = useState(false);
  const [lojaModal, setLojaModal] = useState(null); // guarda o seller encontrado aguardando loja

  const login = async () => {
    setLoading(true);
    const normalize = s => (s||'').toLowerCase().replace(/\s+/g,'');
    const found = sellers.find(s =>
      normalize(s.name) === normalize(user) ||
      normalize(s.id) === normalize(user)
    );
    if (!found) { setErr('Usuário não encontrado'); setLoading(false); return; }
    if (found.password !== pass) { setErr('Senha incorreta'); setLoading(false); return; }
    if (!found.active) { setErr('Usuário inativo'); setLoading(false); return; }
    await new Promise(r=>setTimeout(r,400));
    setLoading(false);
    // vendedor precisa escolher loja; admin entra direto
    if (found.role === 'seller') { setLojaModal(found); }
    else { setCurrentUser(found); addToast('Bem-vindo, '+found.name+'! 🎉','success'); }
  };

  const confirmarLoja = (seller, loja) => {
    setCurrentUser({...seller, store: loja});
    addToast('Bem-vindo, '+seller.name+'! Loja: '+loja+' 🎉','success');
    setLojaModal(null);
  };

  return (
    <div className="login-page">
      <div className="login-bg"/>
      {lojaModal && (
        <div className="confirm-overlay">
          <div className="confirm-box" style={{maxWidth:420}}>
            <span className="confirm-icon">🏪</span>
            <div className="confirm-title">EM QUAL LOJA VOCÊ ESTÁ?</div>
            <div className="confirm-msg">Selecione a loja onde você está trabalhando <strong>hoje</strong>.</div>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:4}}>
              {(lojas||['Cosmos','Nova Cidade']).map(loja=>(
                <button key={loja} className="btn btn-white" style={{padding:'14px',fontSize:14,letterSpacing:1,justifyContent:'center'}} onClick={()=>confirmarLoja(lojaModal,loja)}>
                  🏪 {loja}
                </button>
              ))}
            </div>
            <button style={{marginTop:14,background:'none',border:'none',color:'var(--g3)',fontSize:11,cursor:'pointer'}} onClick={()=>setLojaModal(null)}>← Voltar ao login</button>
          </div>
        </div>
      )}

        <div className="login-logo">
          <div style={{fontSize:80,lineHeight:1,marginBottom:10}}>🏪</div>
          <h1>PIT IMPORT</h1><p>Sistema de Gestão</p>

          {err && <p className="login-error">⚠ {err}</p>}
          <button className="btn-primary" onClick={login} disabled={loading} style={{opacity:loading?.7:1}}>{loading?'ENTRANDO...':'ENTRAR'}</button>

function ResetModal({ onClose }) {
  const { currentUser, setSales, setProducts, setSellers, setGoals, setExpenses, setReturns, setClients, setReservas, setHistory, setCurrentUser, addToast } = useContext(AppContext);
  const [step, setStep] = useState(1); // 1=senha, 2=escolha, 3=confirmação
  const [senha, setSenha] = useState('');
  const [errSenha, setErrSenha] = useState('');
  const [confirmText, setConfirmText] = useState('');
  const [opcoes, setOpcoes] = useState({
    vendas: true,
    produtos: true,
    vendedores: true,
    metas: true,
    despesas: true,
    clientes: true,
    reservas: true,
  });

  const labels = {
    vendas: 'Histórico de Vendas',
    produtos: 'Produtos / Estoque',
    vendedores: 'Vendedores cadastrados',
    metas: 'Metas',
    despesas: 'Despesas',
    clientes: 'Clientes',
    reservas: 'Reservas',
  };

  const toggleOpcao = (k) => setOpcoes(o=>({...o,[k]:!o[k]}));
  const qtdSelecionadas = Object.values(opcoes).filter(Boolean).length;

  const confirmarSenha = () => {
    if (senha !== currentUser.password) { setErrSenha('Senha incorreta'); return; }
    setStep(2);
  };

  const executarReset = () => {
    if (confirmText !== 'RESETAR') return;

    if (opcoes.vendas) setSales([]);
    if (opcoes.produtos) setProducts([]);
    if (opcoes.metas) setGoals([]);
    if (opcoes.despesas) setExpenses([]);
    if (opcoes.clientes) setClients([]);
    if (opcoes.reservas) setReservas([]);
    if (opcoes.vendas) setReturns([]); // devoluções dependem de vendas

    // vendedores: mantém só o ADM atual
    if (opcoes.vendedores) {
      setSellers([{ id:'ADM', name:'ADM', role:'admin', store:'Todos', photo:null, active:true, password: currentUser.password }]);
    }

    // limpar histórico de movimentações (local)
    setHistory([]);

    // limpar Firebase se conectado
    if (FIREBASE_CONFIGURED && db) {
      const cols = [];
      if (opcoes.vendas) cols.push('sales','returns');
      if (opcoes.produtos) cols.push('products');
      if (opcoes.metas) cols.push('goals');
      if (opcoes.despesas) cols.push('expenses');
      if (opcoes.clientes) cols.push('clients');
      if (opcoes.reservas) cols.push('reservas');
      if (opcoes.vendedores) cols.push('sellers');
      cols.forEach(col => {
        db.collection(col).get().then(snap => {
          snap.docs.forEach(doc => db.collection(col).doc(doc.id).delete());
        }).catch(()=>{});
      });
    }

    addToast('Sistema resetado com sucesso!', 'success');
    setCurrentUser(null); // força novo login
    onClose();
  };

  return (
    <div className="modal-overlay" style={{zIndex:2000}}>
      <div className="modal" style={{maxWidth:440}}>
        <div className="modal-header">
          <h3 style={{color:'var(--danger)'}}>⚠ RESETAR SISTEMA</h3>
          <div className="close-btn" onClick={onClose}>✕</div>
        </div>
        <div className="modal-body">

          {step===1&&(
            <>
              <div style={{padding:'12px 14px',background:'rgba(255,68,68,.06)',border:'1px solid rgba(255,68,68,.2)',borderRadius:'var(--r)',marginBottom:16,fontSize:12,color:'var(--g3)',lineHeight:1.6}}>
                Esta operação <strong style={{color:'var(--danger)'}}>apaga dados permanentemente</strong>. Confirme sua senha de administrador para continuar.
              </div>
              <div className="form-field">
                <label>Senha do Administrador</label>
                <input type="password" value={senha} onChange={e=>{setSenha(e.target.value);setErrSenha('');}} autoFocus onKeyDown={e=>e.key==='Enter'&&confirmarSenha()} placeholder="••••••••"/>
                {errSenha&&<span style={{fontSize:11,color:'var(--danger)',marginTop:4}}>{errSenha}</span>}
              </div>
              <div className="modal-footer" style={{padding:'14px 0 0',border:'none'}}>
                <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
                <button className="btn btn-danger" onClick={confirmarSenha}>Confirmar →</button>
              </div>
            </>
          )}

          {step===2&&(
            <>
              <div style={{fontSize:12,color:'var(--g3)',marginBottom:14}}>Selecione o que deseja apagar:</div>
              {Object.entries(opcoes).map(([k,v])=>(
                <div key={k} onClick={()=>toggleOpcao(k)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:v?'rgba(255,68,68,.06)':'var(--bg3)',border:`1px solid ${v?'rgba(255,68,68,.3)':'var(--bg5)'}`,borderRadius:'var(--r)',marginBottom:6,cursor:'pointer',transition:'var(--t)'}}>
                  <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${v?'var(--danger)':'var(--bg5)'}`,background:v?'var(--danger)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'var(--t)'}}>
                    {v&&<span style={{fontSize:10,color:'#fff',fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:v?'var(--text)':'var(--g3)',fontWeight:v?600:400}}>{labels[k]}</span>
                </div>
              ))}
              <div style={{display:'flex',gap:8,marginTop:12}}>
                <button className="btn btn-outline btn-sm" onClick={()=>setOpcoes(o=>Object.fromEntries(Object.keys(o).map(k=>[k,true])))}>Marcar tudo</button>
                <button className="btn btn-outline btn-sm" onClick={()=>setOpcoes(o=>Object.fromEntries(Object.keys(o).map(k=>[k,false])))}>Desmarcar tudo</button>
              </div>
              <div className="modal-footer" style={{padding:'14px 0 0',border:'none'}}>
                <button className="btn btn-outline" onClick={()=>setStep(1)}>← Voltar</button>
                <button className="btn btn-danger" disabled={qtdSelecionadas===0} style={{opacity:qtdSelecionadas===0?.5:1}} onClick={()=>setStep(3)}>Próximo →</button>
              </div>
            </>
          )}

          {step===3&&(
            <>
              <div style={{padding:'14px',background:'rgba(255,68,68,.06)',border:'1px solid rgba(255,68,68,.3)',borderRadius:'var(--r)',marginBottom:16}}>
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,color:'var(--danger)',marginBottom:6}}>ATENÇÃO — AÇÃO IRREVERSÍVEL</div>
                <div style={{fontSize:12,color:'var(--g3)',lineHeight:1.7}}>
                  Você está prestes a apagar:<br/>
                  {Object.entries(opcoes).filter(([,v])=>v).map(([k])=><span key={k}>• {labels[k]}<br/></span>)}
                </div>
              </div>
              <div className="form-field">
                <label>Digite <strong style={{color:'var(--danger)',letterSpacing:1}}>RESETAR</strong> para confirmar</label>
                <input value={confirmText} onChange={e=>setConfirmText(e.target.value)} placeholder="RESETAR" style={{fontFamily:'DM Mono,monospace',letterSpacing:2,fontWeight:700}} autoFocus/>
              </div>
              <div className="modal-footer" style={{padding:'14px 0 0',border:'none'}}>
                <button className="btn btn-outline" onClick={()=>setStep(2)}>← Voltar</button>
                <button className="btn btn-danger" disabled={confirmText!=='RESETAR'} style={{opacity:confirmText==='RESETAR'?1:.4}} onClick={executarReset}>
                  🗑 RESETAR AGORA
                </button>
              </div>
            </>
          )}

        </div>
      </div>
    </div>
  );
}

function ChangePasswordModal({ onClose }) {
  const { currentUser, sellers, updateCurrentUser, addToast } = useContext(AppContext);
  const [cur, setCur] = useState(''), [nw, setNw] = useState(''), [conf, setConf] = useState(''), [err, setErr] = useState('');
  const save = () => {
    if (cur !== currentUser.password) { setErr('Senha atual incorreta'); return; }
    if (nw.length < 4) { setErr('Mínimo 4 caracteres'); return; }
    if (nw !== conf) { setErr('Senhas não coincidem'); return; }
    updateCurrentUser(sellers.map(s=>s.id===currentUser.id?{...s,password:nw}:s));
    addToast('Senha alterada!','success'); onClose();
  };
  return (
    <div className="modal-overlay"><div className="modal">
      <div className="modal-header"><h3>ALTERAR SENHA</h3><div className="close-btn" onClick={onClose}>✕</div></div>
      <div className="modal-body">
        <div className="form-row"><div className="form-field"><label>Senha Atual</label><input type="password" value={cur} onChange={e=>{setCur(e.target.value);setErr('')}}/></div></div>
        <div className="form-row"><div className="form-field"><label>Nova Senha</label><input type="password" value={nw} onChange={e=>setNw(e.target.value)}/></div></div>
        <div className="form-row"><div className="form-field"><label>Confirmar</label><input type="password" value={conf} onChange={e=>setConf(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/></div></div>
        {err && <p style={{color:'var(--danger)',fontSize:12,marginTop:4}}>⚠ {err}</p>}
      </div>
      <div className="modal-footer">
        <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
        <button className="btn btn-white" onClick={save}>Salvar</button>
      </div>
    </div></div>
  );
}

    const handler = () => setIsFullscreen(!!document.fullscreenElement);

    return () => document.removeEventListener('fullscreenchange', handler);

    const el = document.documentElement;
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    if(!document.fullscreenElement) {
      (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen)?.call(el);

      (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen)?.call(document);

function SellerHome() {
  const { currentUser, sales, goals, sellers } = useContext(AppContext);
  const {m,y} = thisMonth();
  const mySales = sales.filter(s=>s.sellerId===currentUser.id&&isSameMonth(s.date,m,y));
  const myTotal = mySales.reduce((a,s)=>a+s.total,0);
  const goal = goals.find(g=>g.sellerId===currentUser.id&&g.month===m&&g.year===y);
  const pct = goal ? Math.min((myTotal/goal.goal)*100,100) : 0;
  const sellerRank = sellers.filter(s=>s.role==='seller').map(s=>{
    const t=sales.filter(x=>x.sellerId===s.id&&isSameMonth(x.date,m,y)).reduce((a,x)=>a+x.total,0);
    return {...s,total:t};
  }).sort((a,b)=>b.total-a.total);
  const myPos = sellerRank.findIndex(s=>s.id===currentUser.id)+1;
  const rankEmoji = myPos===1?'🥇':myPos===2?'🥈':myPos===3?'🥉':'🎯';
  const motivMsg = MOTIVATIONAL[Math.floor(Math.random()*MOTIVATIONAL.length)];

  const last7 = [];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const dd=d.toISOString().slice(0,10);
    const t=mySales.filter(s=>s.date.slice(0,10)===dd).reduce((a,s)=>a+s.total,0);
    last7.push({label:d.toLocaleDateString('pt-BR',{weekday:'short'}),value:t});

  useEffect(()=>{
    if(chartInst.current) chartInst.current.destroy();
    if(!chartRef.current) return;
    chartInst.current = new Chart(chartRef.current,{
      type:'bar',data:{labels:last7.map(l=>l.label),datasets:[{data:last7.map(l=>l.value),backgroundColor:'rgba(255,255,255,.15)',borderColor:'rgba(255,255,255,.6)',borderWidth:1,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtMoney(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#666',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#666',callback:v=>v===0?'0':'R$'+v/1000+'k'}}}}
    });
    return ()=>{if(chartInst.current) chartInst.current.destroy();};
  },[JSON.stringify(last7)]);
  const color = pct>=100?'var(--success)':pct>=70?'var(--warning)':'var(--danger)';
  return (
    <div>
      <div className="seller-hero mb-24">
        <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{textAlign:'center'}}>
            <div style={{width:68,height:68,borderRadius:'50%',background:'rgba(255,255,255,.08)',border:'2px solid rgba(255,255,255,.12)',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,margin:'0 auto 6px',color:'#fff'}}>
              {currentUser.photo?<img src={currentUser.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(currentUser.name)}
            </div>
            <div style={{fontWeight:700,fontSize:13,color:'#fff'}}>{currentUser.name}</div>

            <div style={{marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style={{fontSize:10,color:'#444'}}>Meta mensal: {goal?fmtMoney(goal.goal):'—'}</span>
                <span style={{fontSize:11,fontWeight:700,color}}>{pct.toFixed(0)}%</span>
              </div>
              <div className="progress-bar" style={{height:6}}><div className={`progress-fill ${pct>=100?'green':pct>=70?'yellow':'red'}`} style={{width:`${pct}%`}}/></div>

            {goalSemanal > 0 && (

                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>

      <div className="grid-3 mb-24">

                  <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:18,color:'var(--text)'}}>{fmtMoney(wkTotal)}</div>

function Dashboard() {
  const { sales, expenses, products, sellers, goals } = useContext(AppContext);
  const {m,y} = thisMonth();
  const monthSales = sales.filter(s=>isSameMonth(s.date,m,y));
  const totalMonth = monthSales.reduce((a,s)=>a+s.total,0);
  const totalExpenses = expenses.filter(e=>isSameMonth(e.date,m,y)).reduce((a,e)=>a+e.amount,0);
  const pendingReceivables = sales.filter(s=>s.paymentMethod==='A prazo'&&!s.paid).reduce((a,s)=>a+s.total,0);
  const lowStock = products.filter(p=>p.qty<=5);
  const last6 = [];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const mm=d.getMonth(),yy=d.getFullYear();
    const t=sales.filter(s=>isSameMonth(s.date,mm,yy)).reduce((a,s)=>a+s.total,0);
    last6.push({label:d.toLocaleDateString('pt-BR',{month:'short'}),value:t});
  }
  const chartRef = useRef(); const chartInst = useRef();
  useEffect(()=>{
    if(chartInst.current) chartInst.current.destroy();
    if(!chartRef.current) return;
    chartInst.current = new Chart(chartRef.current,{
      type:'bar',data:{labels:last6.map(l=>l.label),datasets:[{data:last6.map(l=>l.value),backgroundColor:'rgba(255,255,255,.12)',borderColor:'rgba(255,255,255,.6)',borderWidth:1,borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtMoney(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#666',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#666',callback:v=>v===0?'0':'R$'+Math.round(v/1000)+'k'}}}}
    });
    return ()=>{if(chartInst.current) chartInst.current.destroy();};
  },[JSON.stringify(last6)]);

  // ITEM 6: metas semanais no dashboard
  const semanaAtual = Math.ceil(new Date().getDate() / 7);
  const inicioSemana = new Date(); inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay());
  const vendasSemanaTotal = monthSales.filter(s=>new Date(s.date)>=inicioSemana).reduce((a,s)=>a+s.total,0);
  const goalTotalMes = sellers.filter(s=>s.role==='seller'&&s.active).reduce((a,s)=>{const g=goals.find(gg=>gg.sellerId===s.id&&gg.month===m&&gg.year===y);return a+(g?.goal||0);},0);
  const goalSemanalTotal = goalTotalMes/4;
  const pctSemanalTotal = goalSemanalTotal>0?Math.min((vendasSemanaTotal/goalSemanalTotal)*100,100):0;

  return (
    <div>
      <div className="grid-4 mb-24">
        <div className="stat-card green"><div className="stat-label">Vendas do Mês</div><div className="stat-value">{fmtMoney(totalMonth)}</div><div className="stat-sub">{monthSales.length} vendas</div><div className="stat-icon">◈</div></div>
        <div className="stat-card yellow"><div className="stat-label">A Receber</div><div className="stat-value">{fmtMoney(pendingReceivables)}</div><div className="stat-sub">Em aberto</div><div className="stat-icon">◎</div></div>
        <div className="stat-card red"><div className="stat-label">Despesas</div><div className="stat-value">{fmtMoney(totalExpenses)}</div><div className="stat-sub">Este mês</div><div className="stat-icon">◇</div></div>
        <div className="stat-card white"><div className="stat-label">Lucro Estimado</div><div className="stat-value">{fmtMoney(totalMonth-totalExpenses)}</div><div className="stat-sub">{totalMonth-totalExpenses>=0?'Positivo':'Negativo'}</div><div className="stat-icon">▲</div></div>
      </div>
      <div className="grid-2 mb-24">
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>FATURAMENTO – 6 MESES</div>
          <div className="chart-wrap"><canvas ref={chartRef}/></div>
        </div>
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>METAS DO MÊS</div>
          {sellers.filter(s=>s.role==='seller'&&s.active).map(s=>{
            const goal=goals.find(g=>g.sellerId===s.id&&g.month===m&&g.year===y);
            const sold=monthSales.filter(x=>x.sellerId===s.id).reduce((a,x)=>a+x.total,0);
            const pct=goal?Math.min((sold/goal.goal)*100,100):0;
            const soldSemana=monthSales.filter(x=>x.sellerId===s.id&&new Date(x.date)>=inicioSemana).reduce((a,x)=>a+x.total,0);
            const goalSem=goal?(goal.goal/4):0;
            const pctSem=goalSem>0?Math.min((soldSemana/goalSem)*100,100):0;
            return (
              <div key={s.id} style={{marginBottom:14}}>
                <div className="flex items-center justify-between" style={{marginBottom:3}}>
                  <div className="flex items-center gap-8">
                    <div className="rank-avatar" style={{width:26,height:26,fontSize:10}}>{s.photo?<img src={s.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(s.name)}</div>
                    <span style={{fontSize:12,color:'var(--text)'}}>{s.name}</span>
                  </div>
                  <div className="flex items-center gap-8">
                    <span style={{fontSize:11,color:'var(--g3)'}}>{fmtMoney(sold)}</span>
                    <span style={{fontSize:11,fontWeight:700,color:pct>=100?'var(--success)':pct>=70?'var(--warning)':'var(--danger)'}}>{pct.toFixed(0)}%</span>
                  </div>
                </div>
                <div className="progress-bar" style={{marginBottom:2}}><div className={`progress-fill ${pct>=100?'green':pct>=70?'yellow':'red'}`} style={{width:`${pct}%`}}/></div>
                {goalSem>0&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:2}}>
                  <span style={{fontSize:9,color:'var(--g2)'}}>Semana: {fmtMoney(soldSemana)} / {fmtMoney(goalSem)}</span>
                  <span style={{fontSize:9,color:pctSem>=100?'var(--success)':pctSem>=70?'var(--warning)':'var(--danger)'}}>{pctSem.toFixed(0)}%</span>
                </div>}
                {goalSem>0&&<div className="progress-bar" style={{height:3}}><div className={`progress-fill ${pctSem>=100?'green':pctSem>=70?'yellow':'red'}`} style={{width:`${pctSem}%`}}/></div>}
              </div>
            );
          })}
        </div>
      </div>

    </div>
  );
}

function SalesMonth() {
  const { sales, sellers, goals } = useContext(AppContext);
  const {m,y} = thisMonth();
  const monthSales = sales.filter(s=>isSameMonth(s.date,m,y));
  const sellerStats = sellers.filter(s=>s.role==='seller'&&s.active).map(s=>{
    const ss=monthSales.filter(x=>x.sellerId===s.id);
    const total=ss.reduce((a,x)=>a+x.total,0);
    const goal=goals.find(g=>g.sellerId===s.id&&g.month===m&&g.year===y);
    const pct=goal?Math.min((total/goal.goal)*100,100):0;
    return {...s,total,count:ss.length,goal:goal?.goal||0,pct};
  }).sort((a,b)=>b.total-a.total);
  return (
    <div>
      <div className="grid-2 mb-24">
        {sellerStats.map((s,i)=>{
          const colors=['green','blue','yellow','red'];
          return (
            <div key={s.id} className={`stat-card ${colors[i%4]}`}>
              <div className="flex items-center gap-12 mb-12">
                <div className="rank-avatar" style={{width:40,height:40,fontSize:14}}>{s.photo?<img src={s.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(s.name)}</div>
                <div><div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{s.name}</div><div style={{fontSize:10,color:'var(--g3)'}}>{s.store}</div></div>
                {i===0&&<div style={{marginLeft:'auto',fontSize:18}}>🏆</div>}
                {i===1&&<div style={{marginLeft:'auto',fontSize:18}}>🥈</div>}
                {i===2&&<div style={{marginLeft:'auto',fontSize:18}}>🥉</div>}
              </div>
              <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:24,color:'var(--text)'}}>{fmtMoney(s.total)}</div>
              <div style={{fontSize:10,color:'var(--g3)',marginBottom:6}}>{s.count} vendas · Meta: {fmtMoney(s.goal)}</div>
              <div className="progress-bar"><div className={`progress-fill ${s.pct>=100?'green':s.pct>=70?'yellow':'red'}`} style={{width:`${s.pct}%`}}/></div>
              <div style={{fontSize:10,color:'var(--g3)',marginTop:3,textAlign:'right'}}>{s.pct.toFixed(0)}%</div>
            </div>
          );
        })}
      </div>
      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>DETALHES</div>
        <div className="table-wrap"><table>
          <thead><tr><th>Data</th><th>Vendedor</th><th>Loja</th><th>Canal</th><th>Pagamento</th><th>Total</th></tr></thead>
          <tbody>{monthSales.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>(
            <tr key={s.id}><td>{fmtDate(s.date)}</td><td>{s.sellerName}</td>
              <td><span className="badge badge-gray">{s.store}</span></td>
              <td><span className={`badge ${s.channel==='Online'?'badge-blue':'badge-white'}`}>{s.channel}</span></td>
              <td><span className={`badge ${s.paymentMethod==='A prazo'?'badge-yellow':'badge-green'}`}>{s.paymentMethod}</span></td>
              <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--text)'}}>{fmtMoney(s.total)}</td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>
    </div>
  );
}

function NewSale() {
  const { products, sellers, sales, setSales, setProducts, currentUser, clients, reservas, setReservas, lojas, addToast, addMovement } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [selectedSeller, setSelectedSeller] = useState(currentUser.role==='seller'?currentUser.id:'');
  const [store, setStore] = useState(currentUser.role==='seller'?currentUser.store:'Cosmos');
  const [channel, setChannel] = useState('Física');
  const [items, setItems] = useState([]);
  const [discount, setDiscount] = useState(0);
  const [discountType, setDiscountType] = useState('percent');
  const [clientId, setClientId] = useState('');
  const [clientName, setClientName] = useState('');
  const [payMethods, setPayMethods] = useState([{method:'Dinheiro',value:'',dueDate:''}]);
  const [receivedAmount, setReceivedAmount] = useState('');
  const [search, setSearch] = useState('');
  const [showAuto, setShowAuto] = useState(false);
  const [autoIdx, setAutoIdx] = useState(-1);
  const [showScanner, setShowScanner] = useState(false);
  const [reservarModal, setReservarModal] = useState(null); // produto a reservar
  const [showClientAuto, setShowClientAuto] = useState(false);
  const [reservarCliente, setReservarCliente] = useState('');
  const [reservarEntrega, setReservarEntrega] = useState('retirar');
  const [reservarQty, setReservarQty] = useState(1);
  const [lastSale, setLastSale] = useState(null);
  const [showReceipt, setShowReceipt] = useState(false);
  const [showPayModal, setShowPayModal] = useState(false);
  const searchRef = useRef();

  // produtos da loja atual + produtos de outra loja (para mostrar opção de reservar)
  const filteredProds = search.length>=1 ? products.filter(p=>
    (p.code.toLowerCase().includes(search.toLowerCase())||p.description.toLowerCase().includes(search.toLowerCase()))
  ).slice(0,10) : [];

  // qtd reservada de um produto
  const qtdReservada = (prodId) => reservas.filter(r=>r.produtoId===prodId&&r.ativa).reduce((a,r)=>a+r.qty,0);

  // qtd disponível real = estoque - reservado
  const qtdDisponivel = (prod) => Math.max(0, prod.qty - qtdReservada(prod.id));

  const addItem = (prod) => {
    const disp = qtdDisponivel(prod);
    if(prod.store !== store && store !== 'Todos') {
      // produto de outra loja — não adiciona direto, sugere reservar
      setReservarModal(prod); setReservarCliente(clientName||''); setSearch(''); setShowAuto(false); return;
    }
    if(disp <= 0) { addToast('Produto sem estoque disponível (pode haver reservas ativas)','error'); return; }
    setItems(it=>{
      const ex=it.find(i=>i.productId===prod.id);
      if(ex) return it.map(i=>i.productId===prod.id?{...i,qty:i.qty+1,total:(i.qty+1)*i.unitPrice}:i);
      return [...it,{productId:prod.id,code:prod.code,description:prod.description,photo:prod.photo||null,qty:1,unitPrice:prod.salePrice,total:prod.salePrice}];
    });
    setSearch(''); setShowAuto(false); searchRef.current?.focus();
  };

  const confirmarReserva = () => {
    if(!reservarModal) return;
    if(!reservarCliente) return addToast('Informe o nome do cliente para reserva','error');
    const disp = qtdDisponivel(reservarModal);
    if(disp <= 0) return addToast('Produto sem estoque disponível para reserva','error');
    const seller = sellers.find(s=>s.id===selectedSeller) || currentUser;
    const reservaId = 'res'+Date.now();
    const novaReserva = {
      id: reservaId,
      produtoId: reservarModal.id,
      produtoNome: reservarModal.description,
      produtoCodigo: reservarModal.code,
      produtoLoja: reservarModal.store,
      qty: reservarQty||1,
      vendedorId: seller.id,
      vendedorNome: seller.name,
      lojaVendedor: store,
      clienteNome: reservarCliente,
      clienteId: clientId||'',
      tipoEntrega: reservarEntrega,
      data: new Date().toISOString(),
      ativa: true,
      pago: true,
    };
    setReservas(rs=>[...rs, novaReserva]);
    // Adicionar na nota da venda como item reservado
    const unitPrice = reservarModal.salePrice||0;
    setItems(it=>{
      const ex=it.find(i=>i.productId===reservarModal.id&&i.reservaId===reservaId);
      if(ex) return it;
      return [...it,{
        productId:reservarModal.id, code:reservarModal.code,
        description:reservarModal.description+'  🔒reservado',
        photo:reservarModal.photo||null, qty:reservarQty||1,
        unitPrice, total:(reservarQty||1)*unitPrice,
        reservaId, reservado:true, lojaOrigem:reservarModal.store
      }];
    });
    addToast('Reservado e adicionado à nota! Cliente paga agora.','success');
    setReservarModal(null); setReservarCliente(''); setReservarEntrega('retirar'); setReservarQty(1);
  };

  const updateQty = (productId, qty) => {
    if(qty<=0){setItems(it=>it.filter(i=>i.productId!==productId));return;}
    setItems(it=>it.map(i=>i.productId===productId?{...i,qty,total:qty*i.unitPrice}:i));
  };

  const subtotal = items.reduce((a,i)=>a+i.total,0);
  const discountValue = discountType==='percent' ? subtotal*(Number(discount)||0)/100 : Math.min(Number(discount)||0, subtotal);
  const total = Math.max(0, subtotal - discountValue);

  const hasDinheiro = payMethods.some(p=>p.method==='Dinheiro');
  const troco = payMethods.length===1 && payMethods[0].method==='Dinheiro'
    ? Math.max(0,(Number(payMethods[0].received)||0)-total)
    : payMethods.filter(p=>p.method==='Dinheiro').reduce((a,p)=>a+Math.max(0,(Number(p.received)||0)-(Number(p.value)||0)),0);

  const addPayMethod = () => setPayMethods(m=>[...m,{method:'Pix',value:'',dueDate:''}]);
  const removePayMethod = (i) => setPayMethods(m=>m.filter((_,idx)=>idx!==i));
  const updatePayMethod = (i, field, val) => setPayMethods(m=>m.map((p,idx)=>idx===i?{...p,[field]:val}:p));

  const hasAPrazo = payMethods.some(p=>p.method==='A prazo');
  const isPaid = !hasAPrazo;

  const submitSale = () => {
    if(!selectedSeller) return addToast('Selecione um vendedor','error');

    for(const item of items){
      const prod=products.find(p=>p.id===item.productId);
      if(!prod||prod.qty<item.qty) return addToast('Estoque insuficiente: '+(prod?.description||'?'),'error');
      const disp = qtdDisponivel(prod);

    }
    const seller=sellers.find(s=>s.id===selectedSeller);
    const dueDateMain = payMethods.find(p=>p.method==='A prazo')?.dueDate || '';
    const sale={
      id:'sale'+Date.now(), date:new Date().toISOString(),
      sellerId:selectedSeller, sellerName:seller.name,
      store, channel, items,
      subtotal, discountValue, discountType, discountPercent:discountType==='percent'?Number(discount):0,
      discountBy: discountValue>0 ? currentUser.name : '',
      total,
      paymentMethods: payMethods.map(p=>({...p,value:(p.method==='A prazo'&&!Number(p.value)&&payMethods.length===1)?total:(Number(p.value)||0)})),
      paymentMethod: payMethods.length===1 ? payMethods[0].method : 'Múltiplos',
      clientId: clientId||'', clientName: clientName||'',
      dueDate: dueDateMain, paid: isPaid,
      receivedAmount: payMethods.filter(p=>p.method==='Dinheiro').reduce((a,p)=>a+(Number(p.received)||0),0), troco,
    };
    setSales(s=>[...s,sale]);
    setProducts(ps=>ps.map(p=>{const item=items.find(i=>i.productId===p.id&&!i.reservado);if(!item) return p;addMovement(p.id,'saída',item.qty,'Venda #'+sale.id.slice(-4));return {...p,qty:p.qty-item.qty};}));
    setLastSale(sale);
    setShowReceipt(true);
    setItems([]); setClientName(''); setClientId(''); setDiscount(0); setPayMethods([{method:'Dinheiro',value:'',dueDate:''}]); setReceivedAmount('');
    somVenda();
    addToast('Venda registrada! 🎉','success');
  };

  return (
    <div style={{WebkitOverflowScrolling:'touch'}}>

      {showReceipt && lastSale && (

            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:20,fontWeight:900,letterSpacing:4,marginBottom:2}}>PIT IMPORT</div>
              <div style={{fontSize:11,color:'#555'}}>{lastSale.store}</div>
              <div style={{fontSize:11,color:'#555'}}>{new Date(lastSale.date).toLocaleString('pt-BR')}</div>
              <div style={{fontSize:11,color:'#555'}}>Vendedor: {lastSale.sellerName}</div>
              {lastSale.clientName&&<div style={{fontSize:11,color:'#555'}}>Cliente: {lastSale.clientName}</div>}
              <div style={{borderTop:'1px dashed #ccc',margin:'10px 0'}}/>
            </div>
            {lastSale.items.map((it,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700}}>{it.description.replace('  🔒reservado',' [RESERVADO]')}</div>
                  <div style={{color:'#555'}}>{it.qty}x {fmtMoney(it.unitPrice)}</div>

            </div>}
            {lastSale.discountValue>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#e55',marginBottom:4}}>
              <span>Desconto</span><span>-{fmtMoney(lastSale.discountValue)}</span>

            <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:900,margin:'8px 0'}}>
              <span>TOTAL</span><span>{fmtMoney(lastSale.total)}</span>

            <div style={{borderTop:'1px dashed #ccc',margin:'10px 0'}}/>
            {lastSale.paymentMethods?.map((pm,i)=>(

// ITEM 1: Edição e exclusão de venda — só admin
function getValorPrazo(s){
  if(s.paymentMethods&&s.paymentMethods.length){var p=s.paymentMethods.filter(x=>x.method==='A prazo'),soma=p.reduce((a,x)=>a+(Number(x.value)||0),0);if(soma===0&&s.paymentMethod==='A prazo')return s.total;return soma;}
  return s.paymentMethod==='A prazo'?s.total:0;
}
// helper: valor de um método específico em uma venda
function getValorMetodo(s, method) {
  if (s.paymentMethods?.length) {
    return s.paymentMethods.filter(p=>p.method===method).reduce((a,p)=>a+(Number(p.value)||0),0);
  }
  return s.paymentMethod===method ? s.total : 0;
}

function SalesHistory() {
  const { sales, setSales, deleteSale, currentUser, addToast, lojas } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [filterStore, setFilterStore] = useState('Todos');
  const [filterMethod, setFilterMethod] = useState('Todos');
  const [filterDate, setFilterDate] = useState('');
  const [search, setSearch] = useState('');
  const [editSale, setEditSale] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const filtered = sales.filter(s=>
    (filterStore==='Todos'||s.store===filterStore) &&
    (filterMethod==='Todos'||s.paymentMethod===filterMethod||s.paymentMethods?.some(p=>p.method===filterMethod)) &&
    (!filterDate||s.date.slice(0,10)===filterDate) &&
    (!search||(s.sellerName.toLowerCase().includes(search.toLowerCase())||(s.clientName||'').toLowerCase().includes(search.toLowerCase())))
  ).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const METODOS = ['Dinheiro','Pix','Cartão','A prazo'];
  const totaisPorMetodo = METODOS.map(m=>({
    method: m,
    val: filtered.reduce((acc,s)=>acc+getValorMetodo(s,m), 0)
  })).filter(x=>x.val>0);

  const handleDelete = (sale, e) => {
    e.stopPropagation();
    setConfirm({
      icon:'🗑️', titulo:'Excluir Venda', msg:`Excluir venda de ${fmtMoney(sale.total)} de ${sale.sellerName}? Esta ação não pode ser desfeita.`,
      btnLabel:'Excluir', btnClass:'btn-danger',
      onConfirm: () => { deleteSale(sale.id); addToast('Venda excluída','info'); setConfirm(null); if(expanded===sale.id) setExpanded(null); }
    });
  };

  const colSpan = isAdmin ? 9 : 8;

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      {editSale && <EditSaleModal sale={editSale} onClose={()=>setEditSale(null)}/>}

      <div className="card mb-16">
        <div className="flex items-center gap-12" style={{flexWrap:'wrap'}}>
          <div className="search-bar" style={{flex:1,minWidth:140}}><span className="search-icon">⌕</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Vendedor ou cliente..."/></div>

function EditSaleModal({ sale, onClose }) {
  const { setSales, products, addToast } = useContext(AppContext);
  const [clientName, setClientName] = useState(sale.clientName||'');
  const [channel, setChannel] = useState(sale.channel||'Física');
  const [paid, setPaid] = useState(sale.paid||false);
  const [note, setNote] = useState(sale.note||'');
  const [items, setItems] = useState(sale.items ? sale.items.map(i=>({...i})) : []);
  const [payMethods, setPayMethods] = useState(
    sale.paymentMethods?.length ? sale.paymentMethods.map(p=>({...p})) : [{method:sale.paymentMethod||'Dinheiro',value:sale.total||0,dueDate:sale.dueDate||''}]
  );
  const [searchProd, setSearchProd] = useState('');

  const subtotal = items.reduce((a,i)=>a+(i.total||i.qty*i.unitPrice),0);
  const totalPago = payMethods.reduce((a,p)=>a+(Number(p.value)||0),0);
  const diff = subtotal - totalPago;

  const updateItemQty = (idx, qty) => {
    if(qty<=0) setItems(it=>it.filter((_,i)=>i!==idx));
    else setItems(it=>it.map((item,i)=>i===idx?{...item,qty,total:qty*item.unitPrice}:item));
  };
  const updateItemPrice = (idx, price) => {
    setItems(it=>it.map((item,i)=>i===idx?{...item,unitPrice:Number(price),total:item.qty*Number(price)}:item));
  };
  const addProd = (p) => {
    setItems(it=>{const ex=it.find(i=>i.productId===p.id);if(ex)return it.map(i=>i.productId===p.id?{...i,qty:i.qty+1,total:(i.qty+1)*i.unitPrice}:i);return [...it,{productId:p.id,code:p.code,description:p.description,photo:p.photo||null,qty:1,unitPrice:p.salePrice,total:p.salePrice}];});
    setSearchProd('');
  };
  const filtProds = searchProd.length>=1 ? products.filter(p=>p.description.toLowerCase().includes(searchProd.toLowerCase())||p.code.toLowerCase().includes(searchProd.toLowerCase())).slice(0,6) : [];
  const updatePay = (i,field,val) => setPayMethods(ms=>ms.map((m,idx)=>idx===i?{...m,[field]:val}:m));

  const save = () => {
    if(items.length===0) return addToast('Adicione pelo menos um produto','error');
    const newPayMethod = payMethods.length===1 ? payMethods[0].method : 'Múltiplos';
    const hasPrazo = payMethods.some(p=>p.method==='A prazo');
    setSales(ss=>ss.map(s=>s.id===sale.id?{...s,clientName,channel,paid,note,items,
      subtotal,total:subtotal,paymentMethods:payMethods.map(p=>({...p,value:Number(p.value)||0})),
      paymentMethod:newPayMethod,paid:!hasPrazo||paid,
      dueDate:payMethods.find(p=>p.method==='A prazo')?.dueDate||''}:s));
    addToast('Venda atualizada!','success'); onClose();
  };

  return (
    <div className="modal-overlay"><div className="modal modal-lg">
      <div className="modal-header"><h3>EDITAR VENDA</h3><div className="close-btn" onClick={onClose}>✕</div></div>
      <div className="modal-body">
        <div style={{padding:'8px 12px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:14,fontSize:11,color:'var(--g3)'}}>
          #{sale.id.slice(-6)} · {fmtDate(sale.date)} · {sale.sellerName}
        </div>

        {/* Info geral */}
        <div className="form-row cols-2" style={{marginBottom:10}}>
          <div className="form-field"><label>Canal</label>
            <select value={channel} onChange={e=>setChannel(e.target.value)}><option>Física</option><option>Online</option></select>
          </div>
          <div className="form-field"><label>Status</label>
            <select value={paid?'pago':'pendente'} onChange={e=>setPaid(e.target.value==='pago')}>
              <option value="pago">Pago</option><option value="pendente">Pendente</option>
            </select>
          </div>
        </div>
        <div className="form-row cols-2" style={{marginBottom:14}}>
          <div className="form-field"><label>Nome do Cliente</label><input value={clientName} onChange={e=>setClientName(e.target.value)}/></div>
          <div className="form-field"><label>Observação</label><input value={note} onChange={e=>setNote(e.target.value)} placeholder="Obs. internas..."/></div>
        </div>

        {/* Produtos */}
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:2,color:'var(--g3)',marginBottom:8}}>PRODUTOS</div>
        {items.map((item,idx)=>(
          <div key={idx} style={{display:'grid',gridTemplateColumns:'2fr 60px 90px 80px auto',gap:6,alignItems:'center',padding:'6px 8px',background:'var(--bg3)',borderRadius:'var(--r)',marginBottom:4}}>
            <div style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{item.description}<div style={{fontSize:10,color:'var(--g3)'}}>{item.code}</div></div>
            <input type="number" min="1" value={item.qty} onChange={e=>updateItemQty(idx,parseInt(e.target.value)||0)} style={{background:'var(--bg4)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'4px 6px',color:'var(--text)',fontSize:12,width:'100%'}}/>
            <input type="number" step="0.01" value={item.unitPrice} onChange={e=>updateItemPrice(idx,e.target.value)} style={{background:'var(--bg4)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'4px 6px',color:'var(--text)',fontSize:12,width:'100%'}}/>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:12,fontWeight:700,color:'var(--text)',textAlign:'right'}}>{fmtMoney(item.qty*item.unitPrice)}</div>
            <button className="btn-icon" onClick={()=>updateItemQty(idx,0)} style={{color:'var(--danger)'}}>✕</button>
          </div>
        ))}
        {/* busca para adicionar produto */}
        <div style={{position:'relative',marginBottom:14}}>
          <div className="search-bar" style={{marginTop:6}}><span className="search-icon">⌕</span>
            <input value={searchProd} onChange={e=>setSearchProd(e.target.value)} onBlur={()=>setTimeout(()=>setSearchProd(''),200)} placeholder="Adicionar produto..."/>
          </div>
          {filtProds.length>0&&<div className="autocomplete-list">{filtProds.map(p=>(
            <div key={p.id} className="autocomplete-item" onMouseDown={()=>addProd(p)} style={{display:'flex',gap:8,alignItems:'center'}}>
              {p.photo&&<img src={p.photo} style={{width:28,height:28,borderRadius:4,objectFit:'cover'}} alt=""/>}
              <div><div style={{fontSize:12,fontWeight:600}}>{p.description}</div><small>{p.code} · {fmtMoney(p.salePrice)}</small></div>
            </div>
          ))}</div>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)',marginBottom:14}}>
          <span style={{fontWeight:700,color:'var(--text)'}}>Subtotal</span>
          <span style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{fmtMoney(subtotal)}</span>
        </div>

        {/* Pagamentos */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:2,color:'var(--g3)'}}>PAGAMENTOS</div>
          <button className="btn btn-sm btn-outline" onClick={()=>setPayMethods(ms=>[...ms,{method:'Pix',value:'',dueDate:''}])}>+ Método</button>
        </div>
        {payMethods.map((pm,i)=>(
          <div key={i} style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
            <select value={pm.method} onChange={e=>updatePay(i,'method',e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'7px 8px',color:'var(--text)',fontSize:12,flex:'0 0 110px'}}>
              <option>Dinheiro</option><option>Pix</option><option>Cartão</option><option>A prazo</option>
            </select>
            <input type="number" step="0.01" value={pm.value} onChange={e=>updatePay(i,'value',e.target.value)} placeholder="Valor" style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'7px 8px',color:'var(--text)',fontSize:12,flex:1}}/>
            {pm.method==='A prazo'&&<input type="date" value={pm.dueDate||''} onChange={e=>updatePay(i,'dueDate',e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'7px 8px',color:'var(--text)',fontSize:12,flex:'0 0 140px'}}/>}
            {payMethods.length>1&&<button className="btn-icon" onClick={()=>setPayMethods(ms=>ms.filter((_,idx)=>idx!==i))} style={{color:'var(--danger)'}}>✕</button>}
          </div>
        ))}
        {diff!==0&&<div style={{padding:'6px 10px',background:diff>0?'rgba(255,68,68,.08)':'rgba(68,255,136,.08)',border:`1px solid ${diff>0?'rgba(255,68,68,.3)':'rgba(68,255,136,.3)'}`,borderRadius:'var(--r)',fontSize:11,color:diff>0?'var(--danger)':'var(--success)',marginTop:4}}>
          {diff>0?`⚠ Falta cobrar ${fmtMoney(diff)}`:`✓ Pago ${fmtMoney(-diff)} a mais`}
        </div>}
      </div>
      <div className="modal-footer">
        <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
        <button className="btn btn-white" onClick={save}>Salvar</button>
      </div>
    </div></div>
  );
}

function Receivables() {
  const { sales, setSales, addToast, currentUser } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [confirm, setConfirm] = useState(null);
  const pending = sales.filter(s=>s.status!=='cancelada'&&(s.paymentMethod==='A prazo'||(s.paymentMethods&&s.paymentMethods.some(p=>p.method==='A prazo'))));
  const markPaid = (id) => {
    setConfirm({
      icon:'✅', titulo:'Confirmar Recebimento', msg:'Marcar este valor como recebido?',
      btnLabel:'Confirmar', btnClass:'btn-success',
      onConfirm: () => { setSales(ss=>ss.map(s=>s.id===id?{...s,paid:true}:s)); addToast('Marcado como pago ✓','success'); setConfirm(null); }
    });
  };
  const isOverdue = (s) => !s.paid && s.dueDate && new Date(s.dueDate)<new Date();
  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="grid-3 mb-24">
        <div className="stat-card yellow"><div className="stat-label">Pendente</div><div className="stat-value">{fmtMoney(pending.filter(s=>!s.paid).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">◎</div></div>
        <div className="stat-card red"><div className="stat-label">Atrasado</div><div className="stat-value">{fmtMoney(pending.filter(s=>isOverdue(s)).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">⚠</div></div>
        <div className="stat-card green"><div className="stat-label">Recebido</div><div className="stat-value">{fmtMoney(pending.filter(s=>s.paid).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">✓</div></div>
      </div>
      <div className="card"><div className="table-wrap"><table>
        <thead><tr><th>Cliente</th><th>Vendedor</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody>{pending.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).map(s=>{
          const overdue=isOverdue(s);
          return (
            <tr key={s.id}>
              <td style={{fontWeight:600,color:'var(--text)'}}>{s.clientName||'—'}</td>
              <td style={{fontSize:12,color:'var(--text)'}}>{s.sellerName}</td>
              <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--warning)'}}>{fmtMoney(getValorPrazo(s))}</td>
              <td style={{color:overdue?'var(--danger)':'var(--text)',fontSize:12}}>{fmtDate(s.dueDate)}</td>
              <td><span className={`badge ${s.paid?'badge-green':overdue?'badge-red':'badge-yellow'}`}>{s.paid?'Pago':overdue?'Atrasado':'Pendente'}</span></td>
              <td>{!s.paid&&isAdmin&&<button className="btn btn-sm btn-success" onClick={()=>markPaid(s.id)}>✓ Receber</button>}</td>
            </tr>
          );
        })}</tbody>
      </table></div></div>
    </div>
  );
}
