// CASHFLOW
// ============================================================
function Cashflow() {
  const { sales, expenses, setExpenses, returns, addToast } = useContext(AppContext);
  const [filterStore, setFilterStore] = useState('Todos');
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({description:'',amount:0,store:'Cosmos',category:'Aluguel',date:new Date().toISOString().slice(0,10)});
  const {m,y} = thisMonth();
  const filtSales=sales.filter(s=>(filterStore==='Todos'||s.store===filterStore)&&isSameMonth(s.date,m,y));
  const filtExp=expenses.filter(e=>(filterStore==='Todos'||e.store===filterStore)&&isSameMonth(e.date,m,y));
  const filtRet=returns.filter(r=>r.type==='devolucao'&&r.estornar&&(filterStore==='Todos'||r.store===filterStore)&&isSameMonth(r.date,m,y));
  const totalIn=filtSales.reduce((a,s)=>a+s.total,0);
  const totalEstornos=filtRet.reduce((a,r)=>a+r.totalEstorno,0);
  const totalOut=filtExp.reduce((a,e)=>a+e.amount,0);

  const saveExpense = () => {
    if(!form.description||!form.amount) return addToast('Preencha todos os campos','error');
    setExpenses(ex=>[...ex,{...form,id:'e'+Date.now(),amount:Number(form.amount),date:new Date(form.date).toISOString()}]);
    addToast('Despesa cadastrada!','success'); setModal(false);
  };

  return (
    <div>
      <div className="flex items-center gap-12 mb-24" style={{flexWrap:'wrap'}}>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}>
          <option>Todos</option><option>Cosmos</option><option>Nova Cidade</option>
        </select>
        <button className="btn btn-white" onClick={()=>setModal(true)}>+ Nova Despesa</button>
      </div>
      <div className="grid-4 mb-24">
        <div className="stat-card green"><div className="stat-label">Entradas</div><div className="stat-value">{fmtMoney(totalIn)}</div><div className="stat-icon">↑</div></div>
        <div className="stat-card yellow"><div className="stat-label">Estornos Dev.</div><div className="stat-value">{fmtMoney(totalEstornos)}</div><div className="stat-icon">↩</div></div>
        <div className="stat-card red"><div className="stat-label">Despesas</div><div className="stat-value">{fmtMoney(totalOut)}</div><div className="stat-icon">↓</div></div>
        <div className={`stat-card ${totalIn-totalEstornos-totalOut>=0?'white':'red'}`}><div className="stat-label">Lucro Líquido</div><div className="stat-value">{fmtMoney(totalIn-totalEstornos-totalOut)}</div><div className="stat-icon">{totalIn-totalEstornos-totalOut>=0?'▲':'▼'}</div></div>
      </div>
      {filtRet.length>0&&(
        <div className="card mb-24">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--warning)'}}>ESTORNOS – DEVOLUÇÕES DO MÊS</div>
          <div className="table-wrap table-scroll"><table>
            <thead><tr><th>Data</th><th>Motivo</th><th>Loja</th><th>Valor Estornado</th></tr></thead>
            <tbody>{filtRet.map(r=>(
              <tr key={r.id}>
                <td style={{fontSize:11}}>{fmtDate(r.date)}</td>
                <td style={{fontSize:12,color:'var(--text)'}}>{r.motivo||'—'}</td>
                <td><span className="badge badge-gray">{r.store}</span></td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--warning)',fontSize:12}}>-{fmtMoney(r.totalEstorno)}</td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}
      <div className="grid-2">
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>ENTRADAS – VENDAS</div>
          <div className="table-wrap table-scroll">
            <table>
              <thead><tr><th>Data</th><th>Loja</th><th>Vendedor</th><th>Valor</th></tr></thead>
              <tbody>{filtSales.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>(
                <tr key={s.id}><td style={{fontSize:11}}>{fmtDate(s.date)}</td><td><span className="badge badge-gray">{s.store}</span></td><td style={{fontSize:12,color:'var(--text)'}}>{s.sellerName}</td><td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--success)',fontSize:12}}>{fmtMoney(s.total)}</td></tr>
              ))}</tbody>
            </table>
          </div>
        </div>
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>SAÍDAS – DESPESAS</div>
          <div className="table-wrap table-scroll">
            <table>
              <thead><tr><th>Descrição</th><th>Cat.</th><th>Loja</th><th>Valor</th><th></th></tr></thead>
              <tbody>{filtExp.map(e=>(
                <tr key={e.id}><td style={{color:'var(--text)',fontSize:12}}>{e.description}</td><td><span className="badge badge-gray">{e.category}</span></td><td><span className="badge badge-gray">{e.store}</span></td><td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--danger)',fontSize:12}}>{fmtMoney(e.amount)}</td><td><button className="btn-icon" onClick={()=>setExpenses(ex=>ex.filter(x=>x.id!==e.id))} style={{color:'var(--danger)'}}>✕</button></td></tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      </div>
      {modal&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>NOVA DESPESA</h3><div className="close-btn" onClick={()=>setModal(false)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row cols-2">
              <div className="form-field"><label>Categoria</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value,description:e.target.value}))}>
                  <option>Aluguel</option><option>Internet</option><option>Água</option><option>Luz</option><option>Outros</option>
                </select>
              </div>
              <div className="form-field"><label>Loja</label>
                <select value={form.store} onChange={e=>setForm(f=>({...f,store:e.target.value}))}><option>Cosmos</option><option>Nova Cidade</option></select>
              </div>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Descrição</label><input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
              <div className="form-field"><label>Valor (R$)</label><input type="number" step="0.01" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Data</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div></div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-white" onClick={saveExpense}>Salvar</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ============================================================
// EMPLOYEES
// ============================================================
function Employees() {
  const { sellers, setSellers, updateCurrentUser, addToast } = useContext(AppContext);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({name:'',role:'seller',store:'Cosmos',password:'',active:true});
  const [editId, setEditId] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const fileRef = useRef();

  const openAdd = () => { setForm({name:'',role:'seller',store:'Cosmos',password:'',active:true}); setPhotoPreview(null); setEditId(null); setModal('form'); };
  const openEdit = (s) => { setForm({...s}); setPhotoPreview(s.photo); setEditId(s.id); setModal('form'); };

  const save = () => {
    if(!form.name) return addToast('Informe o nome','error');
    if(!editId && !form.password) return addToast('Informe a senha','error');
    if(editId) {
      updateCurrentUser(sellers.map(s=>s.id===editId?{...s,...form,photo:photoPreview}:s));
    } else {
      setSellers(ss=>[...ss,{...form,id:'s'+Date.now(),photo:photoPreview||null}]);
    }
    addToast('Salvo!','success'); setModal(null);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-24">
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)'}}>FUNCIONÁRIOS</span>
        <button className="btn btn-white" onClick={openAdd}>+ Adicionar</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
        {sellers.map(s=>(
          <div key={s.id} className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',padding:24,gap:10,opacity:s.active?1:.5,position:'relative'}}>
            {!s.active&&<div style={{position:'absolute',top:8,right:8}}><span className="badge badge-red">Inativo</span></div>}
            <div style={{width:64,height:64,borderRadius:'50%',background:'var(--bg4)',border:'2px solid var(--bg5)',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'var(--text)'}}>
              {s.photo?<img src={s.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(s.name)}
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{s.name}</div>
              <div style={{fontSize:10,color:'var(--g3)',letterSpacing:1,textTransform:'uppercase',marginTop:2}}>{s.role==='admin'?'Admin':'Vendedor'}</div>
              <div style={{fontSize:10,color:'var(--g3)',marginTop:2}}>{s.store}</div>
              <div style={{fontSize:9,color:'var(--g2)',fontFamily:'DM Mono,monospace',marginTop:3}}>ID: {s.id}</div>
            </div>
            <div className="flex gap-6" style={{flexWrap:'wrap',justifyContent:'center'}}>
              <button className="btn btn-sm btn-outline" onClick={()=>openEdit(s)}>✎</button>
              <button className="btn btn-sm btn-outline" onClick={()=>{updateCurrentUser(sellers.map(x=>x.id===s.id?{...x,active:!x.active}:x));addToast('Status atualizado','info')}}>{s.active?'Desativar':'Ativar'}</button>
              {s.id!=='admin'&&<button className="btn btn-sm btn-danger" onClick={()=>{setSellers(ss=>ss.filter(x=>x.id!==s.id));addToast('Removido','info')}}>✕</button>}
            </div>
          </div>
        ))}
      </div>

      {modal==='form'&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>{editId?'EDITAR':'NOVO FUNCIONÁRIO'}</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
              <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{setPhotoPreview(ev.target.result);setForm(f=>({...f,photo:ev.target.result}))};
                reader.readAsDataURL(file);
              }}/>
              <div className="photo-upload" onClick={()=>fileRef.current?.click()}>
                {photoPreview&&<img src={photoPreview} alt=""/>}
                <div className="photo-upload-ov"><span style={{fontSize:18}}>📷</span></div>
                {!photoPreview&&<span style={{fontSize:26,color:'var(--g2)'}}>+</span>}
              </div>
              <div style={{fontSize:10,color:'var(--g3)',marginTop:5}}>Clique para foto</div>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Nome</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
              <div className="form-field"><label>Função</label>
                <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}><option value="seller">Vendedor</option><option value="admin">Admin</option></select>
              </div>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Loja</label>
                <select value={form.store} onChange={e=>setForm(f=>({...f,store:e.target.value}))}><option>Cosmos</option><option>Nova Cidade</option><option>Todos</option></select>
              </div>
              <div className="form-field"><label>Senha</label><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-white" onClick={save}>Salvar</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ============================================================
// GOALS
// ============================================================
function Goals() {
  const { sellers, goals, setGoals, addToast } = useContext(AppContext);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({sellerId:'',month:new Date().getMonth(),year:new Date().getFullYear(),goal:''});
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  const save = () => {
    if(!form.sellerId||!form.goal) return addToast('Preencha todos os campos','error');
    setGoals(gs=>{
      const ex=gs.findIndex(g=>g.sellerId===form.sellerId&&g.month===Number(form.month)&&g.year===Number(form.year));
      if(ex>=0) return gs.map((g,i)=>i===ex?{...form,goal:Number(form.goal),month:Number(form.month),year:Number(form.year)}:g);
      return [...gs,{...form,goal:Number(form.goal),month:Number(form.month),year:Number(form.year)}];
    });
    addToast('Meta definida!','success'); setModal(false);
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-24">
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)'}}>METAS POR VENDEDOR</span>
        <button className="btn btn-white" onClick={()=>{setForm({sellerId:'',month:new Date().getMonth(),year:new Date().getFullYear(),goal:''});setModal(true)}}>+ Definir Meta</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Vendedor</th><th>Mês/Ano</th><th>Meta</th></tr></thead>
            <tbody>{goals.map((g,i)=>{
              const seller=sellers.find(s=>s.id===g.sellerId);
              return (
                <tr key={i}>
                  <td>
                    <div className="flex items-center gap-8">
                      <div className="rank-avatar" style={{width:26,height:26,fontSize:10}}>{seller?.photo?<img src={seller.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(seller?.name||'?')}</div>
                      <span style={{color:'var(--text)'}}>{seller?.name||'—'}</span>
                    </div>
                  </td>
                  <td style={{color:'var(--text)',fontSize:12}}>{months[g.month]} / {g.year}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{fmtMoney(g.goal)}</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
      {modal&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>DEFINIR META</h3><div className="close-btn" onClick={()=>setModal(false)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row"><div className="form-field"><label>Vendedor</label>
              <select value={form.sellerId} onChange={e=>setForm(f=>({...f,sellerId:e.target.value}))}>
                <option value="">Selecionar...</option>
                {sellers.filter(s=>s.role==='seller'&&s.active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div></div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Mês</label>
                <select value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}>
                  {months.map((mn,i)=><option key={i} value={i}>{mn}</option>)}
                </select>
              </div>
              <div className="form-field"><label>Ano</label><input type="number" value={form.year} onChange={e=>setForm(f=>({...f,year:e.target.value}))}/></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Meta (R$)</label><input type="number" step="100" value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} placeholder="5000"/></div></div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-white" onClick={save}>Salvar</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

// ============================================================
// ROOT
// ============================================================
function App() {
  return (
    <AppProvider>
      <AppInner />
    </AppProvider>
  );
}

function AppInner() {
  const { currentUser, device } = useContext(AppContext);
  if (!device) return <DeviceSelector />;
  if (!currentUser) return <Login />;
  return <MainApp />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
