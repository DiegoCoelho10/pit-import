function MetasLoja({ sales, lojas, goals, setGoals, currentUser, addToast }) {
  const isAdmin = currentUser.role==='admin';
  const {m,y} = thisMonth();
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({loja:'',month:m,year:y,goal:''});

  const save = () => {
    if(!form.loja||!form.goal) return addToast('Preencha todos os campos','error');
    setGoals(gs=>{
      const key='goal_loja_'+form.loja+'_'+form.month+'_'+form.year;
      const entry={...form,id:key,tipo:'loja',goal:Number(form.goal),month:Number(form.month),year:Number(form.year)};
      const ex=gs.findIndex(g=>g.id===key);
      if(ex>=0) return gs.map((g,i)=>i===ex?entry:g);
      return [...gs,entry];
    });
    addToast('Meta da loja salva!','success'); setModal(false);
  };

  const lojaGoals = goals.filter(g=>g.tipo==='loja');
  return (
    <div>
      {isAdmin&&<div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="btn btn-white" onClick={()=>{setForm({loja:lojas[0]||'',month:m,year:y,goal:''});setModal(true)}}>+ Meta por Loja</button>
      </div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14,marginBottom:20}}>
        {lojas.map(loja=>{
          const vendasLoja=sales.filter(s=>s.store===loja&&isSameMonth(s.date,m,y)).reduce((a,s)=>a+s.total,0);
          const metaLoja=lojaGoals.find(g=>g.loja===loja&&g.month===m&&g.year===y);
          const pct=metaLoja?Math.min(vendasLoja/metaLoja.goal*100,100):0;
          return (
            <div key={loja} className="card">
              <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,color:'var(--text)',marginBottom:8}}>{loja}</div>
              <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:28,color:'var(--text)'}}>{fmtMoney(vendasLoja)}</div>
              <div style={{fontSize:11,color:'var(--g3)',marginBottom:8}}>Meta: {metaLoja?fmtMoney(metaLoja.goal):'Não definida'}</div>
              {metaLoja&&<><div className="progress-bar"><div className={`progress-fill ${pct>=100?'green':pct>=70?'yellow':'red'}`} style={{width:pct+'%'}}/></div>
              <div style={{fontSize:10,color:'var(--g3)',marginTop:3,textAlign:'right'}}>{pct.toFixed(0)}%</div></>}
            </div>
          );
        })}
      </div>
      <div className="card"><div className="table-wrap"><table>
        <thead><tr><th>Loja</th><th>Mês/Ano</th><th>Meta</th><th>Realizado</th><th>%</th>{isAdmin&&<th></th>}</tr></thead>
        <tbody>{lojaGoals.map((g,i)=>{
          const vend=sales.filter(s=>s.store===g.loja&&isSameMonth(s.date,Number(g.month),Number(g.year))).reduce((a,s)=>a+s.total,0);
          const p=Math.min(vend/g.goal*100,100);
          return (<tr key={i}>
            <td><span className="badge badge-blue">{g.loja}</span></td>
            <td style={{fontSize:12,color:'var(--text)'}}>{months[Number(g.month)]} / {g.year}</td>
            <td style={{fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtMoney(g.goal)}</td>
            <td style={{fontFamily:'DM Mono,monospace',color:vend>=g.goal?'var(--success)':'var(--danger)'}}>{fmtMoney(vend)}</td>
            <td><span className={`badge ${p>=100?'badge-green':p>=70?'badge-yellow':'badge-red'}`}>{p.toFixed(0)}%</span></td>
            {isAdmin&&<td><button className="btn-icon" style={{color:'var(--danger)'}} onClick={()=>setGoals(gs=>gs.filter(x=>x.id!==g.id))}>🗑</button></td>}
          </tr>);
        })}</tbody>
      </table></div></div>
      {modal&&<div className="modal-overlay"><div className="modal">
        <div className="modal-header"><h3>META POR LOJA</h3><div className="close-btn" onClick={()=>setModal(false)}>✕</div></div>
        <div className="modal-body">
          <div className="form-row"><div className="form-field"><label>Loja</label><select value={form.loja} onChange={e=>setForm(f=>({...f,loja:e.target.value}))}>{lojas.map(l=><option key={l}>{l}</option>)}</select></div></div>
          <div className="form-row cols-2">
            <div className="form-field"><label>Mês</label><select value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}>{['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].map((mn,i)=><option key={i} value={i}>{mn}</option>)}</select></div>
            <div className="form-field"><label>Ano</label><input type="number" value={form.year} onChange={e=>setForm(f=>({...f,year:e.target.value}))}/></div>
          </div>
          <div className="form-row"><div className="form-field"><label>Meta (R$)</label><input type="number" step="100" value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} placeholder="10000"/></div></div>
        </div>
        <div className="modal-footer"><button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-white" onClick={save}>Salvar</button></div>
      </div></div>}
    </div>
  );
}

function Goals() {
  const { sellers, goals, setGoals, addToast, currentUser, sales, lojas } = useContext(AppContext);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({sellerId:'',month:new Date().getMonth(),year:new Date().getFullYear(),goal:''});
  const [confirm, setConfirm] = useState(null);
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  const save = () => {
    if(!form.sellerId||!form.goal) return addToast('Preencha todos os campos','error');
    setGoals(gs=>{
      const ex=gs.findIndex(g=>g.sellerId===form.sellerId&&g.month===Number(form.month)&&g.year===Number(form.year));
      const entry={...form,id:'goal_'+form.sellerId+'_'+form.month+'_'+form.year,goal:Number(form.goal),month:Number(form.month),year:Number(form.year)};
      if(ex>=0) return gs.map((g,i)=>i===ex?entry:g);
      return [...gs,entry];
    });
    addToast('Meta definida!','success'); setModal(false);
  };

  const handleDelete = (g, seller) => {
    setConfirm({
      icon:'🗑️', titulo:'Excluir Meta',
      msg:`Excluir meta de ${fmtMoney(g.goal)} de ${seller?.name||'?'} em ${months[g.month]}/${g.year}?`,
      btnLabel:'Excluir', btnClass:'btn-danger',
      onConfirm: () => {
        setGoals(gs=>gs.filter(x=>!(x.sellerId===g.sellerId&&x.month===g.month&&x.year===g.year)));
        addToast('Meta removida','info'); setConfirm(null);
      }
    });
  };

  const [goalsTab, setGoalsTab] = useState('vendedor');
  const {m:curM, y:curY} = thisMonth();
  const months2=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // Histórico de atingimento por vendedor
  const historicoVendedor = sellers.filter(s=>s.role==='seller').map(s=>{
    const minY=Math.min(...(goals.filter(g=>g.sellerId===s.id).map(g=>g.year)||[curY]));
    const anos2=[...new Set(goals.filter(g=>g.sellerId===s.id).map(g=>g.year))].sort();
    return {seller:s, anos:anos2.map(y=>({y,meses:Array.from({length:12},(_,m)=>{
      const g=goals.find(gg=>gg.sellerId===s.id&&gg.month===m&&gg.year===y);
      const vend=sales.filter(s2=>s2.sellerId===s.id&&isSameMonth(s2.date,m,y)).reduce((a,s2)=>a+s2.total,0);
      return {m,meta:g?.goal||0,vendido:vend,atingiu:g&&vend>=g.goal};
    })}))};
  }).filter(s=>s.anos.length>0);

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="tabs" style={{marginBottom:16}}>
        <div className={`tab ${goalsTab==='vendedor'?'active':''}`} onClick={()=>setGoalsTab('vendedor')}>Por Vendedor</div>
        <div className={`tab ${goalsTab==='loja'?'active':''}`} onClick={()=>setGoalsTab('loja')}>Por Loja</div>
        <div className={`tab ${goalsTab==='historico'?'active':''}`} onClick={()=>setGoalsTab('historico')}>Histórico</div>
      </div>
      {goalsTab==='loja' && <MetasLoja sales={sales} lojas={lojas} goals={goals} setGoals={setGoals} currentUser={currentUser} addToast={addToast}/>}
      {goalsTab==='historico' && (
        <div>
          {historicoVendedor.length===0 ? <div className="empty-state"><div className="icon">📊</div><p>Nenhuma meta definida ainda</p></div> :
          historicoVendedor.map(({seller,anos})=>(
            <div key={seller.id} className="card mb-16">
              <div style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:12}}>{seller.name}</div>
              {anos.map(({y,meses})=>(
                <div key={y} style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:'var(--g3)',marginBottom:6}}>{y}</div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {meses.map(({m,meta,vendido,atingiu})=>(
                      <div key={m} style={{textAlign:'center',minWidth:44,padding:'6px 4px',borderRadius:'var(--r)',background:meta===0?'var(--bg3)':atingiu?'rgba(68,255,136,.1)':'rgba(255,68,68,.08)',border:`1px solid ${meta===0?'var(--bg5)':atingiu?'rgba(68,255,136,.3)':'rgba(255,68,68,.3)'}`}}>
                        <div style={{fontSize:9,color:'var(--g3)'}}>{months2[m]}</div>
                        <div style={{fontSize:11,fontWeight:700,color:meta===0?'var(--g2)':atingiu?'var(--success)':'var(--danger)'}}>{meta===0?'—':atingiu?'✓':'✗'}</div>
                        {meta>0&&<div style={{fontSize:8,color:'var(--g3)'}}>{Math.round(vendido/meta*100)}%</div>}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
      {goalsTab==='vendedor' && <>
      <div className="flex items-center justify-between mb-24">
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)'}}>METAS POR VENDEDOR</span>
        <button className="btn btn-white" onClick={()=>{setForm({sellerId:'',month:new Date().getMonth(),year:new Date().getFullYear(),goal:''});setModal(true)}}>+ Definir Meta</button>
      </div>
      <div className="card"><div className="table-wrap"><table>
        <thead><tr><th>Vendedor</th><th>Mês/Ano</th><th>Meta</th><th>Meta Semanal</th><th></th></tr></thead>
        <tbody>{goals.map((g,i)=>{
          const seller=sellers.find(s=>s.id===g.sellerId);
          return (<tr key={i}>
            <td><div className="flex items-center gap-8"><div className="rank-avatar" style={{width:26,height:26,fontSize:10}}>{seller?.photo?<img src={seller.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:initials(seller?.name||'?')}</div><span style={{color:'var(--text)'}}>{seller?.name||'—'}</span></div></td>
            <td style={{color:'var(--text)',fontSize:12}}>{months[g.month]} / {g.year}</td>
            <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{fmtMoney(g.goal)}</td>
            <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--g3)'}}>{fmtMoney(g.goal/4)}</td>
            <td><button className="btn-icon" onClick={()=>handleDelete(g,seller)} style={{color:'var(--danger)'}}>🗑</button></td>
          </tr>);
        })}</tbody>
      </table></div></div>
      </>}
      {modal&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>DEFINIR META</h3><div className="close-btn" onClick={()=>setModal(false)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row"><div className="form-field"><label>Vendedor</label><select value={form.sellerId} onChange={e=>setForm(f=>({...f,sellerId:e.target.value}))}><option value="">Selecionar...</option>{sellers.filter(s=>s.role==='seller'&&s.active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div></div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Mês</label><select value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))}>{months.map((mn,i)=><option key={i} value={i}>{mn}</option>)}</select></div>
              <div className="form-field"><label>Ano</label><input type="number" value={form.year} onChange={e=>setForm(f=>({...f,year:e.target.value}))}/></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Meta Mensal (R$)</label><input type="number" step="100" value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} placeholder="5000"/></div></div>
            {form.goal && <div style={{padding:'10px 14px',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12,color:'var(--g3)'}}>
              Meta semanal calculada: <strong style={{color:'var(--text)'}}>{fmtMoney(Number(form.goal)/4)}</strong>
            </div>}
          </div>

        </div></div>
      )}
    </div>
  );
}

// ===== TELA DE RESERVAS =====
function Reservas() {
  const { reservas, setReservas, products, setProducts, clients, currentUser, addToast, addMovement } = useContext(AppContext);
  const isAdmin = currentUser.role === 'admin';
  const [confirm, setConfirm] = useState(null);
  const [tab, setTab] = useState('ativas');
  const [expanded, setExpanded] = useState(null);

  const ativas = reservas.filter(r=>r.ativa);
  const encerradas = reservas.filter(r=>!r.ativa);

  const cancelarReserva = (r) => {
    setConfirm({
      icon:'🔓', titulo:'Cancelar Reserva',
      msg:`Cancelar reserva de "${r.produtoNome}" para ${r.clienteNome}? O produto voltará a ficar disponível sem baixa no estoque.`,
      btnLabel:'Cancelar', btnClass:'btn-danger',
      onConfirm: () => {
        setReservas(rs=>rs.map(x=>x.id===r.id?{...x,ativa:false,status:'cancelada',canceladaEm:new Date().toISOString()}:x));
        addToast('Reserva cancelada','info'); setConfirm(null);
      }
    });
  };

  const marcarEntregue = (r) => {
    const acao = r.tipoEntrega==='entregar' ? 'entregue ao cliente' : 'retirado na loja';
    setConfirm({
      icon: r.tipoEntrega==='entregar'?'📦':'🏪',
      titulo: r.tipoEntrega==='entregar'?'CONFIRMAR ENTREGA':'CONFIRMAR RETIRADA',
      msg: `Confirmar que "${r.produtoNome}" foi ${acao} por ${r.clienteNome}? O estoque da loja ${r.produtoLoja} será baixado.`,
      btnLabel:'Confirmar', btnClass:'btn-success',
      onConfirm: () => {
        // dar baixa no estoque da loja do produto
        setProducts(ps=>ps.map(p=>{
          if(p.id===r.produtoId) {
            addMovement(p.id, r.tipoEntrega==='entregar'?'entrega':'retirada', r.qty, `Reserva ${r.clienteNome}`);
            return {...p, qty: Math.max(0, p.qty - r.qty)};
          }
          return p;
        }));
        setReservas(rs=>rs.map(x=>x.id===r.id?{...x,ativa:false,status:r.tipoEntrega==='entregar'?'entregue':'retirado',encerradaEm:new Date().toISOString()}:x));
        addToast(r.tipoEntrega==='entregar'?'Entrega confirmada! Estoque baixado.':'Retirada confirmada! Estoque baixado.','success');
        setConfirm(null); setExpanded(null);
      }
    });
  };

  const lista = tab==='ativas' ? ativas : encerradas;

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="grid-3 mb-24">
        <div className="stat-card yellow"><div className="stat-label">Reservas Ativas</div><div className="stat-value">{ativas.length}</div><div className="stat-icon">🔒</div></div>
        <div className="stat-card blue"><div className="stat-label">Produtos Distintos</div><div className="stat-value">{[...new Set(ativas.map(r=>r.produtoId))].length}</div><div className="stat-icon">▦</div></div>
        <div className="stat-card white"><div className="stat-label">Total Histórico</div><div className="stat-value">{reservas.length}</div><div className="stat-icon">≡</div></div>
      </div>

      <div className="tabs">
        <div className={`tab ${tab==='ativas'?'active':''}`} onClick={()=>setTab('ativas')}>🔒 Ativas ({ativas.length})</div>
        <div className={`tab ${tab==='hist'?'active':''}`} onClick={()=>setTab('hist')}>Histórico ({encerradas.length})</div>
      </div>

      <div className="card">
        {lista.length===0 ? (
          <div className="empty-state"><div className="icon">🔒</div><p>{tab==='ativas'?'Nenhuma reserva ativa no momento':'Nenhuma reserva encerrada'}</p></div>
        ) : (
          <div className="table-wrap"><table>
            <thead><tr>
              <th style={{width:28}}></th>
              <th>Produto</th><th>Loja</th><th>Cliente</th><th>Vendedor</th><th>Data</th><th>Tipo</th><th>Status</th>
              {tab==='ativas'&&<th></th>}
            </tr></thead>
            <tbody>{lista.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(r=>{
              const prod = products.find(p=>p.id===r.produtoId);
              const isExp = expanded===r.id;
              const statusColor = r.status==='entregue'||r.status==='retirado'?'badge-green':r.status==='cancelada'?'badge-red':'badge-yellow';
              const statusLabel = r.status==='entregue'?'✓ Entregue':r.status==='retirado'?'✓ Retirado':r.status==='cancelada'?'Cancelada':'🔒 Reservado';
              return (
                <React.Fragment key={r.id}>
                  <tr onClick={()=>setExpanded(isExp?null:r.id)} style={{cursor:'pointer',background:isExp?'var(--bg3)':'transparent'}}>
                    <td style={{textAlign:'center',color:'var(--g3)',fontSize:11}}>{isExp?'▲':'▼'}</td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {prod?.photo
                          ? <img src={prod.photo} style={{width:30,height:30,borderRadius:4,objectFit:'cover'}} alt=""/>
                          : <div style={{width:30,height:30,borderRadius:4,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:.3,fontSize:13}}>▦</div>
                        }
                        <div>
                          <div style={{fontWeight:600,color:'var(--text)',fontSize:12}}>{r.produtoNome}</div>
                          <div style={{fontSize:10,color:'var(--g3)'}}>{r.qty} un.</div>
                        </div>
                      </div>
                    </td>
                    <td><span className="badge badge-blue">{r.produtoLoja}</span></td>
                    <td style={{fontWeight:600,color:'var(--text)',fontSize:12}}>{r.clienteNome}</td>
                    <td style={{fontSize:11,color:'var(--g3)'}}>{r.vendedorNome}</td>
                    <td style={{fontSize:11,color:'var(--g3)'}}>{fmtDate(r.data)}</td>
                    <td><span style={{fontSize:11}}>{r.tipoEntrega==='entregar'?'📦 Entrega':'🏪 Retira'}</span></td>
                    <td><span className={`badge ${statusColor}`}>{statusLabel}</span></td>
                    {tab==='ativas'&&<td onClick={e=>e.stopPropagation()}>
                      <div className="flex gap-8">
                        <button className="btn btn-sm btn-success" onClick={e=>{e.stopPropagation();marcarEntregue(r);}}>
                          {r.tipoEntrega==='entregar'?'📦 Entregar':'🏪 Retirar'}
                        </button>
                        {isAdmin&&<button className="btn btn-sm btn-danger" onClick={e=>{e.stopPropagation();cancelarReserva(r);}}>Cancelar</button>}
                      </div>
                    </td>}
                  </tr>
                  {isExp&&(
                    <tr>
                      <td colSpan={tab==='ativas'?9:8} style={{padding:0,background:'var(--bg3)',borderBottom:'2px solid var(--bg5)'}}>
                        <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                          {/* Dados do produto */}
                          <div>
                            <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--g3)',marginBottom:8}}>Produto Reservado</div>
                            <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10}}>
                              {prod?.photo&&<img src={prod.photo} style={{width:48,height:48,borderRadius:6,objectFit:'cover'}} alt=""/>}
                              <div>
                                <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{r.produtoNome}</div>
                                <div style={{fontSize:11,color:'var(--g3)'}}>{r.produtoCodigo}</div>
                                <div style={{fontSize:11,color:'var(--g3)'}}>Estoque em: <strong style={{color:'var(--info)'}}>{r.produtoLoja}</strong></div>
                                <div style={{fontSize:11,color:'var(--g3)'}}>Qtd reservada: <strong style={{color:'var(--text)'}}>{r.qty} un.</strong></div>
                              </div>
                            </div>
                            <div style={{padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)',fontSize:11,color:'var(--g3)'}}>
                              Reservado em: {fmtDate(r.data)} · por {r.vendedorNome} ({r.lojaVendedor})
                            </div>
                            {r.encerradaEm&&<div style={{padding:'6px 10px',fontSize:10,color:'var(--g3)',marginTop:4}}>
                              {r.status==='entregue'?'Entregue':'Retirado'} em: {fmtDate(r.encerradaEm)}
                            </div>}
                          </div>
                          {/* Dados do cliente */}
                          <div>
                            <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--g3)',marginBottom:8}}>Cliente</div>
                            <div style={{padding:'12px 14px',background:'var(--bg4)',borderRadius:'var(--r)'}}>
                              <div style={{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:6}}>{r.clienteNome}</div>
                              {(()=>{
                                const cli = clients?.find(cl=>cl.name===r.clienteNome||cl.id===r.clienteId);
                                if(!cli) return <div style={{fontSize:11,color:'var(--g3)'}}>Cliente não cadastrado no sistema</div>;
                                return <>
                                  {cli.phone&&<div style={{fontSize:12,color:'var(--g3)',marginBottom:3}}>📞 {cli.phone}</div>}
                                  {cli.cpf&&<div style={{fontSize:12,color:'var(--g3)',marginBottom:3}}>CPF: {cli.cpf}</div>}
                                  {(cli.rua||cli.bairro)&&<div style={{fontSize:12,color:'var(--g3)',marginBottom:3}}>📍 {[cli.rua,cli.numero,cli.bairro].filter(Boolean).join(', ')}</div>}
                                  {cli.email&&<div style={{fontSize:12,color:'var(--g3)'}}>✉ {cli.email}</div>}
                                </>;
                              })()}
                            </div>
                            <div style={{marginTop:8,padding:'10px 14px',background:r.tipoEntrega==='entregar'?'rgba(68,170,255,.06)':'rgba(68,255,136,.06)',border:`1px solid ${r.tipoEntrega==='entregar'?'rgba(68,170,255,.2)':'rgba(68,255,136,.2)'}`,borderRadius:'var(--r)'}}>
                              <div style={{fontWeight:700,fontSize:13,color:r.tipoEntrega==='entregar'?'var(--info)':'var(--success)'}}>
                                {r.tipoEntrega==='entregar'?'📦 ENTREGA AO CLIENTE':'🏪 RETIRADA NA LOJA '+r.produtoLoja}
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}</tbody>
          </table></div>
        )}
      </div>
    </div>
  );
}

function WhatsApp() {
  const { clients, sales, addToast } = useContext(AppContext);
  const [tab, setTab] = useState('posVenda');
  const [search, setSearch] = useState('');
  const hoje = new Date();
  const posVenda = clients.filter(c=>c.phone).map(c=>{
    const ult=sales.filter(s=>s.clientId===c.id&&s.status!=='cancelada').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if(!ult) return null;
    const dias=Math.floor((hoje-new Date(ult.date))/(1000*60*60*24));
    return {...c,ult,dias};
  }).filter(Boolean).filter(c=>c.dias>=1&&c.dias<=7).sort((a,b)=>a.dias-b.dias);
  const inativos = clients.filter(c=>c.phone).map(c=>{
    const ult=sales.filter(s=>s.clientId===c.id&&s.status!=='cancelada').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const dias=ult?Math.floor((hoje-new Date(ult.date))/(1000*60*60*24)):999;
    return {...c,dias,ult};
  }).filter(c=>c.dias>=60).sort((a,b)=>b.dias-a.dias);
  const aniversariantes = clients.filter(c=>c.phone&&c.dataNasc).filter(c=>{
    try{return new Date(c.dataNasc).getMonth()===hoje.getMonth();}catch(e){return false;}
  });
  const msgPos = (c) => 'Olá '+c.name+'! 🐾

Aqui é a equipe da *PIT IMPORT*!

Passamos para saber como foi sua experiência com sua compra. Esperamos que tenha amado! 😍

Qualquer dúvida, é só chamar! 💪

Obrigado pela confiança! 🛍️';
  const msgInativo = (c) => { const d=c.dias>=999?'um tempão':c.dias+' dias'; return 'Ei, '+c.name+'! Tudo bem? 🐾

Faz '+d+' que você não aparece por aqui e a gente sentiu falta! 😢

A *PIT IMPORT* chegou com novidades incríveis! Vem dar uma passada ou fala com a gente. 🔥'; };
  const msgAniv = (c) => '🎂 *Feliz Aniversário, '+c.name+'!* 🎉

A equipe da *PIT IMPORT* deseja um dia incrível! 🐾💛

Venha comemorar com a gente e garanta seu desconto especial de aniversário! 🛍️';
  const enviar = (phone, msg) => { window.open('https://wa.me/55'+phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank'); addToast('Abrindo WhatsApp...','info'); };
  const listas = {posVenda:posVenda,inativos:inativos,aniversariantes:aniversariantes};
  const labels = {posVenda:'Pós-venda (7 dias)',inativos:'Inativos (+60 dias)',aniversariantes:'Aniversariantes'};
  const lista = (listas[tab]||[]).filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="grid-3 mb-24">
        <div className="stat-card blue" style={{cursor:'pointer'}} onClick={()=>setTab('posVenda')}><div className="stat-label">Pós-venda</div><div className="stat-value">{posVenda.length}</div><div style={{fontSize:10,color:'var(--subtext)',marginTop:4}}>Últimos 7 dias</div></div>
        <div className="stat-card red" style={{cursor:'pointer'}} onClick={()=>setTab('inativos')}><div className="stat-label">Inativos</div><div className="stat-value">{inativos.length}</div><div style={{fontSize:10,color:'var(--subtext)',marginTop:4}}>Sem compra +60 dias</div></div>
        <div className="stat-card yellow" style={{cursor:'pointer'}} onClick={()=>setTab('aniversariantes')}><div className="stat-label">Aniversariantes</div><div className="stat-value">{aniversariantes.length}</div><div style={{fontSize:10,color:'var(--subtext)',marginTop:4}}>Este mês</div></div>
      </div>
      <div className="tabs mb-16">
        {Object.entries(labels).map(function(entry){var k=entry[0],l=entry[1];return(<div key={k} className={'tab '+(tab===k?'active':'')} onClick={()=>setTab(k)}>{l} ({(listas[k]||[]).length})</div>);})}
      </div>
      <div className="card mb-16"><div className="search-bar"><span className="search-icon">⌕</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtrar por nome..."/></div></div>
      {lista.length===0
        ? <div className="card"><div className="empty-state"><div className="icon">📲</div><p>Nenhum cliente nesta lista</p></div></div>
        : <div className="card">{lista.map(c=>(
            <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
              <div className="rank-avatar" style={{width:38,height:38,fontSize:13,flexShrink:0}}>{initials(c.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,color:'var(--text)',fontSize:13}}>{c.name}</div>
                <div style={{fontSize:11,color:'var(--subtext)'}}>
                  {tab==='posVenda'&&('📅 Comprou há '+c.dias+' dia(s)')}
                  {tab==='inativos'&&('⏱ Inativo há '+(c.dias>=999?'muito tempo':c.dias+' dias'))}
                  {tab==='aniversariantes'&&('🎂 '+new Date(c.dataNasc).toLocaleDateString('pt-BR',{day:'2-digit',month:'long'}))}
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--subtext)',fontFamily:'DM Mono,monospace',flexShrink:0}}>{c.phone}</div>
              <button className="btn btn-sm btn-success" onClick={()=>enviar(c.phone,tab==='posVenda'?msgPos(c):tab==='aniversariantes'?msgAniv(c):msgInativo(c))}>📲 Enviar</button>
            </div>
          ))}</div>
      }
    </div>
  );
}

// ===== TAMANHOS =====
function TamanhosConfig() {
  const { tamanhos, setTamanhos, deleteTamanho, addToast } = useContext(AppContext);
  const [nome, setNome] = useState('');
  const [obs, setObs] = useState('');
  const [confirm, setConfirm] = useState(null);

  const add = () => {
    const n = nome.trim().toUpperCase();
    if(!n) return addToast('Informe a nomenclatura','error');
    if(tamanhos.find(t=>t.nome===n)) return addToast('Tamanho já cadastrado','error');
    setTamanhos(ts=>[...ts,{id:'tam'+Date.now(),nome:n,obs:obs.trim()}]);
    setNome(''); setObs('');
    addToast('Tamanho cadastrado!','success');
  };

  const del = (t) => setConfirm({
    icon:'📐', titulo:'Excluir Tamanho',
    msg:`Excluir "${t.nome}"? Produtos que usam este tamanho manterão o valor salvo.`,
    btnLabel:'Excluir', btnClass:'btn-danger',
    onConfirm:()=>{ deleteTamanho(t.id); addToast('Tamanho removido','info'); setConfirm(null); }
  });

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)',marginBottom:20}}>CADASTRO DE TAMANHOS</div>
      <div className="card mb-16">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:14,letterSpacing:2,color:'var(--text)',marginBottom:14}}>NOVO TAMANHO</div>
        <div className="form-row cols-2">
          <div className="form-field">
            <label>Nomenclatura *</label>
            <input value={nome} onChange={e=>setNome(e.target.value.toUpperCase())} placeholder="Ex: G, XG, 2XG, PP..."/>
          </div>
          <div className="form-field">
            <label>Observação (opcional)</label>
            <input value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: 46/48, 1.70-1.80m..."/>
          </div>
        </div>
        <button className="btn btn-white" onClick={add}>+ Adicionar Tamanho</button>
      </div>
      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:14,letterSpacing:2,color:'var(--text)',marginBottom:14}}>TAMANHOS CADASTRADOS ({tamanhos.length})</div>
        {tamanhos.length===0
          ? <div className="empty-state"><div className="icon">📐</div><p>Nenhum tamanho cadastrado</p></div>
          : <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
              {tamanhos.map(t=>(
                <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 12px'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15,color:'var(--text)'}}>{t.nome}</div>
                    {t.obs && <div style={{fontSize:11,color:'var(--g3)'}}>{t.obs}</div>}
                  </div>
                  <button className="btn-icon" onClick={()=>del(t)} style={{color:'var(--danger)',marginLeft:4}}>✕</button>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

// ===== GERENCIAR LOJAS =====
function LojasConfig() {
  const { lojas, setLojas, addToast } = useContext(AppContext);
  const [novaLoja, setNovaLoja] = useState('');
  const [confirm, setConfirm] = useState(null);

  const addLoja = () => {
    const nome = novaLoja.trim();
    if(!nome) return addToast('Digite o nome da loja','error');
    if(lojas.find(l=>l.toLowerCase()===nome.toLowerCase())) return addToast('Loja já existe','error');
    setLojas(ls=>[...ls,nome]);
    setNovaLoja('');
    addToast(`Loja "${nome}" adicionada!`,'success');
  };

  const removeLoja = (nome) => {
    if(lojas.length<=1) return addToast('Deve ter pelo menos 1 loja','error');
    setConfirm({
      icon:'🏪', titulo:'Remover Loja',
      msg:`Remover "${nome}"? Produtos e vendas dessa loja não serão apagados, mas a loja não aparecerá mais nos filtros.`,
      btnLabel:'Remover', btnClass:'btn-danger',
      onConfirm:()=>{ setLojas(ls=>ls.filter(l=>l!==nome)); addToast('Loja removida','info'); setConfirm(null); }
    });
  };

  return (
    <div>
      {confirm && <ConfirmModal {...confirm} onCancel={()=>setConfirm(null)}/>}
      <div className="card mb-16">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>ADICIONAR NOVA LOJA</div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <input value={novaLoja} onChange={e=>setNovaLoja(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addLoja()}
            placeholder="Nome da nova loja..." style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'9px 12px',color:'var(--text)',fontSize:13,flex:1}}/>
          <button className="btn btn-white" onClick={addLoja}>+ Adicionar</button>
        </div>
        <div style={{fontSize:11,color:'var(--g3)',marginTop:8}}>A nova loja aparecerá automaticamente em todos os filtros, cadastros de produtos, seleção de vendedor e relatórios.</div>
      </div>
      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>LOJAS ATIVAS ({lojas.length})</div>
        {lojas.map(loja=>(
          <div key={loja} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--rl)',marginBottom:8}}>
            <span style={{fontSize:22}}>🏪</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15,color:'var(--text)'}}>{loja}</div>
              <div style={{fontSize:10,color:'var(--g3)',marginTop:2,letterSpacing:1,textTransform:'uppercase'}}>Loja ativa</div>
            </div>
            {lojas.length>1&&<button className="btn btn-sm btn-danger" onClick={()=>removeLoja(loja)}>Remover</button>}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <AppProvider>
      <AppInner/>
    </AppProvider>
  );
}

function AppInner() {
  const { currentUser, device } = useContext(AppContext);
  if (!device) return <DeviceSelector/>;
  if (!currentUser) return <Login/>;
  return <MainApp/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
