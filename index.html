<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5;overflow:hidden;height:100vh}
#root{height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none;transition:all .18s ease}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none;border:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--g1);border-radius:2px}

/* ===== THEMES ===== */
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2d2d2d;
  --g1:#3a3a3a;--g2:#555;--g3:#888;--g4:#aaa;--g5:#ccc;
  --white:#fff;--w2:#f5f5f5;
  --danger:#ff4444;--success:#44ff88;--warning:#ffcc00;--info:#44aaff;
  --text:#fff;--subtext:#888;--border:#222;--card-bg:#111;
  --r:4px;--rl:8px;--shadow:0 2px 12px rgba(0,0,0,.5);--t:.18s ease;
}
.light{
  --bg:#f0f0f0;--bg2:#fff;--bg3:#f5f5f5;--bg4:#e8e8e8;--bg5:#d8d8d8;
  --g1:#c0c0c0;--g2:#999;--g3:#666;--g4:#444;--g5:#222;
  --white:#111;--w2:#222;
  --danger:#cc2222;--success:#22aa55;--warning:#bb9900;--info:#2266cc;
  --text:#111;--subtext:#666;--border:#e0e0e0;--card-bg:#fff;
}

/* ===== DEVICE SELECTOR ===== */
.device-selector{
  position:fixed;inset:0;background:#050505;display:flex;align-items:center;
  justify-content:center;z-index:9999;flex-direction:column;gap:40px;
}
.device-selector h1{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:8px;color:#fff;text-align:center}
.device-selector p{color:#555;font-size:14px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.device-btns{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.device-btn{
  padding:32px 48px;border:1px solid #2a2a2a;border-radius:8px;
  background:#111;color:#fff;font-size:13px;letter-spacing:2px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  min-width:200px;transition:all .2s ease;cursor:pointer;
}
.device-btn:hover{border-color:#555;background:#1a1a1a}
.device-btn .icon{font-size:48px}
.device-btn .lbl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px}
.device-btn .sub{font-size:11px;color:#555}

/* ===== FIREBASE SETUP BANNER ===== */
.firebase-banner{
  background:#1a0a00;border:1px solid #ff6600;border-radius:var(--r);
  padding:12px 16px;font-size:12px;color:#ff9933;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.firebase-banner code{background:#2a1500;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px}

/* ===== LAYOUT ===== */
.app-layout{display:flex;height:100vh;overflow:hidden}

/* ===== SIDEBAR DESKTOP ===== */
.sidebar{
  width:220px;min-width:220px;background:#0d0d0d;border-right:1px solid #1a1a1a;
  display:flex;flex-direction:column;overflow:hidden;transition:width .2s ease;
  flex-shrink:0;
}
.light .sidebar{background:#1a1a1a;border-right-color:#2a2a2a}
.sidebar.collapsed{width:60px;min-width:60px}
.sidebar-header{padding:16px 14px;border-bottom:1px solid #1a1a1a;display:flex;flex-direction:column;align-items:center;gap:8px}
.sidebar-logo-img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid #222}
.sidebar.collapsed .sidebar-logo-img{width:38px;height:38px}
.sidebar-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;white-space:nowrap;overflow:hidden;text-align:center}
.sidebar-logo-sub{font-size:9px;letter-spacing:4px;color:#444;text-transform:uppercase;text-align:center}
.sidebar-toggle{background:none;color:#444;font-size:12px;padding:4px;border-radius:var(--r);align-self:flex-end;margin-top:-4px}
.sidebar-toggle:hover{color:#fff}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#333;padding:12px 14px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;color:#555;cursor:pointer;transition:var(--t);border-left:2px solid transparent;white-space:nowrap;overflow:hidden}

.chart-wrap{position:relative;height:200px}

.tab.active{background:var(--white);color:var(--bg)}

.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bg5);border-radius:var(--r);padding:0 12px;transition:var(--t)}
.search-bar:focus-within{border-color:var(--g2)}
.search-bar input{background:none;border:none;color:var(--text);font-size:13px;padding:8px 0;flex:1;min-width:0}
.search-icon{color:var(--g3);font-size:13px}
.toast-wrap{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;max-width:300px}

.flex{display:flex}
.items-center{align-items:center}

function useFirestore(collection, initialData, setData) {
  const [connected, setConnected] = useState(false);
  const [syncing, setSyncing] = useState(false);

  useEffect(() => {
    if (!db || !FIREBASE_CONFIGURED) return;
    setSyncing(true);
    const unsubscribe = db.collection(collection).onSnapshot(
      (snapshot) => {
        if (!snapshot.empty) {
          const data = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
          setData(data);
        }
        setConnected(true);
        setSyncing(false);
      },
      (error) => {
        console.warn(`Firestore ${collection} error:`, error);
        setSyncing(false);
      }
    );
    return () => unsubscribe();
  }, [collection]);

  const saveDoc = useCallback(async (id, data) => {
    if (!db || !FIREBASE_CONFIGURED) return;
    try {
      await db.collection(collection).doc(id).set(data, { merge: true });
    } catch(e) {
      console.warn("Save error:", e);
    }
  }, [collection]);

  const deleteDoc = useCallback(async (id) => {
    if (!db || !FIREBASE_CONFIGURED) return;
    try {
      await db.collection(collection).doc(id).delete();
    } catch(e) {
      console.warn("Delete error:", e);
    }
  }, [collection]);

  return { connected, syncing, saveDoc, deleteDoc };
}

function AppProvider({ children }) {
  const [currentUser, setCurrentUser] = useState(null);
  const [sellers, setSellersRaw] = useState(INITIAL_SELLERS);
  const [products, setProductsRaw] = useState(INITIAL_PRODUCTS);
  const [sales, setSalesRaw] = useState(genSales());
  const [expenses, setExpensesRaw] = useState(INITIAL_EXPENSES);
  const [goals, setGoalsRaw] = useState(INITIAL_GOALS);
  const [history, setHistory] = useState([]);
  const [returns, setReturnsRaw] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [theme, setTheme] = useState('dark');
  const [device, setDevice] = useState(null); // 'desktop' | 'mobile'
  const [firebaseStatus, setFirebaseStatus] = useState({ connected: false, configured: FIREBASE_CONFIGURED });

  // Firebase sync
  const { saveDoc: saveSeller, deleteDoc: deleteSeller } = useFirestore('sellers', INITIAL_SELLERS, setSellersRaw);
  const { saveDoc: saveProduct, deleteDoc: deleteProduct } = useFirestore('products', INITIAL_PRODUCTS, setProductsRaw);
  const { saveDoc: saveSale } = useFirestore('sales', [], setSalesRaw);
  const { saveDoc: saveExpense, deleteDoc: deleteExpense } = useFirestore('expenses', INITIAL_EXPENSES, setExpensesRaw);
  const { saveDoc: saveGoal, connected: fbConnected } = useFirestore('goals', INITIAL_GOALS, setGoalsRaw);
  const { saveDoc: saveReturn } = useFirestore('returns', [], setReturnsRaw);

  useEffect(() => {
    setFirebaseStatus({ connected: fbConnected, configured: FIREBASE_CONFIGURED });
  }, [fbConnected]);

  const setSellers = useCallback((updOrFn) => {
    setSellersRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) {
        next.forEach(s => saveSeller(s.id, s));
      }
      return next;
    });
  }, [saveSeller]);

  const setProducts = useCallback((updOrFn) => {
    setProductsRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) {
        next.forEach(p => saveProduct(p.id, p));
      }
      return next;
    });
  }, [saveProduct]);

  const setSales = useCallback((updOrFn) => {
    setSalesRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) {
        next.forEach(s => saveSale(s.id, s));
      }
      return next;
    });
  }, [saveSale]);

  const setExpenses = useCallback((updOrFn) => {
    setExpensesRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) {
        next.forEach(e => saveExpense(e.id, e));
      }
      return next;
    });
  }, [saveExpense]);

  const setGoals = useCallback((updOrFn) => {
    setGoalsRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) {
        next.forEach((g,i) => saveGoal(g.sellerId+'_'+g.month+'_'+g.year, g));
      }
      return next;
    });
  }, [saveGoal]);

  const updateCurrentUser = useCallback((updatedSellers) => {
    setSellers(updatedSellers);
    setCurrentUser(prev => {
      if (!prev) return prev;
      return updatedSellers.find(s => s.id === prev.id) || prev;
    });
  }, [setSellers]);

  const addToast = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);

  const addMovement = useCallback((productId, type, qty, note='') => {
    setHistory(h => [...h, {id: Date.now()+'', productId, type, qty, note, date: new Date().toISOString()}]);
  }, []);

  const setReturns = useCallback((updOrFn) => {
    setReturnsRaw(prev => {
      const next = typeof updOrFn === 'function' ? updOrFn(prev) : updOrFn;
      if (FIREBASE_CONFIGURED && db) next.forEach(r => saveReturn(r.id, r));
      return next;
    });
  }, [saveReturn]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  return (
    <AppContext.Provider value={{
      currentUser, setCurrentUser,
      sellers, setSellers, updateCurrentUser,
      products, setProducts,
      sales, setSales,
      expenses, setExpenses,
      goals, setGoals,
      history, setHistory,
      returns, setReturns,
      toasts, addToast,
      addMovement,
      theme, toggleTheme,
      device, setDevice,

function bipScanner() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Tom 1 — bip curto agudo
    const o1 = ctx.createOscillator();
    const g1 = ctx.createGain();
    o1.type = 'sine';
    o1.frequency.value = 1800;
    g1.gain.setValueAtTime(0, ctx.currentTime);
    g1.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.01);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.12);
    // Tom 2 — confirmação mais grave
    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.value = 1200;
    g2.gain.setValueAtTime(0, ctx.currentTime + 0.1);
    g2.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.12);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(ctx.currentTime + 0.1); o2.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

function BarcodeScanner({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [error, setError] = useState('');
  const [scanning, setScanning] = useState(true);

  useEffect(() => {
    let intervalId;
    const startCamera = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          videoRef.current.play();
        }
        // Usa BarcodeDetector nativo se disponível
        if ('BarcodeDetector' in window) {
          const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e','itf','codabar'] });
          intervalId = setInterval(async () => {
            if (!videoRef.current || !scanning) return;
            try {
              const barcodes = await detector.detect(videoRef.current);
              if (barcodes.length > 0) {
                clearInterval(intervalId);
                stopCamera();
                bipScanner();
                onDetect(barcodes[0].rawValue);
              }
            } catch(e) {}
          }, 300);
        } else {
          // Fallback: carrega ZXing via CDN
          if (!window.ZXing) {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
            script.onload = () => setupZXing();
            document.head.appendChild(script);
          } else {
            setupZXing();
          }
        }
      } catch(e) {
        setError('Câmera não disponível. Verifique as permissões do navegador.');
      }
    };

    const setupZXing = () => {
      if (!window.ZXing || !videoRef.current) return;
      try {
        const codeReader = new window.ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(null, videoRef.current, (result, err) => {
          if (result) {
            codeReader.reset();
            stopCamera();
            bipScanner();
            onDetect(result.getText());
          }
        });
        streamRef.current._zxing = codeReader;
      } catch(e) { setError('Erro ao iniciar leitor de código.'); }
    };

    startCamera();
    return () => {
      clearInterval(intervalId);
      stopCamera();
    };
  }, []);

  const stopCamera = () => {
    if (streamRef.current) {
      if (streamRef.current._zxing) streamRef.current._zxing.reset();
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setScanning(false);
  };

  return (
    <div className="scanner-section">
      {error ? (
        <div style={{padding:12,background:'rgba(255,68,68,.08)',border:'1px solid rgba(255,68,68,.2)',borderRadius:'var(--r)',color:'var(--danger)',fontSize:12}}>
          ⚠ {error}
          <button style={{marginLeft:8,background:'none',border:'none',color:'var(--danger)',cursor:'pointer',fontSize:12,textDecoration:'underline'}} onClick={onClose}>Fechar</button>
        </div>
      ) : (
        <>
          <div className="scanner-wrap">
            <video ref={videoRef} className="scanner-video" muted playsInline autoPlay/>
            <div className="scanner-overlay">
              <div className="scanner-frame">
                <div className="scanner-line"/>
              </div>
            </div>
          </div>
          <div className="scanner-label">Aponte a câmera para o código de barras</div>
        </>
      )}
    </div>
  );
}

function Login() {
  const { sellers, setCurrentUser, addToast, device, setDevice } = useContext(AppContext);
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const login = async () => {
    setLoading(true);
    const found = sellers.find(s =>
      s.name.toLowerCase().replace(/\s/g,'') === user.toLowerCase().replace(/\s/g,'') || s.id === user
    );
    if (!found) { setErr('Usuário não encontrado'); setLoading(false); return; }
    if (found.password !== pass) { setErr('Senha incorreta'); setLoading(false); return; }
    if (!found.active) { setErr('Usuário inativo'); setLoading(false); return; }
    await new Promise(r => setTimeout(r, 400));
    setCurrentUser(found);
    addToast(`Bem-vindo, ${found.name}! 🎉`, 'success');
    setLoading(false);
  };

  return (
    <div className="login-page">
      <div className="login-bg"/>
      <div className="login-card">
        <div className="login-logo">
          <img src={LOGO_URL} alt="PIT IMPORT" style={{width:110,height:110,objectFit:'contain',borderRadius:'50%',background:'#000',border:'2px solid #222',marginBottom:12}}/>

          <p>Sistema de Gestão</p>
        </div>
        <FirebaseBanner />
        <div className="login-form">
          <div className="field-group">
            <label>Usuário / ID</label>
            <input className="field-input" value={user} onChange={e=>setUser(e.target.value)} placeholder="admin ou Ana Silva" onKeyDown={e=>e.key==='Enter'&&login()} autoFocus/>
          </div>
          <div className="field-group">
            <label>Senha</label>
            <input className="field-input" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('')}} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
          </div>
          {err && <p className="login-error">⚠ {err}</p>}
          <button className="btn-primary" onClick={login} disabled={loading} style={{opacity:loading?.7:1}}>
            {loading?'ENTRANDO...':'ENTRAR'}
          </button>
        </div>

        <div style={{marginTop:12,display:'flex',justifyContent:'center'}}>
          <button style={{background:'none',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'6px 14px',color:'var(--g3)',fontSize:11,cursor:'pointer'}} onClick={()=>setDevice(null)}>

        </div>
      </div>
    </div>
  );
}

function ChangePasswordModal({ onClose }) {
  const { currentUser, sellers, updateCurrentUser, addToast } = useContext(AppContext);
  const [cur, setCur] = useState('');
  const [nw, setNw] = useState('');
  const [conf, setConf] = useState('');
  const [err, setErr] = useState('');

  const save = () => {
    if (cur !== currentUser.password) { setErr('Senha atual incorreta'); return; }
    if (nw.length < 4) { setErr('Nova senha: mínimo 4 caracteres'); return; }
    if (nw !== conf) { setErr('As senhas não coincidem'); return; }
    const upd = sellers.map(s => s.id===currentUser.id ? {...s, password: nw} : s);
    updateCurrentUser(upd);
    addToast('Senha alterada!', 'success');
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <h3>ALTERAR SENHA</h3>
          <div className="close-btn" onClick={onClose}>✕</div>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-field"><label>Senha Atual</label><input type="password" value={cur} onChange={e=>{setCur(e.target.value);setErr('')}}/></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label>Nova Senha</label><input type="password" value={nw} onChange={e=>setNw(e.target.value)}/></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label>Confirmar Nova Senha</label><input type="password" value={conf} onChange={e=>setConf(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/></div>
          </div>
          {err && <p style={{color:'var(--danger)',fontSize:12,marginTop:4}}>⚠ {err}</p>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn btn-white" onClick={save}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
function NewSale() {
  const { products, sellers, sales, setSales, setProducts, currentUser, addToast, addMovement } = useContext(AppContext);
  const [selectedSeller, setSelectedSeller] = useState(currentUser.role==='seller'?currentUser.id:'');
  const [store, setStore] = useState(currentUser.role==='seller'?currentUser.store:'Cosmos');
  const [channel, setChannel] = useState('Física');
  const [items, setItems] = useState([]);
  const [payMethod, setPayMethod] = useState('Dinheiro');
  const [dueDate, setDueDate] = useState('');
  const [clientName, setClientName] = useState('');
  const [search, setSearch] = useState('');
  const [showAuto, setShowAuto] = useState(false);
  const [autoIdx, setAutoIdx] = useState(-1);
  const [showScanner, setShowScanner] = useState(false);
  const searchRef = useRef();

  const filteredProds = search.length>=1 ? products.filter(p=>
    p.store===store &&
    (p.code.toLowerCase().includes(search.toLowerCase()) || p.description.toLowerCase().includes(search.toLowerCase()))
  ).slice(0,8) : [];

  const addItem = (prod) => {
    setItems(it=>{
      const ex=it.find(i=>i.productId===prod.id);
      if(ex) return it.map(i=>i.productId===prod.id?{...i,qty:i.qty+1,total:(i.qty+1)*i.unitPrice}:i);
      return [...it,{productId:prod.id,code:prod.code,description:prod.description,photo:prod.photo||null,qty:1,unitPrice:prod.salePrice,total:prod.salePrice}];
    });
    setSearch(''); setShowAuto(false); searchRef.current?.focus();
  };

  const updateQty = (productId, qty) => {
    if(qty<=0){setItems(it=>it.filter(i=>i.productId!==productId));return;}
    setItems(it=>it.map(i=>i.productId===productId?{...i,qty,total:qty*i.unitPrice}:i));
  };

  const total = items.reduce((a,i)=>a+i.total,0);

  const submitSale = () => {
    if(!selectedSeller) return addToast('Selecione um vendedor','error');
    if(items.length===0) return addToast('Adicione pelo menos um produto','error');
    if(payMethod==='A prazo'&&!clientName) return addToast('Informe o nome do cliente','error');
    for(const item of items){
      const prod=products.find(p=>p.id===item.productId);
      if(prod.qty<item.qty) return addToast(`Estoque insuficiente: ${prod.description}`,'error');
    }
    const seller=sellers.find(s=>s.id===selectedSeller);
    const sale={
      id:'sale'+Date.now(), date:new Date().toISOString(),
      sellerId:selectedSeller, sellerName:seller.name,
      store, channel, items, total, paymentMethod:payMethod,
      clientName:payMethod==='A prazo'?clientName:'',
      dueDate:payMethod==='A prazo'?dueDate:'',
      paid:payMethod!=='A prazo',
    };
    setSales(s=>[...s,sale]);
    setProducts(ps=>ps.map(p=>{
      const item=items.find(i=>i.productId===p.id);
      if(!item) return p;
      addMovement(p.id,'saída',item.qty,'Venda #'+sale.id.slice(-4));
      return {...p,qty:p.qty-item.qty};
    }));
    setItems([]); setClientName(''); setDueDate('');
    addToast('Venda registrada! 🎉','success');
  };

  return (
    <div>
      <div className="grid-2 mb-16">
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>INFORMAÇÕES</div>
          <div className="form-row cols-2">
            <div className="form-field"><label>Vendedor</label>
              <select value={selectedSeller} onChange={e=>setSelectedSeller(e.target.value)} disabled={currentUser.role==='seller'}>
                <option value="">Selecionar...</option>
                {sellers.filter(s=>s.role==='seller'&&s.active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="form-field"><label>Loja</label>
              <select value={store} onChange={e=>setStore(e.target.value)} disabled={currentUser.role==='seller'}>
                <option>Cosmos</option><option>Nova Cidade</option>
              </select>
            </div>
          </div>
          <div className="form-row cols-2">
            <div className="form-field"><label>Canal</label>
              <select value={channel} onChange={e=>setChannel(e.target.value)}>
                <option>Física</option><option>Online</option>
              </select>
            </div>
            <div className="form-field"><label>Pagamento</label>
              <select value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
                <option>Dinheiro</option><option>Pix</option><option>Cartão</option><option>A prazo</option>
              </select>
            </div>
          </div>
          {payMethod==='A prazo' && (
            <div className="form-row cols-2">
              <div className="form-field"><label>Cliente</label><input value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="Nome"/></div>
              <div className="form-field"><label>Vencimento</label><input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>
            </div>
          )}
        </div>
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>ADICIONAR PRODUTO</div>
          <div className="form-field">
            <label>Buscar por código, nome ou câmera</label>
            <div className="autocomplete-wrap">
              <div className="search-bar" style={{display:'flex',alignItems:'center'}}>
                <span className="search-icon">⌕</span>
                <input ref={searchRef} value={search}
                  onChange={e=>{setSearch(e.target.value);setShowAuto(true);setAutoIdx(-1)}}
                  onFocus={()=>setShowAuto(true)}
                  onBlur={()=>setTimeout(()=>setShowAuto(false),200)}
                  onKeyDown={e=>{
                    if(e.key==='ArrowDown') setAutoIdx(i=>Math.min(i+1,filteredProds.length-1));
                    else if(e.key==='ArrowUp') setAutoIdx(i=>Math.max(i-1,-1));
                    else if(e.key==='Enter'&&autoIdx>=0&&filteredProds[autoIdx]) addItem(filteredProds[autoIdx]);
                  }}
                  placeholder={`Código, nome ou escaneie...`}
                />
                <button className={`barcode-btn ${showScanner?'active':''}`} style={{marginLeft:6,flexShrink:0}} onClick={()=>setShowScanner(s=>!s)} type="button">
                  📷 {showScanner?'Fechar':'Câmera'}
                </button>
              </div>
              {showAuto && filteredProds.length>0 && (
                <div className="autocomplete-list">
                  {filteredProds.map((p,i)=>(
                    <div key={p.id} className={`autocomplete-item ${i===autoIdx?'active':''}`} onMouseDown={()=>addItem(p)} style={{display:'flex',alignItems:'center',gap:10}}>
                      {p.photo
                        ? <img src={p.photo} style={{width:36,height:36,borderRadius:4,objectFit:'cover',flexShrink:0}} alt=""/>
                        : <div style={{width:36,height:36,borderRadius:4,background:'var(--bg5)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,opacity:.4}}>▦</div>
                      }
                      <div>
                        <div style={{fontWeight:600,color:'var(--text)',fontSize:13}}>{p.description}</div>
                        <small>{p.code} · {fmtMoney(p.salePrice)} · {p.qty} em estoque</small>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {showScanner && <BarcodeScanner onDetect={code=>{setSearch(code);setShowScanner(false);const p=products.find(x=>x.code===code||x.description.toLowerCase().includes(code.toLowerCase()));if(p)addItem(p);}} onClose={()=>setShowScanner(false)}/>}
            <div style={{marginTop:6,padding:8,background:'var(--bg3)',borderRadius:'var(--r)',fontSize:11,color:'var(--g3)'}}>
              💡 Digite o código/nome ou use a câmera para ler o código de barras.
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>ITENS DA VENDA</div>
        {items.length===0 ? (
          <div className="empty-state"><div className="icon">▦</div><p>Nenhum produto adicionado</p></div>
        ) : (
          <>
            {items.map(item=>(
              <div key={item.productId} className="sale-item-row">
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {item.photo
                    ? <img src={item.photo} style={{width:38,height:38,borderRadius:4,objectFit:'cover',flexShrink:0}} alt=""/>
                    : <div style={{width:38,height:38,borderRadius:4,background:'var(--bg4)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,opacity:.3}}>▦</div>
                  }
                  <div>
                    <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{item.description}</div>
                    <div style={{fontSize:10,color:'var(--g3)'}}>{item.code}</div>
                  </div>
                </div>
                <div>
                  <input type="number" min="1" value={item.qty} onChange={e=>updateQty(item.productId,parseInt(e.target.value)||0)}
                    style={{width:54,background:'var(--bg4)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'4px 6px',color:'var(--text)',fontSize:13}}/>
                </div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:12,color:'var(--text)'}}>{fmtMoney(item.unitPrice)}</div>
                <div style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:600,color:'var(--text)'}}>{fmtMoney(item.total)}</div>
                <button className="btn-icon" onClick={()=>updateQty(item.productId,0)} style={{color:'var(--danger)'}}>✕</button>
              </div>
            ))}
            <div style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,border:'1px solid var(--bg5)'}}>
              <div>
                <div style={{fontSize:10,letterSpacing:2,textTransform:'uppercase',color:'var(--g3)'}}>Total da Venda</div>
                <div style={{fontSize:11,color:'var(--g3)'}}>{items.length} item(s) · {payMethod}</div>
              </div>
              <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:32,color:'var(--text)'}}>{fmtMoney(total)}</div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:14}}>
              <button className="btn btn-white" style={{padding:'11px 28px',fontSize:13}} onClick={submitSale}>✓ FINALIZAR VENDA</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function SalesHistory() {
  const { sales } = useContext(AppContext);
  const [filterStore, setFilterStore] = useState('Todos');
  const [filterMethod, setFilterMethod] = useState('Todos');
  const [search, setSearch] = useState('');

  const filtered = sales.filter(s=>
    (filterStore==='Todos'||s.store===filterStore) &&
    (filterMethod==='Todos'||s.paymentMethod===filterMethod) &&
    (!search||(s.sellerName.toLowerCase().includes(search.toLowerCase())||s.clientName?.toLowerCase().includes(search.toLowerCase())))
  ).sort((a,b)=>new Date(b.date)-new Date(a.date));

  return (
    <div>
      <div className="card mb-16">
        <div className="flex items-center gap-12" style={{flexWrap:'wrap'}}>
          <div className="search-bar" style={{flex:1,minWidth:160}}>
            <span className="search-icon">⌕</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..."/>
          </div>
          {[['filterStore',filterStore,setFilterStore,['Todos','Cosmos','Nova Cidade']],['filterMethod',filterMethod,setFilterMethod,['Todos','Dinheiro','Pix','Cartão','A prazo']]].map(([k,v,set,opts])=>(
            <select key={k} style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={v} onChange={e=>set(e.target.value)}>
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          ))}
          <span className="badge badge-white">{filtered.length} · {fmtMoney(filtered.reduce((a,s)=>a+s.total,0))}</span>
        </div>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Data</th><th>Vendedor</th><th>Loja</th><th>Canal</th><th>Pagamento</th><th>Status</th><th>Total</th></tr></thead>
            <tbody>{filtered.map(s=>(
              <tr key={s.id}>
                <td>{fmtDate(s.date)}</td><td style={{fontSize:12,color:'var(--text)'}}>{s.sellerName}</td>
                <td><span className="badge badge-gray">{s.store}</span></td>
                <td><span className={`badge ${s.channel==='Online'?'badge-blue':'badge-white'}`}>{s.channel}</span></td>
                <td><span className={`badge ${s.paymentMethod==='A prazo'?'badge-yellow':'badge-green'}`}>{s.paymentMethod}</span></td>
                <td><span className={`badge ${s.paid?'badge-green':'badge-red'}`}>{s.paid?'Pago':'Pendente'}</span></td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--text)'}}>{fmtMoney(s.total)}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// RECEIVABLES
// ============================================================
function Receivables() {
  const { sales, setSales, addToast } = useContext(AppContext);
  const pending = sales.filter(s=>s.paymentMethod==='A prazo');
  const markPaid = (id) => { setSales(ss=>ss.map(s=>s.id===id?{...s,paid:true}:s)); addToast('Marcado como pago ✓','success'); };
  const isOverdue = (s) => !s.paid && s.dueDate && new Date(s.dueDate)<new Date();

  return (
    <div>
      <div className="grid-3 mb-24">
        <div className="stat-card yellow"><div className="stat-label">Pendente</div><div className="stat-value">{fmtMoney(pending.filter(s=>!s.paid).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">◎</div></div>
        <div className="stat-card red"><div className="stat-label">Atrasado</div><div className="stat-value">{fmtMoney(pending.filter(s=>isOverdue(s)).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">⚠</div></div>
        <div className="stat-card green"><div className="stat-label">Recebido</div><div className="stat-value">{fmtMoney(pending.filter(s=>s.paid).reduce((a,s)=>a+s.total,0))}</div><div className="stat-icon">✓</div></div>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Cliente</th><th>Vendedor</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Ação</th></tr></thead>
            <tbody>{pending.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).map(s=>{
              const overdue=isOverdue(s);
              return (
                <tr key={s.id}>
                  <td style={{fontWeight:600,color:'var(--text)'}}>{s.clientName||'—'}</td>
                  <td style={{fontSize:12,color:'var(--text)'}}>{s.sellerName}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--text)'}}>{fmtMoney(s.total)}</td>
                  <td style={{color:overdue?'var(--danger)':'var(--text)',fontSize:12}}>{fmtDate(s.dueDate)}</td>
                  <td><span className={`badge ${s.paid?'badge-green':overdue?'badge-red':'badge-yellow'}`}>{s.paid?'Pago':overdue?'Atrasado':'Pendente'}</span></td>
                  <td>{!s.paid&&<button className="btn btn-sm btn-success" onClick={()=>markPaid(s.id)}>✓</button>}</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// STOCK
// ============================================================
function Stock() {
  const { products, setProducts, history, addToast, addMovement } = useContext(AppContext);
  const [search, setSearch] = useState('');
  const [filterStore, setFilterStore] = useState('Todos');
  const [modal, setModal] = useState(null);
  const [editProduct, setEditProduct] = useState(null);
  const [form, setForm] = useState({code:'',description:'',store:'Cosmos',qty:0,costPrice:0,salePrice:0});
  const [transfer, setTransfer] = useState({productId:'',qty:1});
  const [adjust, setAdjust] = useState({productId:'',type:'entrada',qty:0,note:''});

  const filtered = products.filter(p=>(filterStore==='Todos'||p.store===filterStore)&&(!search||(p.code.toLowerCase().includes(search.toLowerCase())||p.description.toLowerCase().includes(search.toLowerCase()))));
  const openEdit = (p) => { setEditProduct(p); setForm({...p}); setModal('edit'); };

  const saveProduct = () => {
    if(!form.code||!form.description) return addToast('Preencha código e descrição','error');
    if(modal==='add'){
      if(products.find(p=>p.code===form.code)) return addToast('Código já existe','error');
      setProducts(ps=>[...ps,{...form,id:'p'+Date.now(),qty:Number(form.qty),costPrice:Number(form.costPrice),salePrice:Number(form.salePrice)}]);
      addToast('Produto cadastrado!','success');
    } else {
      setProducts(ps=>ps.map(p=>p.id===editProduct.id?{...form,id:p.id,qty:Number(form.qty),costPrice:Number(form.costPrice),salePrice:Number(form.salePrice)}:p));
      addToast('Produto atualizado!','success');
    }
    setModal(null);
  };

  const doTransfer = () => {
    const prod=products.find(p=>p.id===transfer.productId);
    if(!prod) return addToast('Selecione um produto','error');
    if(prod.qty<transfer.qty) return addToast('Estoque insuficiente','error');
    const to=prod.store==='Cosmos'?'Nova Cidade':'Cosmos';
    setProducts(ps=>ps.map(p=>{
      if(p.id===prod.id) return {...p,qty:p.qty-transfer.qty};
      if(p.code===prod.code&&p.store===to) return {...p,qty:p.qty+transfer.qty};
      return p;
    }));
    addMovement(prod.id,'transferência',transfer.qty,`Transferido para ${to}`);
    addToast(`Transferido para ${to}`,'success');
    setModal(null);
  };

  const doAdjust = () => {
    const prod=products.find(p=>p.id===adjust.productId);
    if(!prod) return addToast('Selecione um produto','error');
    setProducts(ps=>ps.map(p=>p.id===prod.id?{...p,qty:adjust.type==='entrada'?p.qty+Number(adjust.qty):Math.max(0,p.qty-Number(adjust.qty))}:p));
    addMovement(prod.id,adjust.type,Number(adjust.qty),adjust.note||'Ajuste manual');
    addToast('Estoque ajustado!','success');
    setModal(null);
  };

  return (
    <div>
      <div className="tabs" style={{marginBottom:16}}>
        <div className={`tab ${stockTab==='todos'?'active':''}`} onClick={()=>setStockTab('todos')}>Todos os Produtos</div>
        <div className={`tab ${stockTab==='reposicao'?'active':''}`} onClick={()=>setStockTab('reposicao')}>Reposição Urgente</div>
      </div>

      {stockTab==='todos' && <>
      <div className="flex items-center gap-12 mb-16" style={{flexWrap:'wrap'}}>
        <div className="search-bar" style={{flex:1,minWidth:160}}>
          <span className="search-icon">⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produto..."/>
        </div>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}>
          <option>Todos</option><option>Cosmos</option><option>Nova Cidade</option>
        </select>
        <button className="btn btn-sm btn-outline" onClick={()=>setModal('adjust')}>± Ajustar</button>
        <button className="btn btn-sm btn-outline" onClick={()=>setModal('transfer')}>⇄ Transferir</button>
        <button className="btn btn-sm btn-outline" onClick={()=>setModal('history')}>≡ Histórico</button>
        <button className="btn btn-sm btn-white" onClick={()=>{setForm({code:'',description:'',store:'Cosmos',qty:0,costPrice:0,salePrice:0,photo:null});setModal('add')}}>+ Novo</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th></th><th>Código</th><th>Produto</th><th>Loja</th><th>Qtd</th><th>Compra</th><th>Venda</th><th>Margem</th><th></th></tr></thead>
            <tbody>{filtered.map(p=>{
              const margin=((p.salePrice-p.costPrice)/p.salePrice*100);
              return (
                <tr key={p.id}>
                  <td>
                    {p.photo
                      ? <img src={p.photo} style={{width:32,height:32,borderRadius:4,objectFit:'cover',border:'1px solid var(--bg5)'}} alt=""/>
                      : <div style={{width:32,height:32,borderRadius:4,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,opacity:.4}}>▦</div>
                    }
                  </td>
                  <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--g3)'}}>{p.code}</td>
                  <td style={{fontWeight:500,color:'var(--text)'}}>{p.description}</td>
                  <td><span className="badge badge-gray">{p.store}</span></td>
                  <td><span className={`badge ${p.qty<=5?'badge-red':p.qty<=15?'badge-yellow':'badge-green'}`}>{p.qty}</span></td>
                  <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--g3)'}}>{fmtMoney(p.costPrice)}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:'var(--text)'}}>{fmtMoney(p.salePrice)}</td>
                  <td><span className={`badge ${margin>=40?'badge-green':margin>=20?'badge-yellow':'badge-red'}`}>{margin.toFixed(0)}%</span></td>
                  <td>
                    <div className="flex gap-8">
                      <button className="btn-icon" onClick={()=>openEdit(p)}>✎</button>
                      <button className="btn-icon" onClick={()=>setProducts(ps=>ps.filter(p2=>p2.id!==p.id))} style={{color:'var(--danger)'}}>✕</button>
                    </div>
                  </td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>

      </>}

      {stockTab==='reposicao' && <ReposicaoUrgente products={products} sales={sales} onEdit={openEdit} />}

      {(modal==='add'||modal==='edit')&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header"><h3>{modal==='add'?'NOVO PRODUTO':'EDITAR PRODUTO'}</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            {/* FOTO DO PRODUTO */}
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>
              <div
                style={{width:80,height:80,borderRadius:8,border:'2px dashed var(--bg5)',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',overflow:'hidden',flexShrink:0}}
                onClick={()=>document.getElementById('prod-photo-input').click()}
              >
                {form.photo
                  ? <img src={form.photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                  : <span style={{fontSize:24,opacity:.4}}>📷</span>
                }
                <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
                  <span style={{color:'#fff',fontSize:11,fontWeight:700}}>Trocar</span>
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:'var(--g3)',marginBottom:4}}>Foto do Produto</div>
                <button className="btn btn-sm btn-outline" onClick={()=>document.getElementById('prod-photo-input').click()}>📷 {form.photo?'Trocar foto':'Adicionar foto'}</button>
                {form.photo && <button className="btn btn-sm btn-outline" style={{marginLeft:6,color:'var(--danger)'}} onClick={()=>setForm(f=>({...f,photo:null}))}>✕ Remover</button>}
              </div>
              <input id="prod-photo-input" type="file" accept="image/*" style={{display:'none'}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>setForm(f=>({...f,photo:ev.target.result}));
                reader.readAsDataURL(file);
              }}/>
            </div>
            <div className="form-row cols-2">
              <div className="form-field"><label>Código</label><input value={form.code} onChange={e=>setForm(f=>({...f,code:e.target.value}))}/></div>
              <div className="form-field"><label>Loja</label><select value={form.store} onChange={e=>setForm(f=>({...f,store:e.target.value}))}><option>Cosmos</option><option>Nova Cidade</option></select></div>
            </div>
            <div className="form-row"><div className="form-field"><label>Descrição</label><input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div></div>
            <div className="form-row cols-3">
              <div className="form-field"><label>Quantidade</label><input type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
              <div className="form-field"><label>Compra (R$)</label><input type="number" step="0.01" value={form.costPrice} onChange={e=>setForm(f=>({...f,costPrice:e.target.value}))}/></div>
              <div className="form-field"><label>Venda (R$)</label><input type="number" step="0.01" value={form.salePrice} onChange={e=>setForm(f=>({...f,salePrice:e.target.value}))}/></div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-white" onClick={saveProduct}>Salvar</button>
          </div>
        </div></div>
      )}

      {modal==='transfer'&&(
        <div className="modal-overlay"><div className="modal">
          <div className="modal-header"><h3>TRANSFERIR ESTOQUE</h3><div className="close-btn" onClick={()=>setModal(null)}>✕</div></div>
          <div className="modal-body">
            <div className="form-row"><div className="form-field"><label>Produto</label>
              <select value={transfer.productId} onChange={e=>setTransfer(t=>({...t,productId:e.target.value}))}>
                <option value="">Selecionar...</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.description} ({p.store} · {p.qty})</option>)}
              </select>
            </div></div>
            <div className="form-row"><div className="form-field"><label>Quantidade</label><input type="number" min="1" value={transfer.qty} onChange={e=>setTransfer(t=>({...t,qty:parseInt(e.target.value)||1}))}/></div></div>
            {transfer.productId&&<div style={{padding:10,background:'var(--bg3)',borderRadius:'var(--r)',fontSize:12,color:'var(--g3)'}}>
              Destino: <strong style={{color:'var(--text)'}}>{products.find(p=>p.id===transfer.productId)?.store==='Cosmos'?'Nova Cidade':'Cosmos'}</strong>
            </div>}
          </div>
          <div className="modal-footer">
            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-white" onClick={doTransfer}>Transferir</button>
          </div>
        </div></div>
      )}

      {modal==='adjust'&&(

        </div></div>

  );
}

function Rankings({ sellerOnly }) {
  const { sales, products, sellers } = useContext(AppContext);
  const [tab, setTab] = useState('sellers');
  const {m,y} = thisMonth();

  const sellerRank = sellers.filter(s=>s.role==='seller').map(s=>{
    const total=sales.filter(x=>x.sellerId===s.id).reduce((a,x)=>a+x.total,0);
    const monthTotal=sales.filter(x=>x.sellerId===s.id&&isSameMonth(x.date,m,y)).reduce((a,x)=>a+x.total,0);
    return {...s,total,count:sales.filter(x=>x.sellerId===s.id).length,monthTotal};
  }).sort((a,b)=>b.total-a.total);

  const prodRank = products.map(p=>{
    const sold=sales.flatMap(s=>s.items).filter(i=>i.productId===p.id);
    return {...p,soldQty:sold.reduce((a,i)=>a+i.qty,0),soldTotal:sold.reduce((a,i)=>a+i.total,0)};
  }).sort((a,b)=>b.soldQty-a.soldQty);

  const tabs = sellerOnly
    ? [['sellers','Vendedores']]
    : [['sellers','Vendedores'],['products','Produtos'],['stores','Lojas']];

  return (
    <div>
      <div className="tabs">

      {tab==='sellers'&&(

          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>RANKING DE VENDEDORES</div>
          {sellerRank.map((s,i)=>(
            <div key={s.id} className="rank-item">
              <div className={`rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}`}>{i+1}</div>
              <div className="rank-avatar">{s.photo?<img src={s.photo} alt=""/>:initials(s.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{s.name}</div>
                <div style={{fontSize:10,color:'var(--g3)'}}>{s.store} · {s.count} vendas · Mês: {fmtMoney(s.monthTotal)}</div>
              </div>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:14,fontWeight:700,color:'var(--text)'}}>{fmtMoney(s.total)}</div>
            </div>
          ))}
        </div>
      )}

      {tab==='products'&&(
        <div className="card">
          <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>TOP PRODUTOS</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Produto</th><th>Loja</th><th>Un. Vendidas</th><th>Faturamento</th><th>Estoque</th></tr></thead>
              <tbody>{prodRank.slice(0,15).map((p,i)=>(
                <tr key={p.id}>
                  <td style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,color:i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--g3)'}}>{i+1}</td>
                  <td style={{fontWeight:500,color:'var(--text)',fontSize:12}}>{p.description}</td>
                  <td><span className="badge badge-gray">{p.store}</span></td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{p.soldQty}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--text)'}}>{fmtMoney(p.soldTotal)}</td>
                  <td><span className={`badge ${p.qty<=5?'badge-red':p.qty<=15?'badge-yellow':'badge-green'}`}>{p.qty}</span></td>
                </tr>
              ))}</tbody>
            </table>

            return (
              <div key={store} className="card">
                <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:22,letterSpacing:2,marginBottom:4,color:'var(--text)'}}>{store}</div>

                <div className="progress-bar" style={{marginBottom:16}}><div className="progress-fill white" style={{width:`${pct}%`}}/></div>
                {methods.map(method=>{

                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// REPOSIÇÃO URGENTE
// ============================================================
function ReposicaoUrgente({ products, sales, onEdit }) {
  // Calcular vendas por produto nos últimos 30 dias
  const agora = Date.now();
  const trinta = 30 * 24 * 60 * 60 * 1000;
  const vendasRecentes = sales.filter(s => agora - new Date(s.date).getTime() < trinta);

  const vendasPorProd = {};
  vendasRecentes.forEach(s => {
    (s.items||[]).forEach(item => {
      vendasPorProd[item.productId] = (vendasPorProd[item.productId]||0) + item.qty;
    });
  });

  // Calcular urgência: zerado com muitas vendas = crítico
  const lista = products
    .filter(p => p.qty <= 10) // só produtos com estoque baixo ou zerado
    .map(p => {
      const vendas30 = vendasPorProd[p.id] || 0;
      let urgencia, cor, label;
      if (p.qty === 0 && vendas30 >= 5)      { urgencia = 1; cor = 'var(--danger)';  label = 'CRÍTICO'; }
      else if (p.qty === 0 && vendas30 > 0)  { urgencia = 2; cor = 'var(--danger)';  label = 'ZERADO'; }
      else if (p.qty === 0)                  { urgencia = 3; cor = 'var(--warning)'; label = 'ZERADO'; }
      else if (p.qty <= 3 && vendas30 >= 5)  { urgencia = 4; cor = 'var(--danger)';  label = 'URGENTE'; }
      else if (p.qty <= 5 && vendas30 >= 3)  { urgencia = 5; cor = 'var(--warning)'; label = 'ALTO'; }
      else if (p.qty <= 10 && vendas30 >= 2) { urgencia = 6; cor = 'var(--info)';    label = 'MÉDIO'; }
      else                                   { urgencia = 7; cor = 'var(--g3)';      label = 'BAIXO'; }
      return { ...p, vendas30, urgencia, cor, label };
    })
    .sort((a, b) => a.urgencia - b.urgencia);

  if (lista.length === 0) return (
    <div className="card">
      <div className="empty-state">
        <div className="icon" style={{fontSize:36}}>✓</div>
        <p>Nenhum produto com estoque crítico!</p>
      </div>
    </div>
  );

  const grupos = {
    'CRÍTICO': lista.filter(p=>p.label==='CRÍTICO'),
    'ZERADO':  lista.filter(p=>p.label==='ZERADO'),
    'URGENTE': lista.filter(p=>p.label==='URGENTE'),
    'ALTO':    lista.filter(p=>p.label==='ALTO'),
    'MÉDIO':   lista.filter(p=>p.label==='MÉDIO'),
    'BAIXO':   lista.filter(p=>p.label==='BAIXO'),
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Resumo */}
      <div className="grid-4">
        {[
          {l:'Críticos/Zerados', v: lista.filter(p=>p.urgencia<=3).length, c:'red'},
          {l:'Urgentes',         v: lista.filter(p=>p.urgencia===4).length, c:'red'},
          {l:'Atenção',          v: lista.filter(p=>p.urgencia===5||p.urgencia===6).length, c:'yellow'},
          {l:'Total p/ Repor',   v: lista.length, c:'white'},
        ].map(({l,v,c})=>(
          <div key={l} className={`stat-card ${c}`}>
            <div className="stat-label">{l}</div>
            <div className="stat-value">{v}</div>
          </div>
        ))}
      </div>

      {/* Lista por grupo */}
      {Object.entries(grupos).filter(([,arr])=>arr.length>0).map(([grupo, arr])=>(
        <div key={grupo} className="card">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,color:'var(--text)'}}>{grupo}</span>
            <span className={`badge ${grupo==='CRÍTICO'||grupo==='ZERADO'||grupo==='URGENTE'?'badge-red':grupo==='ALTO'?'badge-yellow':grupo==='MÉDIO'?'badge-blue':'badge-gray'}`}>{arr.length}</span>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th></th><th>Produto</th><th>Loja</th><th>Estoque</th><th>Vendas 30d</th><th>Urgência</th><th></th></tr></thead>
              <tbody>{arr.map(p=>(
                <tr key={p.id}>
                  <td>
                    {p.photo
                      ? <img src={p.photo} style={{width:32,height:32,borderRadius:4,objectFit:'cover'}} alt=""/>
                      : <div style={{width:32,height:32,borderRadius:4,background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:.3}}>▦</div>
                    }
                  </td>
                  <td style={{fontWeight:500,color:'var(--text)',fontSize:13}}>{p.description}<div style={{fontSize:10,color:'var(--g3)'}}>{p.code}</div></td>
                  <td><span className="badge badge-gray">{p.store}</span></td>
                  <td><span className={`badge ${p.qty===0?'badge-red':p.qty<=5?'badge-yellow':'badge-blue'}`}>{p.qty} un</span></td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--text)'}}>{p.vendas30}</td>
                  <td><span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,letterSpacing:1,color:p.cor}}>{p.label}</span></td>
                  <td><button className="btn btn-sm btn-outline" onClick={()=>onEdit(p)}>Editar</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

function Returns() {
  const { sales, products, setProducts, returns, setReturns, addToast, addMovement, currentUser, sellers } = useContext(AppContext);
  const [modal, setModal] = useState(null); // 'devolucao' | 'troca'
  const [step, setStep] = useState(1);
  // Devolução
  const [selSaleId, setSelSaleId] = useState('');
  const [selItems, setSelItems] = useState([]); // itens selecionados para devolver
  const [motivo, setMotivo] = useState('');
  const [estornar, setEstornar] = useState(true);
  // Troca
  const [trocaDev, setTrocaDev] = useState([]); // produtos devolvidos
  const [trocaNova, setTrocaNova] = useState([]); // produtos novos
  const [searchTroca, setSearchTroca] = useState('');
  const [showAutoTroca, setShowAutoTroca] = useState(false);

  const saleItems = selSaleId ? (sales.find(s=>s.id===selSaleId)?.items||[]) : [];

  const totalDev   = trocaDev.reduce((a,i)=>a+i.unitPrice*i.qty,0);
  const totalNova  = trocaNova.reduce((a,i)=>a+i.unitPrice*i.qty,0);
  const diff       = totalNova - totalDev;

  const confirmarDevolucao = () => {
    if (!selSaleId || selItems.length===0) return addToast('Selecione itens para devolver','error');
    if (!motivo) return addToast('Informe o motivo','error');
    const totalEstorno = selItems.reduce((a,it)=>a+it.unitPrice*it.qty, 0);
    const sale = sales.find(s=>s.id===selSaleId);
    const reg = {
      id: 'ret'+Date.now(),
      type: 'devolucao',
      date: new Date().toISOString(),
      saleId: selSaleId,
      sellerName: sale?.sellerName||'',
      store: sale?.store||'',
      items: selItems,
      motivo,
      estornar,
      totalEstorno: estornar ? totalEstorno : 0,
    };
    setReturns(r=>[...r, reg]);
    // Repor estoque
    setProducts(ps=>ps.map(p=>{
      const it=selItems.find(i=>i.productId===p.id);
      return it ? {...p, qty:p.qty+it.qty} : p;
    }));
    selItems.forEach(it=>addMovement(it.productId,'devolução',it.qty,`Devolução: ${motivo}`));
    addToast('Devolução registrada!','success');
    setModal(null); setStep(1); setSelSaleId(''); setSelItems([]); setMotivo(''); setEstornar(true);
  };

  const confirmarTroca = () => {
    if (trocaDev.length===0||trocaNova.length===0) return addToast('Adicione itens nos dois lados','error');
    const reg = {
      id: 'exc'+Date.now(),
      type: 'troca',
      date: new Date().toISOString(),
      store: trocaDev[0]?.store||'',
      itemsDevolvidos: trocaDev,
      itemsNovos: trocaNova,
      totalDevolvido: totalDev,
      totalNovo: totalNova,
      diferenca: diff,
    };
    setReturns(r=>[...r, reg]);
    // Repor estoque dos devolvidos
    setProducts(ps=>ps.map(p=>{
      const dev=trocaDev.find(i=>i.productId===p.id);
      const novo=trocaNova.find(i=>i.productId===p.id);
      let qty=p.qty;
      if(dev) qty+=dev.qty;
      if(novo) qty=Math.max(0,qty-novo.qty);
      return {...p,qty};
    }));
    trocaDev.forEach(it=>addMovement(it.productId,'devolução troca',it.qty,'Troca'));
    trocaNova.forEach(it=>addMovement(it.productId,'saída troca',it.qty,'Troca'));
    addToast('Troca registrada!','success');
    setModal(null); setTrocaDev([]); setTrocaNova([]); setSearchTroca('');
  };

  const toggleSelItem = (item) => {
    setSelItems(prev=>{
      const ex=prev.find(i=>i.productId===item.productId);
      if(ex) return prev.filter(i=>i.productId!==item.productId);
      return [...prev,{...item}];
    });
  };

  const addTrocaNova = (p) => {
    setTrocaNova(prev=>{
      const ex=prev.find(i=>i.productId===p.id);
      if(ex) return prev.map(i=>i.productId===p.id?{...i,qty:i.qty+1}:i);
      return [...prev,{productId:p.id,code:p.code,description:p.description,photo:p.photo||null,qty:1,unitPrice:p.salePrice,store:p.store}];
    });
    setSearchTroca(''); setShowAutoTroca(false);
  };

  const filtTroca = products.filter(p=>p.qty>0&&(p.code.toLowerCase().includes(searchTroca.toLowerCase())||p.description.toLowerCase().includes(searchTroca.toLowerCase())));

  return (
    <div>
      <div className="flex items-center justify-between mb-16">
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)'}}>DEVOLUÇÕES & TROCAS</span>
        <div className="flex gap-8">
          <button className="btn btn-outline" onClick={()=>{setModal('devolucao');setStep(1);}}>↩ Nova Devolução</button>
          <button className="btn btn-white" onClick={()=>{setModal('troca');setTrocaDev([]);setTrocaNova([]);}}>⇄ Nova Troca</button>
        </div>
      </div>

      {/* Histórico */}
      <div className="card">
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:16,letterSpacing:2,marginBottom:14,color:'var(--text)'}}>HISTÓRICO</div>
        {returns.length===0
          ? <div className="empty-state"><div className="icon">↩</div><p>Nenhuma devolução ou troca registrada</p></div>
          : <div className="table-wrap"><table>
              <thead><tr><th>Data</th><th>Tipo</th><th>Loja</th><th>Itens</th><th>Estorno/Diff</th><th>Motivo</th></tr></thead>
              <tbody>{[...returns].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
                <tr key={r.id}>
                  <td style={{fontSize:11}}>{fmtDate(r.date)}</td>
                  <td><span className={`badge ${r.type==='troca'?'badge-blue':'badge-yellow'}`}>{r.type==='troca'?'Troca':'Devolução'}</span></td>
                  <td><span className="badge badge-gray">{r.store}</span></td>
                  <td style={{fontSize:12,color:'var(--text)'}}>{r.type==='troca'?`${r.itemsDevolvidos?.length||0} dev. / ${r.itemsNovos?.length||0} nov.`:r.items?.map(i=>i.description).join(', ')}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:r.type==='troca'?(r.diferenca>0?'var(--success)':r.diferenca<0?'var(--danger)':'var(--g3)'):'var(--danger)',fontSize:12}}>
                    {r.type==='troca'
                      ? (r.diferenca===0?'Igual':r.diferenca>0?`+${fmtMoney(r.diferenca)}`:`-${fmtMoney(Math.abs(r.diferenca))}`)
                      : (r.estornar?`-${fmtMoney(r.totalEstorno)}`:'Sem estorno')}
                  </td>
                  <td style={{fontSize:11,color:'var(--g3)'}}>{r.motivo||'—'}</td>
                </tr>
              ))}</tbody>
            </table></div>
        }
      </div>

      {/* MODAL DEVOLUÇÃO */}
      {modal==='devolucao'&&(
        <div className="modal-overlay"><div className="modal modal-lg">
          <div className="modal-header">

// BALANÇO GERAL DE CAIXA
// ============================================================
function CashflowGeral() {
  const { sales, expenses, returns } = useContext(AppContext);
  const [filterStore, setFilterStore] = useState('Todos');
  const [selYear, setSelYear] = useState(new Date().getFullYear());

  const anos = [...new Set(sales.map(s=>new Date(s.date).getFullYear()))].sort((a,b)=>b-a);
  if(!anos.includes(selYear)&&anos.length>0) anos.unshift(selYear);

  const meses = Array.from({length:12},(_,i)=>i);
  const nomeMes = m => new Date(2000,m,1).toLocaleDateString('pt-BR',{month:'long'});

  const totalEstornos = (m,y) => returns
    .filter(r=>r.type==='devolucao'&&r.estornar&&isSameMonth(r.date,m,y)&&(filterStore==='Todos'||r.store===filterStore))
    .reduce((a,r)=>a+r.totalEstorno,0);

  const rows = meses.map(m=>{
    const vendasM = sales.filter(s=>isSameMonth(s.date,m,selYear)&&(filterStore==='Todos'||s.store===filterStore));
    const despM   = expenses.filter(e=>isSameMonth(e.date,m,selYear)&&(filterStore==='Todos'||e.store===filterStore));
    const entradas = vendasM.reduce((a,s)=>a+s.total,0);
    const estornos = totalEstornos(m,selYear);
    const saidas   = despM.reduce((a,e)=>a+e.amount,0);
    const lucro    = entradas - estornos - saidas;
    return { m, entradas, estornos, saidas, lucro, vendas:vendasM.length };
  });

  const totais = rows.reduce((a,r)=>({
    entradas:a.entradas+r.entradas, estornos:a.estornos+r.estornos,
    saidas:a.saidas+r.saidas, lucro:a.lucro+r.lucro, vendas:a.vendas+r.vendas
  }),{entradas:0,estornos:0,saidas:0,lucro:0,vendas:0});

  const exportarCSV = () => {
    const header = 'Mês;Vendas;Entradas;Estornos;Saídas;Lucro
';
    const body = rows.map(r=>`${nomeMes(r.m)} ${selYear};${r.vendas};${r.entradas.toFixed(2)};${r.estornos.toFixed(2)};${r.saidas.toFixed(2)};${r.lucro.toFixed(2)}`).join('
');
    const footer = `
TOTAL;${totais.vendas};${totais.entradas.toFixed(2)};${totais.estornos.toFixed(2)};${totais.saidas.toFixed(2)};${totais.lucro.toFixed(2)}`;
    const blob = new Blob([header+body+footer],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url;
    a.download = `balanco_geral_${selYear}_${filterStore.replace(' ','_')}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div>
      <div className="flex items-center gap-12 mb-16" style={{flexWrap:'wrap'}}>
        <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:3,color:'var(--text)',flex:1}}>BALANÇO GERAL</span>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={filterStore} onChange={e=>setFilterStore(e.target.value)}>
          <option>Todos</option><option>Cosmos</option><option>Nova Cidade</option>
        </select>
        <select style={{background:'var(--bg3)',border:'1px solid var(--bg5)',borderRadius:'var(--r)',padding:'8px 11px',color:'var(--text)',fontSize:13}} value={selYear} onChange={e=>setSelYear(+e.target.value)}>
          {anos.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <button className="btn btn-white" onClick={exportarCSV}>⬇ Exportar CSV</button>
      </div>

      <div className="grid-4 mb-24">
        <div className="stat-card green"><div className="stat-label">Entradas Totais</div><div className="stat-value">{fmtMoney(totais.entradas)}</div></div>
        <div className="stat-card red"><div className="stat-label">Estornos</div><div className="stat-value">{fmtMoney(totais.estornos)}</div></div>
        <div className="stat-card red"><div className="stat-label">Despesas</div><div className="stat-value">{fmtMoney(totais.saidas)}</div></div>
        <div className={`stat-card ${totais.lucro>=0?'white':'red'}`}><div className="stat-label">Lucro Líquido</div><div className="stat-value">{fmtMoney(totais.lucro)}</div></div>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Mês</th><th>Vendas</th><th>Entradas</th><th>Estornos (Dev.)</th><th>Despesas</th><th>Lucro</th><th></th></tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.m} style={{opacity:r.vendas===0&&r.saidas===0?.4:1}}>
                  <td style={{fontWeight:600,color:'var(--text)',textTransform:'capitalize'}}>{nomeMes(r.m)}</td>
                  <td style={{color:'var(--g3)',fontSize:12}}>{r.vendas}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--success)',fontSize:12}}>{fmtMoney(r.entradas)}</td>
                  <td style={{fontFamily:'DM Mono,monospace',color:'var(--warning)',fontSize:12}}>{r.estornos>0?`-${fmtMoney(r.estornos)}`:'—'}</td>
                  <td style={{fontFamily:'DM Mono,monospace',color:'var(--danger)',fontSize:12}}>{r.saidas>0?fmtMoney(r.saidas):'—'}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:r.lucro>=0?'var(--text)':'var(--danger)',fontSize:13}}>{fmtMoney(r.lucro)}</td>
                  <td><FechamentoMensalBtn sales={sales} expenses={expenses} returns={returns} m={r.m} y={selYear} store={filterStore}/></td>
                </tr>
              ))}
              <tr style={{borderTop:'2px solid var(--bg5)'}}>
                <td style={{fontFamily:'Bebas Neue,sans-serif',letterSpacing:2,color:'var(--text)'}}>TOTAL</td>
                <td style={{fontWeight:700,color:'var(--text)'}}>{totais.vendas}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--success)'}}>{fmtMoney(totais.entradas)}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--warning)'}}>{totais.estornos>0?`-${fmtMoney(totais.estornos)}`:'—'}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:'var(--danger)'}}>{fmtMoney(totais.saidas)}</td>
                <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,color:totais.lucro>=0?'var(--text)':'var(--danger)',fontSize:15}}>{fmtMoney(totais.lucro)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// Botão de fechamento mensal — gera arquivo
function FechamentoMensalBtn({ sales, expenses, returns, m, y, store }) {
  const nomeMes = new Date(y,m,1).toLocaleDateString('pt-BR',{month:'long'});
  const vendasM = sales.filter(s=>isSameMonth(s.date,m,y)&&(store==='Todos'||s.store===store));
  const despM   = expenses.filter(e=>isSameMonth(e.date,m,y)&&(store==='Todos'||e.store===store));
  const retM    = returns.filter(r=>r.type==='devolucao'&&r.estornar&&isSameMonth(r.date,m,y)&&(store==='Todos'||r.store===store));
  if (vendasM.length===0&&despM.length===0) return null;

  const entradas  = vendasM.reduce((a,s)=>a+s.total,0);
  const estornos  = retM.reduce((a,r)=>a+r.totalEstorno,0);
  const saidas    = despM.reduce((a,e)=>a+e.amount,0);
  const lucro     = entradas-estornos-saidas;

  const gerar = () => {
    const linhas = [
      `FECHAMENTO DE CAIXA — ${nomeMes.toUpperCase()} ${y}`,
      `Loja: ${store}`,
      `Gerado em: ${new Date().toLocaleString('pt-BR')}`,
      '',
      '=== ENTRADAS ===',
      ...vendasM.map(s=>`${fmtDate(s.date)} | ${s.sellerName} | ${s.paymentMethod} | ${fmtMoney(s.total)}`),
      `TOTAL ENTRADAS: ${fmtMoney(entradas)}`,
      '',
      '=== ESTORNOS (DEVOLUÇÕES) ===',
      ...retM.map(r=>`${fmtDate(r.date)} | ${r.motivo||'—'} | -${fmtMoney(r.totalEstorno)}`),
      `TOTAL ESTORNOS: -${fmtMoney(estornos)}`,
      '',
      '=== DESPESAS ===',
      ...despM.map(e=>`${fmtDate(e.date)} | ${e.category} | ${e.description} | -${fmtMoney(e.amount)}`),
      `TOTAL DESPESAS: -${fmtMoney(saidas)}`,
      '',
      '==========================================',
      `LUCRO LÍQUIDO: ${fmtMoney(lucro)}`,
      '==========================================',
    ];
    const blob = new Blob([linhas.join('
')],{type:'text/plain;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url;
    a.download = `fechamento_${nomeMes}_${y}_${store.replace(' ','_')}.txt`;
    a.click(); URL.revokeObjectURL(url);
  };

  return <button className="btn btn-sm btn-outline" onClick={gerar} title="Gerar fechamento">⬇</button>;
}
